function L3P1(){return `

<div class="sec"><div class="sec-ar">مَا يُسْتَحَبُّ عِنْدَ قَضَاءِ الْحَاجَة</div><div class="sec-translit">Mā yustaḥabbu ʿinda qaḍāʾi l-ḥājah</div><div class="sec-en">What is RECOMMENDED (mustaḥabb) When Relieving Oneself</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Yes, Islam teaches us bathroom etiquette!</span><div class="study-note-body">Something as private as going to the bathroom? Islam has teachings about it! Why? Because <strong>Islam covers every part of life</strong> — nothing is too "ordinary" for guidance. The Prophet ﷺ taught us how to sleep, eat, enter a house, and yes, even how to use the bathroom. This shows how complete Islam is.<br><br>
In this lesson you\u2019ll learn <strong>4 rulings</strong>: what\u2019s recommended, obligatory, forbidden, and disliked when relieving yourself. Let\u2019s start with what\u2019s <em>recommended</em> (mustaḥabb = extra good to do).</div></div>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Going far from people</strong> when relieving oneself outdoors — out of respect and privacy.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Jābir ibn ʿAbdullāh</div><div class="h-ar">«خَرَجْنَا مَعَ رَسُولِ اللَّهِ ﷺ فِي سَفَرٍ، وَكَانَ رَسُولُ اللَّهِ ﷺ لَا يَأْتِي الْبَرَازَ - يَعْنِي: مَوْضِعَ قَضَاءِ الْحَاجَةِ - حَتَّى يَغِيبَ فَلَا يُرَى»</div><div class="h-translit">Kharajnā maʿa rasūli-llāhi ﷺ fī safar, wa kāna rasūlu-llāhi ﷺ lā yaʾtī l-barāza — yaʿnī: mawḍiʿa qaḍāʾi l-ḥājah — ḥattā yaghība fa-lā yurā.</div><div class="h-en">"We went out with the Messenger of Allah ﷺ on a journey. He would not go to al-barāz — meaning: the place of relieving oneself — <strong>until he was out of sight and could not be seen</strong>."</div><div class="h-source">Narrated by Ibn Mājah no. 335</div></div>

<div class="num-list">
<li data-n="2"><div class="li-en"><strong>Saying the duʿāʾ before entering</strong> the bathroom — asking Allah\u2019s protection from evil.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Anas ibn Mālik</div><div class="h-ar">«كَانَ رَسُولُ اللَّهِ ﷺ إِذَا دَخَلَ الْخَلَاءَ - يَعْنِي: أَرَادَ دُخُولَ الْخَلَاءِ - قَالَ: اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْخُبْثِ وَالْخَبَائِثِ»</div><div class="h-translit">Kāna rasūlu-llāhi ﷺ idhā dakhala l-khalāʾa — yaʿnī: arāda dukhūla l-khalāʾi — qāla: "Allāhumma innī aʿūdhu bika mina l-khubthi wa l-khabāʾith."</div><div class="h-en">When the Messenger of Allah ﷺ entered the bathroom — meaning: when he intended to enter — he would say: <strong>"O Allah! I seek refuge in You from the male and female evil ones (jinn)."</strong></div><div class="h-source">Narrated by al-Bukhārī no. 142</div></div>

<div class="num-list">
<li data-n="3"><div class="li-en"><strong>Saying "ghufrānaka" when leaving</strong> the bathroom.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — ʿĀʾishah</div><div class="h-ar">كَانَ رَسُولُ اللَّهِ ﷺ إِذَا خَرَجَ مِنَ الْخَلَاءِ قَالَ: «غُفْرَانَكَ»</div><div class="h-translit">Kāna rasūlu-llāhi ﷺ idhā kharaja mina l-khalāʾi qāla: "Ghufrānaka."</div><div class="h-en">When the Messenger of Allah ﷺ came out of the bathroom, he would say: <strong>"Ghufrānaka (I seek Your forgiveness)."</strong></div><div class="h-source">Narrated by Abū Dāwūd no. 30</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Why say "ghufrānaka" (Your forgiveness) after the bathroom?</span><div class="study-note-body">This seems strange at first — why ask forgiveness after <em>using the bathroom</em>? Scholars explain beautifully:<br><br>
When you left the bathroom, you couldn\u2019t make dhikr of Allah inside (it\u2019s a place of impurity). So even that short time of not remembering Allah — we ask forgiveness for it! Also, using the bathroom reminds us that Allah has blessed us by removing the waste from our bodies — so we thank Him and ask forgiveness for any shortcomings.<br><br>
Amazing how Islam turns even the bathroom into a moment of connection with Allah!</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word tip</span><div class="study-note-title">الْخَلَاء · al-khalāʾ</div><div class="study-note-body">Literally means "empty place" (from خ-ل-و = to be empty). In Arabic, the bathroom is called <em>al-khalāʾ</em> because it\u2019s a place where you go alone (empty of other people). Another word for it is <em>al-mirḥāḍ</em> (place of washing).<br><br>
Two duʿāʾs to memorize:<br>
🔵 <strong>Before entering:</strong> اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْخُبْثِ وَالْخَبَائِثِ (<em>Allāhumma innī aʿūdhu bika mina l-khubthi wa l-khabāʾith</em>)<br>
🔵 <strong>After leaving:</strong> غُفْرَانَكَ (<em>Ghufrānaka</em>)</div></div>
`;}

function L3P2(){return `

<div class="sec"><div class="sec-ar">مَا يَجِبُ عِنْدَ قَضَاءِ الْحَاجَة</div><div class="sec-translit">Mā yajibu ʿinda qaḍāʾi l-ḥājah</div><div class="sec-en">What is OBLIGATORY (wājib) When Relieving Oneself</div></div>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Protecting yourself from urine splashing</strong> on your body or clothes — this is <em>wājib</em> (obligatory)!</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Hurayrah</div><div class="h-ar">«اسْتَنْزِهُوا مِنَ الْبَوْلِ، فَإِنَّ أَكْثَرَ عَذَابِ الْقَبْرِ مِنْهُ»</div><div class="h-translit">Istanzihū mina l-bawl, fa-inna akthara ʿadhābi l-qabri minhu.</div><div class="h-en"><strong>"Be careful (and protect yourselves) from urine — for most of the punishment of the grave is from it."</strong></div><div class="h-source">Narrated by Aḥmad no. 9059</div></div>

<div class="body-text"><div class="bt-ar">فِي هَذَا الْحَدِيثِ دَلِيلٌ عَلَى: وُجُوبِ التَّنَزُّهِ، وَهُوَ التَّحَرُّزُ مِنَ النَّجَاسَةِ أَنْ تُصِيبَ الثَّوْبَ، أَوِ الْبَدَنَ، وَأَنَّهُ يَجِبُ غَسْلُهَا.</div><div class="bt-translit">Fī hādhā l-ḥadīthi dalīlun ʿalā: wujūbi t-tanazzuh, wa huwa t-taḥarruzu mina n-najāsati an tuṣība th-thawba awi l-badan, wa annahu yajibu ghasluhā.</div><div class="bt-en">This hadith contains evidence for: the <strong>obligation of tanazzuh</strong> — which is <strong>guarding against impurity getting on one\u2019s clothes or body</strong> — and that <strong>washing it off is obligatory</strong>.</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ A very serious warning</span><div class="study-note-body">The Prophet ﷺ said <strong>"most of the punishment of the grave is from it"</strong> — referring to urine carelessness! This is a shocking warning. It means: people who didn\u2019t take proper care when urinating — who let it splash on clothes and then prayed in those clothes — face real punishment.<br><br>
This hadith proves that it\u2019s <strong>wājib (obligatory)</strong> to: (1) protect your clothes and body from urine splashes, and (2) wash off any urine that gets on them before prayer.</div></div>

<div class="num-list">
<li data-n="2"><div class="li-en"><strong>Covering the ʿawrah</strong> (private parts) — always required, even when alone in the bathroom, except as necessary.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Muʿāwiyah ibn Ḥaydah</div><div class="h-ar">«احْفَظْ عَوْرَتَكَ»</div><div class="h-translit">Iḥfaẓ ʿawratak.</div><div class="h-en"><strong>"Guard your ʿawrah (private parts)."</strong></div><div class="h-source">Narrated by at-Tirmidhī no. 2794</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Two things that are wājib</span><div class="study-note-body">So in this section you learned <strong>2 obligations</strong> when relieving yourself:<br><br>
<strong>1. Protect clothes/body from urine splashes</strong> → because contamination would make your prayer invalid.<br>
<strong>2. Cover your ʿawrah</strong> → always, except from your spouse or when truly alone and it\u2019s necessary (like in the bathroom itself).<br><br>
Remember: <em>wājib</em> means "must do" — sin if neglected! These aren\u2019t just suggestions.</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word tip</span><div class="study-note-title">اسْتَنْزِهُوا · istanzihū</div><div class="study-note-body">From root ن-ز-ه (n-z-h) which means "to keep away from" or "to be clean of." The <em>ist-</em> prefix means "seek to do." So <strong>istanzihū</strong> = "seek to keep yourselves away/clean from." It\u2019s a strong command — not just "avoid it a little" but "actively protect yourself from it."<br><br>
Same root gives us <em>nuzhah</em> (a pleasant outing, a "getting away") and <em>tanazzuh</em> (being above something, keeping oneself higher than it).</div></div>
`;}

function L3P3(){return `

<div class="sec"><div class="sec-ar">مَا يَحْرُمُ عِنْدَ قَضَاءِ الْحَاجَة</div><div class="sec-translit">Mā yaḥrumu ʿinda qaḍāʾi l-ḥājah</div><div class="sec-en">What is FORBIDDEN (muḥarram) When Relieving Oneself</div></div>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Facing or turning your back to the Qiblah</strong> (while outdoors, away from buildings).</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Ayyūb al-Anṣārī</div><div class="h-ar">«إِذَا أَتَيْتُمُ الْغَائِطَ فَلَا تَسْتَقْبِلُوا الْقِبْلَةَ وَلَا تَسْتَدْبِرُوهَا بِبَوْلٍ وَلَا غَائِطٍ»</div><div class="h-translit">Idhā ataytumu l-ghāʾiṭa fa-lā tastaqbilū l-qiblata wa lā tastadbirūhā bi-bawlin wa lā ghāʾiṭ.</div><div class="h-en"><strong>"When you come to relieve yourself, do not face the Qiblah nor turn your back to it</strong> while urinating or defecating."</div><div class="h-source">Narrated by al-Bukhārī no. 394</div></div>

<div class="body-text"><div class="bt-ar">أَسْتَفِيدُ مِنْ هَذَا الْحَدِيثِ أَنَّ مِنْ آدَابِ قَضَاءِ الْحَاجَةِ: اجْتِنَابَ اسْتِقْبَالِ الْقِبْلَةِ أَوِ اسْتِدْبَارِهَا عِنْدَ قَضَاءِ الْحَاجَةِ فِي غَيْرِ الْبُنْيَانِ.</div><div class="bt-translit">Astafīdu min hādhā l-ḥadīthi anna min ādābi qaḍāʾi l-ḥājah: ijtināba stiqbāli l-qiblati aw istidbārihā ʿinda qaḍāʾi l-ḥājati fī ghayri l-bunyān.</div><div class="bt-en"><strong>I learn from this hadith</strong> that among the etiquettes of relieving oneself is: <strong>avoiding facing the Qiblah or turning one\u2019s back to it</strong> while relieving oneself — <em>outside of buildings</em> (i.e., when outdoors).</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why not face the Qiblah?</span><div class="study-note-body">The Kaʿbah is the most honored place on Earth — we turn toward it 5 times a day to pray. Facing it (or turning our back to it) while doing something as lowly as using the bathroom would be <strong>disrespectful</strong>. Islam teaches proper respect for sacred things.<br><br>
<strong>Important note:</strong> this ruling is specifically for <em>outdoors</em>, where there are no walls blocking your direction. <strong>Indoor bathrooms</strong> (where walls already block you from facing Qiblah directly) — most scholars say it\u2019s fine, because the bathroom walls break that direct facing. Check the layout of your bathroom — most modern ones are built so you don\u2019t face Qiblah anyway.</div></div>

<div class="num-list">
<li data-n="2"><div class="li-en"><strong>Urinating on people\u2019s paths or in their shade</strong> (places where they rest).</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Hurayrah</div><div class="h-ar">«اتَّقُوا اللَّاعِنَيْنِ»، قِيلَ: وَمَا اللَّاعِنَانِ يَا رَسُولَ اللَّهِ؟ قَالَ: «الَّذِي يَتَبَوَّلُ فِي طَرِيقِ النَّاسِ، أَوْ ظِلِّهِمْ»</div><div class="h-translit">Ittaqū l-lāʿinayn. Qīla: wa ma l-lāʿināni yā rasūla-llāh? Qāla: "Alladhī yatabawwalu fī ṭarīqi n-nāsi, aw ẓillihim."</div><div class="h-en">"Avoid the two things that bring curses!" It was asked: "What are the two things that bring curses, O Messenger of Allah?" He said: <strong>"The one who urinates in people\u2019s paths or in their shade."</strong></div><div class="h-source">Narrated by Muslim no. 269</div></div>

<div class="num-list">
<li data-n="3"><div class="li-en"><strong>Urinating in still water</strong> (lakes, ponds) — contaminates water that others will use.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Hurayrah (muttafaq ʿalayh)</div><div class="h-ar">«نَهَى النَّبِيُّ ﷺ أَنْ يُبَالَ فِي الْمَاءِ الرَّاكِدِ»</div><div class="h-translit">Nahā n-nabiyyu ﷺ an yubāla fī l-māʾi r-rākid.</div><div class="h-en">"The Prophet ﷺ <strong>forbade urinating in still (stagnant) water</strong>."</div><div class="h-source">Narrated by al-Bukhārī and Muslim</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Even 1400 years ago, environmental ethics!</span><div class="study-note-body">Look at the wisdom here. Long before modern environmental movements, the Prophet ﷺ taught:<br>
❌ Don\u2019t pollute water sources (still water)<br>
❌ Don\u2019t dirty public pathways<br>
❌ Don\u2019t contaminate public shade/resting areas<br><br>
Islam\u2019s care for community hygiene and shared spaces shows in these rules. A Muslim is <em>always</em> aware of how their actions affect others.</div></div>
`;}

<div class="sec"><div class="sec-ar">مَا يُكْرَهُ عِنْدَ قَضَاءِ الْحَاجَة</div><div class="sec-translit">Mā yukrahu ʿinda qaḍāʾi l-ḥājah</div><div class="sec-en">What is DISLIKED (makrūh) When Relieving Oneself</div></div>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Holding private parts with the right hand</strong> while urinating, or <strong>cleaning with the right hand</strong>.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Qatādah (muttafaq ʿalayh)</div><div class="h-ar">«لَا يُمْسِكَنَّ أَحَدُكُمْ ذَكَرَهُ بِيَمِينِهِ وَهُوَ يَبُولُ، وَلَا يَتَمَسَّحْ مِنَ الْخَلَاءِ بِيَمِينِهِ»</div><div class="h-translit">Lā yumsikanna aḥadukum dhakarahu bi-yamīnihi wa huwa yabūl, wa lā yatamassaḥ mina l-khalāʾi bi-yamīnihi.</div><div class="h-en">"None of you should hold himself with his <strong>right hand</strong> while urinating, nor clean himself (after the bathroom) with his <strong>right hand</strong>."</div><div class="h-source">Narrated by al-Bukhārī and Muslim</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why the right hand?</span><div class="study-note-body">In Islam, the <strong>right hand is honored</strong> — used for noble things:<br>
✓ Eating<br>
✓ Drinking<br>
✓ Shaking hands / greeting<br>
✓ Giving/receiving things<br>
✓ Entering the masjid<br><br>
The <strong>left hand</strong> is used for things that aren\u2019t noble — cleaning after the bathroom, removing shoes, etc. This keeps a clear separation, almost like having one "clean" hand and one "dirty" hand for different purposes.<br><br>
So using the right hand for something as unclean as toilet cleaning mixes up this careful separation. That\u2019s why it\u2019s <em>makrūh</em>.</div></div>

<div class="num-list">
<li data-n="2"><div class="li-en"><strong>Responding to salām (or making dhikr)</strong> while urinating.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Ibn ʿUmar</div><div class="h-ar">أَنَّ رَجُلًا مَرَّ عَلَى النَّبِيِّ ﷺ وَهُوَ يَبُولُ، فَسَلَّمَ عَلَيْهِ، فَلَمْ يَرُدَّ عَلَيْهِ</div><div class="h-translit">Anna rajulan marra ʿalā n-nabiyyi ﷺ wa huwa yabūl, fa-sallama ʿalayhi, fa-lam yarudda ʿalayh.</div><div class="h-en">"A man passed by the Prophet ﷺ while he was urinating and greeted him with salām. The Prophet <strong>did not respond to the greeting</strong>."</div><div class="h-source">Narrated by Muslim no. 370</div></div>

<div class="body-text"><div class="bt-ar">أَسْتَفِيدُ مِنْ هَذَا الْحَدِيثِ أَنَّ مِنْ آدَابِ قَضَاءِ الْحَاجَةِ: اجْتِنَابَ ذِكْرِ اللَّهِ تَعَالَى عِنْدَ قَضَاءِ الْحَاجَةِ.</div><div class="bt-translit">Astafīdu min hādhā l-ḥadīthi anna min ādābi qaḍāʾi l-ḥājah: ijtināba dhikri-llāhi taʿālā ʿinda qaḍāʾi l-ḥājah.</div><div class="bt-en"><strong>I learn from this hadith</strong> that among the etiquettes of relieving oneself is: <strong>avoiding the remembrance (dhikr) of Allah the Most High</strong> while relieving oneself.</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ The lesson behind this</span><div class="study-note-body">The Prophet ﷺ <em>always</em> returned salām — yet in this case he didn\u2019t! Why? Because <strong>"as-salāmu ʿalaykum"</strong> literally means "peace be upon you" — and the word <em>As-Salām</em> is one of <strong>Allah\u2019s beautiful names</strong>.<br><br>
The principle: <strong>avoid mentioning Allah\u2019s names (or doing dhikr) while in a state or place of impurity</strong>. So if someone greets you while you\u2019re in the bathroom, don\u2019t respond until you come out. Return the greeting then.<br><br>
This also applies to: reading Qur\u2019an, making duʿāʾ out loud, or any worship requiring Allah\u2019s name — wait until you leave.</div></div>
`;}

<div class="sec"><div class="sec-ar">الْاسْتِنْجَاءُ وَالْاسْتِجْمَار</div><div class="sec-translit">Al-istinjāʾ wa l-istijmār</div><div class="sec-en">Istinjāʾ (Water-cleaning) & Istijmār (Dry-cleaning)</div></div>

<div class="body-text"><div class="bt-label">📖 Definitions</div><div class="bt-ar"><strong>الاِسْتِنْجَاءُ:</strong> إِزَالَةُ أَثَرِ الْخَارِجِ مِنَ السَّبِيلَيْنِ بِالْمَاءِ.<br><strong>الاِسْتِجْمَارُ:</strong> إِزَالَةُ أَثَرِ الْخَارِجِ مِنَ السَّبِيلَيْنِ بِغَيْرِ الْمَاءِ، كَالْأَحْجَارِ وَالْمَنَادِيلِ وَنَحْوِهِمَا.</div><div class="bt-translit"><strong>Al-istinjāʾ:</strong> izālatu athari l-khāriji mina s-sabīlayni bi-l-māʾ.<br><strong>Al-istijmār:</strong> izālatu athari l-khāriji mina s-sabīlayni bi-ghayri l-māʾi, ka-l-aḥjāri wa l-manādīli wa naḥwihimā.</div><div class="bt-en"><strong>Istinjāʾ:</strong> removing the trace of what exits from the two passages (front/back private parts) <strong>using water</strong>.<br><strong>Istijmār:</strong> removing the trace of what exits from the two passages using <strong>something other than water</strong> — such as stones, tissues, and the like.</div></div>

<div class="compare-grid">
<div class="compare-card"><div class="compare-card-head rust"><span class="ch-ar">الاِسْتِنْجَاء</span><span class="ch-translit">Al-istinjāʾ</span><br>Cleaning with water</div><ul class="compare-card-body"><li>Using <strong>water</strong> to clean the private parts after relieving oneself</li><li>More thorough — the preferred method</li><li>Example: using a bidet, hose, or water cup</li></ul></div>
<div class="compare-card"><div class="compare-card-head gold"><span class="ch-ar">الاِسْتِجْمَار</span><span class="ch-translit">Al-istijmār</span><br>Cleaning with dry materials</div><ul class="compare-card-body"><li>Using <strong>dry objects</strong> — stones, paper, tissues</li><li>Comes from the word <em>jamrah</em> (small stone)</li><li>Allowed when water isn\u2019t easily available</li></ul></div>
</div>

<div class="study-note beginner"><span class="study-note-label">💡 Two ways to clean yourself</span><div class="study-note-body">In Islam, there are <strong>two ways</strong> to clean yourself after using the bathroom:<br><br>
<strong>1. Istinjāʾ</strong> — using water (like a bidet or hose). This is the <em>best</em>.<br>
<strong>2. Istijmār</strong> — using dry materials like toilet paper. Also valid.<br>
<strong>Best of all: combine both</strong> (tissue first, then water). This is what most Muslims do today.<br><br>
Islam gave Muslims the choice depending on availability — very practical for different environments (desert, home, travel).</div></div>

<div class="sec"><div class="sec-ar">شُرُوطُ مَا يُسْتَجْمَرُ بِهِ</div><div class="sec-translit">Shurūṭu mā yustajmaru bih</div><div class="sec-en">Conditions for What Can Be Used for Istijmār</div></div>

<p style="margin-bottom:10px">Not <em>every</em> dry material can be used. There are <strong>4 conditions</strong>:</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">أَنْ يَكُونَ مُبَاحًا. فَلَا يَجُوزُ الاِسْتِجْمَارُ بِالْمُحَرَّمِ، مِثْلَ: الْمَطْبُوعَاتِ الْمُحْتَرَمَةِ الَّتِي فِيهَا ذِكْرُ اللَّهِ.</em><br><strong>Must be permissible (mubāḥ).</strong> So you cannot use the forbidden, like <strong>honored printed materials (newspapers, pages)</strong> that contain the name of Allah or Qur\u2019an verses.</div></li>
<li data-n="2"><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">أَنْ يَكُونَ طَاهِرًا. فَلَا يَجُوزُ الاِسْتِجْمَارُ بِالنَّجِسِ، مِثْلَ: الْمَنَادِيلِ الْمُسْتَخْدَمَةِ فِي النَّجَاسَةِ.</em><br><strong>Must be pure (ṭāhir).</strong> So you cannot use impure things — like <strong>tissues already used for impurity</strong>.</div></li>
<li data-n="3"><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">أَنْ يَكُونَ مُنَظِّفًا لِلْمَحَلِّ. فَلَا يَجُوزُ الاِسْتِجْمَارُ بِمَا لَا يُنَظِّفُ جَيِّدًا، مِثْلَ: أَكْيَاسِ الْبِلَاسْتِيكِ.</em><br><strong>Must clean effectively.</strong> So you cannot use things that don\u2019t properly clean — like <strong>plastic bags</strong>.</div></li>

</div>

<div class="study-note remember"><span class="study-note-label">⭐ The 4 conditions in one sentence</span><div class="study-note-body">The material must be: <strong>(1) permissible, (2) pure, (3) effective at cleaning, (4) not honored.</strong><br><br>
✅ Regular toilet paper — passes all 4! ✅<br>
❌ A newspaper with Qur\u2019an verses — fails #1 (not permissible)<br>
❌ A tissue already dirty with impurity — fails #2 (not pure)<br>
❌ A plastic bag — fails #3 (doesn\u2019t actually clean)<br>
❌ A piece of bread — fails #4 (food is honored)</div></div>

<div class="sec"><div class="sec-ar">الِاكْتِفَاءُ بِالاِسْتِجْمَار</div><div class="sec-translit">Al-iktifāʾ bi-l-istijmār</div><div class="sec-en">Using Only Istijmār (Without Water)</div></div>

<div class="body-text"><div class="bt-ar">الاِسْتِنْجَاءُ أَفْضَلُ مِنَ الاِسْتِجْمَارِ؛ لِأَنَّهُ أَكْمَلُ تَنْظِيفًا، وَالْجَمْعُ بَيْنَهُمَا أَفْضَلُ. وَيَجُوزُ الاِكْتِفَاءُ بِالاِسْتِجْمَارِ وَحْدَهُ بِشَرْطَيْنِ، هُمَا:</div><div class="bt-translit">Al-istinjāʾu afḍalu mina l-istijmār; li-annahu akmalu tanẓīfan, wa l-jamʿu baynahumā afḍal. Wa yajūzu l-iktifāʾu bi-l-istijmāri waḥdahu bi-sharṭayn, humā:</div><div class="bt-en"><strong>Istinjāʾ is better than istijmār</strong>, because it is <strong>more complete in cleaning</strong>. <strong>Combining them</strong> (using both) is the <strong>best</strong>. It is permitted to rely on istijmār alone under <strong>two conditions</strong>:</div></div>

<p style="margin-bottom:10px">Istijmār alone is valid only with <strong>2 conditions</strong>:</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">أَلَّا يَتَعَدَّى الْبَوْلُ وَالْغَائِطُ الْمَوْضِعَ الْمُعْتَادَ لِخُرُوجِهِ، فَلَوِ انْتَشَرَ الْبَوْلُ أَوِ الْغَائِطُ، وَتَعَدَّى مَوْضِعَ الْخُرُوجِ الْمُعْتَادَ، فَلَا بُدَّ حِينَئِذٍ مِنِ اسْتِعْمَالِ الْمَاءِ.</em><br><strong>The urine or feces didn\u2019t spread beyond the usual exit area.</strong> If it spread outside the normal spot, using <strong>water becomes necessary</strong>.</div></li>
<li data-n="2"><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">أَنْ يَكُونَ الاِسْتِجْمَارُ بِثَلَاثِ مَسَحَاتٍ فَصَاعِدًا، حَتَّى يَحْصُلَ تَنْظِيفُ الْقُبُلِ أَوِ الدُّبُرِ مِنْ أَثَرِ النَّجَاسَةِ.</em><br><strong>At least 3 wipes</strong> (or more if needed) — enough to thoroughly clean the area of any trace.</div></li>
</div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Practical takeaway</span><div class="study-note-body">If you\u2019re in a bathroom without water (like some public restrooms in Western countries), tissue alone is fine — as long as you use <strong>at least 3 pieces</strong> (keep going until you\u2019re clean) and the issue stayed in the usual area.<br><br>
But if at home you have access to water, <strong>use water</strong> — it\u2019s better, more hygienic, and more pleasing to Allah. Best: tissue first to remove, then water to purify.</div></div>
`;}

<div class="assessment" id="as3p6">
<div class="section-badge">التَّقْوِيم · Assessment</div>
<p class="assessment-intro" style="margin-top:8px">Try each question before revealing.</p>

<div class="q-item"><span class="q-num">1</span><div class="q-en">List the divisions of ṭahārah.</div><div class="q-ar">عَدِّدْ أَقْسَامَ الطَّهَارَةِ.</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">Ṭahārah has <strong>two divisions</strong>:<br>1. <strong>Rafʿ al-ḥadath</strong> — removing ritual impurity (by wuḍūʾ or ghusl).<br>2. <strong>Izālat an-najāsah</strong> — removing visible impurity (by washing).</div></div>

<div class="q-item"><span class="q-num">2</span><div class="q-en">Define pure (ṭahūr) water and impure (najis) water, and state the ruling for each.</div><div class="q-ar">عَرِّفْ الْمَاءَ الطَّهُورَ وَاذْكُرْ حُكْمَهُ، وَالْمَاءَ النَّجِسَ وَاذْكُرْ حُكْمَهُ.</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Ṭahūr water:</strong><br>• Definition: water remaining in its original created state, with nothing changing it.<br>• Examples: sea, rivers, rain.<br>• Ruling: <strong>Can be used</strong> for wuḍūʾ, ghusl, drinking, eating with.<br><br>
<strong>Najis water:</strong><br>• Definition: water whose color, taste, or smell has been changed by impurity.<br>• Examples: sewage water, water with urine or blood mixed in.<br>• Ruling: <strong>Cannot be used</strong> for purification or drinking.</div></div>

<div class="q-item"><span class="q-num">3</span><div class="q-en">What is the ruling on eating with a gold spoon? State the evidence.</div><div class="q-ar">مَا حُكْمُ الْأَكْلِ بِمِلْعَقَةٍ مِنْ ذَهَبٍ؟ مَعَ ذِكْرِ الدَّلِيلِ.</div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Ruling: Forbidden (muḥarram)</strong>. Using gold (or silver) vessels, utensils, or spoons is forbidden for both men and women.<br><br>
<strong>Evidence:</strong> Ḥadīth of Ḥudhayfah — "Do not drink from vessels of gold and silver, and do not eat from their large plates. For they are for them (disbelievers) in this world, and for us in the Hereafter." (Bukhārī &amp; Muslim)</div></div>

<div class="q-item"><span class="q-num">4</span><div class="q-en">State what you would do in each of these situations:</div><div class="q-ar">بَيِّنْ مَا تَفْعَلُهُ فِي الْحَالَاتِ التَّالِيَةِ:</div>
<div style="margin-top:8px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">a) You were carrying a nursing baby boy who had not eaten solid food yet, and he urinated on your clothes.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">Simply <strong>sprinkle water</strong> over the spot — no need to scrub or wring. This is the <em>lightest (mukhaffafah)</em> type of najāsah. Evidence: ḥadīth of ʿĀʾishah (Bukhārī 222).</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">b) You saw a friend open the faucet/tap, take water, then walk away without closing it.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">I would <strong>close the tap myself</strong> and <strong>remind my friend</strong> kindly that water is a great blessing from Allah. Wasting it is wrong (<em>isrāf</em>). The Prophet ﷺ even forbade wasting water during wuḍūʾ — even beside a flowing river!</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">c) You wanted to pray and found some blood on your clothes.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">Since the clothes are <em>mutanajjis</em> (contaminated), <strong>wash the spot with water — rub and wring</strong> until the blood trace is gone. Then pray. If there\u2019s time, change clothes instead, to be safe.</div></div>
</div>

<div class="q-item"><span class="q-num">5</span><div class="q-en">Explain the wisdom behind each of the following:</div>
<div style="margin-top:8px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">a) The command to go far from people when relieving oneself outdoors.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Wisdom:</strong><br>• <strong>Modesty</strong> — protecting one\u2019s ʿawrah from being seen.<br>• <strong>Avoiding harm</strong> — smells and dirt don\u2019t disturb others.<br>• <strong>Dignity</strong> — keeping this private matter private.<br>• <strong>Community hygiene</strong> — no contamination near where people live/walk.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">b) The prohibition on facing or turning the back to the Qiblah when relieving oneself.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Wisdom:</strong> <strong>Honoring the Qiblah</strong> (the direction of the Kaʿbah) — the most sacred direction on Earth that Muslims turn to 5 times a day. It would be deeply disrespectful to face it (or turn one\u2019s back to it) while doing something as lowly as urinating or defecating. Islam teaches us to give sacred things their due respect even in small matters.</div></div>
</div>
