<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiqh — Islamic Jurisprudence Workbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rust:#2c4a6b;--rust-mid:#4a7aa5;--rust-light:#dde7f2;--rust-pale:#f0f5fa;
  --gold:#5a7ba3;--gold-light:#e8edf4;--gold-pale:#f4f7fb;
  --sand:#f4f7fb;--ink:#1f2a36;--ink-mid:#3a4756;--muted:#6a7684;
  --border:#c8d4e0;--white:#ffffff;
  --teal:#4a8a7a;--teal-pale:#d6ebe4;
  --shadow:0 2px 12px rgba(44,74,107,.10);--shadow-lg:0 8px 32px rgba(44,74,107,.14);
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);font-size:15px;line-height:1.75;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.top-nav{background:var(--rust);color:#fff;padding:0 20px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.top-nav .logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;letter-spacing:.5px;white-space:nowrap}
.top-nav .logo-ar{font-size:1.15rem;opacity:.75;margin-left:4px}
.top-nav-spacer{flex:1}
.unit-tabs{display:flex;gap:4px;flex-wrap:wrap}
.unit-tab{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 11px;border-radius:18px;cursor:pointer;font-family:inherit;font-size:.72rem;font-weight:500;transition:all .2s;white-space:nowrap}
.unit-tab:hover{background:rgba(255,255,255,.22)}
.unit-tab.active{background:#fff;color:var(--rust);font-weight:600}
.main{display:block;flex:1}
.content{padding:28px 32px;max-width:860px;margin:0 auto}
.page-nav{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.page-nav-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px}
.page-nav-btn:hover{background:var(--rust-pale);border-color:var(--rust-mid);color:var(--rust)}
.page-nav-btn.active{background:var(--rust);border-color:var(--rust);color:#fff}
.page-nav-btn .pnb-num{width:18px;height:18px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.page-nav-btn:not(.active) .pnb-num{background:var(--rust-light);color:var(--rust)}
.lesson-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--rust-light)}
.lesson-num-badge{background:var(--rust);color:#fff;border-radius:var(--r-sm);padding:8px 14px;text-align:center;min-width:60px;flex-shrink:0}
.lesson-num-badge .lnb-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.8}
.lesson-num-badge .lnb-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;line-height:1;margin-top:2px}
.lesson-title-ar{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--rust);line-height:1.15;margin-bottom:4px}
.lesson-title-en{font-size:1.05rem;font-weight:500;color:var(--ink-mid)}
.lesson-title-translit{font-size:.85rem;font-style:italic;color:var(--muted);margin-top:2px}
.page-label{display:inline-flex;align-items:center;gap:6px;background:var(--gold-light);border:1px solid rgba(90,123,163,.3);border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:600;color:var(--gold);margin-bottom:20px;letter-spacing:.3px}
.page-label::before{content:"📄";font-size:.8rem}
.sec{background:linear-gradient(90deg,var(--rust-light),rgba(221,231,242,0));border-left:3px solid var(--rust-mid);padding:10px 16px;margin:24px 0 14px;border-radius:0 var(--r-sm) var(--r-sm) 0}
.sec .sec-ar{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--rust)}
.sec .sec-translit{font-size:.8rem;font-style:italic;color:var(--muted);margin-top:1px}
.sec .sec-en{font-size:.92rem;font-weight:600;color:var(--ink-mid);margin-top:2px}
.point{background:var(--gold-light);border:1px solid rgba(90,123,163,.25);border-radius:var(--r);padding:10px 16px;margin:18px 0 10px;display:flex;align-items:flex-start;gap:10px}
.point-num{background:var(--gold);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;margin-top:1px}
.point-ar{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--rust)}
.point-translit{font-size:.78rem;font-style:italic;color:var(--muted)}
.point-en{font-size:.9rem;font-weight:600;color:var(--ink-mid)}
.defbox{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin:12px 0;box-shadow:var(--shadow)}
.defbox-tag{background:var(--rust);color:#fff;padding:5px 14px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:6px}
.defbox-tag.gold{background:var(--gold)}
.defbox-tag.light{background:var(--rust-light);color:var(--rust)}
.defbox-body{padding:14px 16px}
.defbox-ar{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--ink);line-height:1.8;margin-bottom:6px;text-align:right;direction:rtl}
.defbox-translit{font-style:italic;color:var(--muted);font-size:.85rem;margin-bottom:6px}
.defbox-en{color:var(--ink-mid);font-size:.9rem;line-height:1.65}
.verse{background:var(--rust-pale);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin:14px 0;text-align:center}
.verse .v-ar{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--rust);line-height:2;direction:rtl;margin-bottom:10px}
.verse .v-translit{font-style:italic;color:var(--muted);font-size:.85rem;margin-bottom:8px}
.verse .v-en{color:var(--ink);font-size:.92rem;line-height:1.65;font-style:italic}
.body-text{background:rgba(221,231,242,.35);border-right:3px solid var(--rust-mid);border-radius:var(--r-sm);padding:14px 18px;margin:14px 0}
.body-text .bt-ar{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--ink);line-height:2;direction:rtl;text-align:right;margin-bottom:10px}
.body-text .bt-translit{font-style:italic;color:var(--muted);font-size:.82rem;line-height:1.7;margin-bottom:8px;padding:6px 10px;background:rgba(44,74,107,.04);border-radius:var(--r-sm)}
.body-text .bt-en{color:var(--ink-mid);font-size:.92rem;line-height:1.7}
.body-text .bt-label{display:inline-block;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--rust);background:var(--rust-light);padding:2px 8px;border-radius:10px;margin-bottom:8px}
.verse .v-ref{margin-top:10px;font-size:.75rem;font-weight:600;color:var(--gold);letter-spacing:.3px}
.hadith{background:var(--gold-pale);border:1px solid rgba(90,123,163,.25);border-radius:var(--r);padding:16px 20px;margin:14px 0;position:relative}
.hadith::before{content:"ﷺ";position:absolute;top:12px;right:16px;font-size:1.2rem;color:var(--gold);opacity:.4;font-family:'Cormorant Garamond',serif}
.hadith-label{display:inline-block;background:var(--gold);color:#fff;padding:2px 10px;border-radius:12px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.hadith .h-ar{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--ink);line-height:1.9;direction:rtl;text-align:right;margin-bottom:8px}
.hadith .h-translit{font-style:italic;color:var(--muted);font-size:.84rem;margin-bottom:8px;padding:6px 10px;background:rgba(90,123,163,.06);border-radius:var(--r-sm)}
.hadith .h-en{color:var(--ink-mid);font-size:.9rem;line-height:1.65}
.hadith .h-source{margin-top:10px;font-size:.75rem;color:var(--muted);padding-top:8px;border-top:1px dashed rgba(90,123,163,.3)}
.callout{border-left:4px solid var(--gold);background:var(--gold-light);border-radius:0 var(--r) var(--r) 0;padding:14px 18px;margin:14px 0}
.callout.rust{border-left-color:var(--rust-mid);background:var(--rust-light)}
.callout-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:6px}
.callout.rust .callout-label{color:var(--rust)}
.callout-ar{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--ink);direction:rtl;text-align:center;margin:8px 0}
.callout-translit{font-style:italic;color:var(--muted);font-size:.83rem;text-align:center}
.callout-en{font-size:.9rem;color:var(--ink-mid);line-height:1.65}
.num-list{list-style:none;padding:0}
.num-list li{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px 12px 48px;margin-bottom:8px;position:relative;box-shadow:var(--shadow)}
.num-list li::before{content:attr(data-n);position:absolute;left:12px;top:50%;transform:translateY(-50%);width:24px;height:24px;background:var(--rust);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700}
.num-list li .li-ar{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--rust);font-weight:600;margin-bottom:3px}
.num-list li .li-translit{font-style:italic;color:var(--muted);font-size:.8rem;margin-bottom:2px}
.num-list li .li-en{font-size:.88rem;color:var(--ink-mid)}
.styled-table{width:100%;border-collapse:collapse;margin:14px 0;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.styled-table th{background:var(--rust);color:#fff;padding:10px 14px;text-align:left;font-size:.82rem;font-weight:600;letter-spacing:.3px}
.styled-table td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:.88rem;background:var(--white);vertical-align:top}
.styled-table tr:last-child td{border-bottom:none}
.styled-table tr:nth-child(even) td{background:var(--rust-pale)}
.activity,.assessment{border:2px solid var(--rust-mid);border-radius:var(--r);padding:20px 20px 16px;margin:20px 0;position:relative;background:var(--rust-pale)}
.assessment{border-color:var(--gold);background:var(--gold-pale)}
.section-badge{position:absolute;top:-14px;right:20px;background:var(--rust-mid);color:#fff;padding:4px 16px;border-radius:20px;font-weight:700;font-size:.82rem;box-shadow:var(--shadow)}
.assessment .section-badge{background:var(--gold)}
.activity-intro,.assessment-intro{font-size:.9rem;color:var(--muted);font-style:italic;margin-bottom:12px}
.activity-controls{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
.btn-reveal-all,.btn-hide-all{background:var(--white);border:1.5px solid var(--rust-mid);color:var(--rust);padding:5px 14px;border-radius:16px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:600;transition:all .2s}
.btn-reveal-all:hover{background:var(--rust-mid);color:#fff}
.assessment .btn-reveal-all{border-color:var(--gold);color:var(--gold)}
.assessment .btn-reveal-all:hover{background:var(--gold);color:#fff}
.act-item{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px}
.act-item .act-prompt{font-size:.9rem;color:var(--ink);margin-bottom:6px}
.act-item .act-ar{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--rust);font-weight:600;direction:rtl;text-align:right;margin-bottom:3px}
.act-item .act-translit{font-size:.78rem;font-style:italic;color:var(--muted);margin-bottom:4px}
.btn-answer{background:var(--rust-mid);color:#fff;border:none;padding:5px 12px;border-radius:14px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;transition:all .2s;margin-top:4px}
.btn-answer.open{background:var(--gold)}
.answer-box{display:none;background:var(--rust-light);border-left:3px solid var(--rust-mid);padding:10px 12px;border-radius:0 var(--r-sm) var(--r-sm) 0;margin-top:8px;font-size:.88rem;color:var(--rust);font-weight:500;animation:fadeDown .25s ease}
.answer-box.open{display:block}
.answer-box.gold-box{background:var(--gold-light);border-color:var(--gold);color:var(--ink);font-weight:normal}
.q-item{background:var(--white);border:1px solid rgba(90,123,163,.25);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px}
.q-item .q-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--gold);color:#fff;border-radius:50%;font-weight:700;font-size:.78rem;margin-right:8px;float:left;margin-top:1px}
.q-item .q-en{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.q-item .q-ar{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--ink-mid);direction:rtl;text-align:right}
.q-item .q-translit{font-size:.78rem;font-style:italic;color:var(--muted);margin-top:2px}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.compare-card{border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.compare-card-head{padding:8px 14px;font-weight:700;font-size:.88rem;color:#fff}
.compare-card-head.rust{background:var(--rust)}
.compare-card-head.gold{background:var(--gold)}
.compare-card-head .ch-ar{font-family:'Cormorant Garamond',serif;font-size:1rem;display:block}
.compare-card-head .ch-translit{font-size:.72rem;opacity:.85;font-style:italic}
.compare-card-body{background:var(--white);padding:0}
.compare-card-body li{padding:8px 14px;font-size:.85rem;border-bottom:1px solid var(--border);list-style:none}
.compare-card-body li:last-child{border-bottom:none}
.word-note{display:inline-block;background:var(--gold-light);border:1.5px dashed rgba(90,123,163,.5);padding:2px 10px;border-radius:14px;font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--rust);font-weight:600}
.impl-list{list-style:none;padding:0;margin:8px 0}
.impl-list li{padding:6px 10px 6px 30px;font-size:.88rem;position:relative;margin-bottom:4px}
.impl-list li::before{content:"•";position:absolute;left:10px;color:var(--rust-mid);font-weight:700}
.page-footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:.78rem;color:var(--muted)}
.prev-next{display:flex;gap:8px}
.pn-btn{background:var(--white);border:1px solid var(--border);color:var(--rust);padding:7px 14px;border-radius:var(--r-sm);cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:500;transition:all .2s}
.pn-btn:hover{background:var(--rust);color:#fff;border-color:var(--rust)}
.pn-btn:disabled{opacity:.35;cursor:default}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.page-content{animation:fadeDown .3s ease}
/* STUDY NOTES */
.study-note{position:relative;background:#fdf6e3;border:1.5px solid #e8d4a0;border-radius:var(--r);padding:14px 18px 14px 54px;margin:16px 0;box-shadow:0 2px 10px rgba(90,123,163,.12)}
.study-note::before{content:"📝";position:absolute;left:14px;top:12px;font-size:1.3rem;background:#f5ead0;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid #e8d4a0}
.study-note-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#8a6b1f;margin-bottom:5px;display:block}
.study-note-title{font-weight:700;font-size:.95rem;color:var(--ink);margin-bottom:4px;font-family:'Cormorant Garamond',serif}
.study-note-body{font-size:.88rem;color:var(--ink-mid);line-height:1.65}
.study-note-body strong{color:var(--gold)}
.study-note-body em{font-style:italic;color:var(--rust)}
.study-note.remember{background:#fff5f5;border-color:#e8a5a5}
.study-note.remember::before{content:"⭐";background:#ffe8e8;border-color:#e8a5a5}
.study-note.remember .study-note-label{color:#b85050}
.study-note.watch-out{background:#fff3e8;border-color:#e8b87a}
.study-note.watch-out::before{content:"⚠️";background:#ffe6cc;border-color:#e8b87a}
.study-note.watch-out .study-note-label{color:#a8641a}
.study-note.root-tip{background:#f0f8ff;border-color:#8fb8d8}
.study-note.root-tip::before{content:"🌱";background:#e0ecf5;border-color:#8fb8d8}
.study-note.root-tip .study-note-label{color:#3a6a8a}
.study-note.beginner{background:var(--teal-pale);border-color:var(--teal)}
.study-note.beginner::before{content:"💡";background:var(--teal-pale);border-color:var(--teal)}
.study-note.beginner .study-note-label{color:var(--teal)}
/* VOCAB */
.vocab-page-label{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--rust),var(--rust-mid));color:#fff;border-radius:20px;padding:5px 14px;font-size:.75rem;font-weight:700;margin-bottom:20px;letter-spacing:.5px}
.vocab-page-label::before{content:"📖";font-size:.9rem}
.vocab-section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--rust-mid);margin:24px 0 10px;display:flex;align-items:center;gap:8px}
.vocab-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.vocab-table{width:100%;border-collapse:collapse;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.vocab-table thead tr{background:var(--rust)}
.vocab-table thead th{color:#fff;padding:9px 14px;text-align:left;font-size:.78rem;font-weight:600}
.vocab-table tbody td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:.88rem;background:transparent;vertical-align:top}
.vocab-table tbody tr:last-child td{border-bottom:none}
.vocab-table tbody tr:nth-child(even) td{background:rgba(168,69,31,.03)}
.vtd-ar{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--rust);font-weight:600}
.vtd-translit{font-style:italic;color:var(--muted);font-size:.83rem}
.vtd-type{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.68rem;font-weight:700;text-transform:uppercase}
.vtd-type.noun{background:rgba(168,69,31,.12);color:var(--rust)}
.vtd-type.verb{background:rgba(90,123,163,.15);color:var(--gold)}
.vtd-type.adj{background:rgba(61,82,72,.12);color:var(--ink-mid)}
.vtd-type.phrase{background:rgba(194,99,56,.15);color:var(--rust-mid)}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:8px}
.vcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;position:relative;transition:all .2s;border-left:3px solid var(--rust-light)}
.vcard:hover{box-shadow:var(--shadow-lg);border-left-color:var(--rust-mid);transform:translateY(-1px)}
.vcard.flipped{border-left-color:var(--gold)}
.vcard .vc-ar{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--rust);font-weight:700;line-height:1.2;margin-bottom:4px}
.vcard .vc-translit{font-style:italic;color:var(--muted);font-size:.8rem}
.vcard .vc-back{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.vcard.flipped .vc-back{display:block}
.vcard .vc-meaning{font-size:.9rem;color:var(--ink);font-weight:500}
.vcard .vc-type{margin-top:4px}
.vcard .vc-root{font-size:.78rem;color:var(--muted);margin-top:4px;font-style:italic}
.vcard .vc-hint{position:absolute;bottom:8px;right:10px;font-size:.65rem;color:var(--muted)}
.vcard.flipped .vc-hint{color:var(--gold)}
.vocab-controls{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 16px;align-items:center}
.vocab-ctrl-btn{background:var(--white);border:1.5px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:14px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:500;transition:all .2s}
.vocab-ctrl-btn:hover{border-color:var(--rust-mid);color:var(--rust);background:var(--rust-pale)}
.vocab-count{font-size:.75rem;color:var(--muted);margin-left:auto}
/* FIQH-specific: Ruling chart */
.ruling-chart{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:14px 0}
.ruling-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow);border-top:4px solid var(--rust-mid);text-align:center}
.ruling-card.wajib{border-top-color:#2a8f74}
.ruling-card.mustahabb{border-top-color:#6ab04c}
.ruling-card.mubah{border-top-color:#95a5a6}
.ruling-card.makruh{border-top-color:#e17055}
.ruling-card.haram{border-top-color:#c0392b}
.ruling-card .rc-num{font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:4px}
.ruling-card .rc-ar{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--rust);margin-bottom:3px}
.ruling-card .rc-translit{font-style:italic;color:var(--muted);font-size:.75rem;margin-bottom:6px}
.ruling-card .rc-def{font-size:.78rem;color:var(--ink-mid);line-height:1.4;margin-bottom:6px}
.ruling-card .rc-ex{font-size:.72rem;color:var(--rust);font-weight:600;background:var(--rust-pale);padding:4px 8px;border-radius:4px;display:inline-block}

/* HAMBURGER & DRAWER */
.hamburger{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:4px;border-radius:6px;transition:all .2s}
.hamburger:hover{background:rgba(255,255,255,.12)}
.hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:1px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-backdrop.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:-320px;width:300px;height:100vh;background:var(–white);box-shadow:4px 0 24px rgba(0,0,0,.15);z-index:160;transition:left .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:18px 14px}
.drawer.open{left:0}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(–border)}
.drawer-title{font-family:‘Cormorant Garamond’,serif;font-size:1.25rem;font-weight:700;color:var(–rust)}
.drawer-close{background:none;border:none;cursor:pointer;font-size:1.4rem;color:var(–muted);padding:2px 8px;border-radius:4px;line-height:1}
.drawer-close:hover{background:var(–rust-light);color:var(–rust)}
.drawer-unit{margin-bottom:16px}
.drawer-unit-head{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(–gold);padding:4px 10px 6px;display:flex;align-items:center;gap:6px}
.drawer-unit-head .due-ar{font-family:‘Cormorant Garamond’,serif;font-size:.92rem;font-weight:600;color:var(–rust);text-transform:none;letter-spacing:0;margin-left:auto}
.drawer-lesson{padding:9px 11px;border-radius:var(–r-sm);cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:3px}
.drawer-lesson:hover{background:var(–rust-pale);border-color:var(–border)}
.drawer-lesson.active{background:var(–rust-light);border-color:var(–rust-mid)}
.drawer-lesson .dl-num{font-size:.68rem;font-weight:700;color:var(–gold);text-transform:uppercase;letter-spacing:.8px}
.drawer-lesson .dl-title{font-size:.88rem;font-weight:500;color:var(–ink);line-height:1.35;margin-top:1px}
.drawer-lesson .dl-ar{font-size:.82rem;color:var(–muted);margin-top:1px;font-family:‘Cormorant Garamond’,serif}
.drawer-lesson.active .dl-title{color:var(–rust)}
.drawer-lesson .dl-pages{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.dl-page-dot{width:22px;height:22px;border-radius:50%;background:var(–rust-light);border:1px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:var(–rust);cursor:pointer;transition:all .15s}
.dl-page-dot:hover,.dl-page-dot.active{background:var(–rust);color:#fff;border-color:var(–rust)}

@media(max-width:768px){.content{padding:16px}.compare-grid{grid-template-columns:1fr}.unit-tabs{display:none}.drawer{width:280px;left:-300px}}

function L4P1(){return `

<div class="sec"><div class="sec-ar">الْوُضُوءُ يَجِبُ لِثَلَاثِ عِبَادَاتٍ</div><div class="sec-translit">Al-wuḍūʾu yajibu li-thalāthi ʿibādāt</div><div class="sec-en">Wuḍūʾ is Obligatory for 3 Acts of Worship</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What is wuḍūʾ?</span><div class="study-note-body"><strong>Wuḍūʾ</strong> is the ritual washing Muslims do before prayer. It involves washing the face, arms, wiping the head, and washing the feet in a specific order. Remember Lesson 1? There were <strong>two types</strong> of "dirty" in Islam — ḥadath (invisible) and najāsah (visible). Wuḍūʾ is how we remove <em>ḥadath</em> to prepare for worship.</div></div>

<p style="margin-bottom:10px">Wuḍūʾ is <strong>obligatory (wājib)</strong> before these <strong>3 acts of worship</strong>:</p>

<div class="num-list">
<li data-n="1"><div class="li-ar">الصَّلَاة</div><div class="li-translit">Aṣ-ṣalāh</div><div class="li-en"><strong>Prayer (ṣalāh)</strong> — you cannot pray without wuḍūʾ. This includes all types of prayers: obligatory, sunnah, janāzah (funeral).</div></li>
<li data-n="2"><div class="li-ar">مَسُّ الْمُصْحَفِ</div><div class="li-translit">Massu l-muṣḥaf</div><div class="li-en"><strong>Touching the Muṣḥaf</strong> (physical Qur\u2019an) — you must have wuḍūʾ to touch the Qur\u2019an directly with bare hands.</div></li>
<li data-n="3"><div class="li-ar">الطَّوَاف</div><div class="li-translit">Aṭ-ṭawāf</div><div class="li-en"><strong>Ṭawāf</strong> (circumambulation around the Kaʿbah during ḥajj or ʿumrah).</div></li>
</div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Important notes</span><div class="study-note-body">• <strong>Reading Qur\u2019an from memory or a phone app</strong> doesn\u2019t require wuḍūʾ — only touching the physical muṣḥaf does.<br>• <strong>Listening</strong> to Qur\u2019an doesn\u2019t require wuḍūʾ either.<br>• When reading on your phone, most scholars say wuḍūʾ is not required because you\u2019re touching the screen, not the actual muṣḥaf.</div></div>

<div class="sec"><div class="sec-ar">مَتَى يُسْتَحَبُّ الْوُضُوء</div><div class="sec-translit">Matā yustaḥabbu l-wuḍūʾ</div><div class="sec-en">When Wuḍūʾ is Recommended (Mustaḥabb)</div></div>

<p style="margin-bottom:10px">Wuḍūʾ is recommended in these situations:</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Keeping wuḍūʾ at all times</strong> (al-mudāwamah ʿalā al-wuḍūʾ).</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Thawbān</div><div class="h-ar">«لَا يُحَافِظُ عَلَى الْوُضُوءِ إِلَّا مُؤْمِنٌ»</div><div class="h-translit">Lā yuḥāfiẓu ʿalā l-wuḍūʾi illā muʾmin.</div><div class="h-en"><strong>"No one keeps constantly on wuḍūʾ except a believer."</strong></div><div class="h-source">Narrated by Aḥmad no. 22433 and Ibn Mājah no. 277</div></div>

<div class="num-list">
<li data-n="2"><div class="li-en"><strong>Before going to sleep</strong>.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Al-Barāʾ ibn ʿĀzib</div><div class="h-ar">«إِذَا أَتَيْتَ مَضْجَعَكَ فَتَوَضَّأْ وُضُوءَكَ لِلصَّلَاةِ»</div><div class="h-translit">Idhā atayta maḍjaʿaka fa-tawaḍḍaʾ wuḍūʾaka li-ṣ-ṣalāh.</div><div class="h-en"><strong>"When you go to your bed, make wuḍūʾ as you do for prayer."</strong></div><div class="h-source">Narrated by al-Bukhārī no. 247</div></div>

<div class="num-list">
<li data-n="3"><div class="li-en"><strong>When you\u2019ve done something where mentioning Allah is desired</strong> (e.g., making dhikr or reading Qur\u2019an from memory).</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Al-Muhājir ibn Qunfudh</div><div class="h-ar">«إِنِّي كَرِهْتُ أَنْ أَذْكُرَ اللَّهَ إِلَّا عَلَى طُهْرٍ»</div><div class="h-translit">Innī karihtu an adhkura-llāha illā ʿalā ṭuhr.</div><div class="h-en"><strong>"I dislike to mention Allah except in a state of purity."</strong></div><div class="h-source">Narrated by Ibn Khuzaymah no. 206</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Build a habit!</span><div class="study-note-body">Try to <strong>always be in a state of wuḍūʾ</strong> throughout the day. Many righteous people did this — they renewed wuḍūʾ whenever it broke. The benefits:<br>• You\u2019re always ready for prayer when you hear the adhān<br>• You get extra rewards (each wuḍūʾ is an act of worship)<br>• Angels make duʿāʾ for you while you stay in wuḍūʾ<br>• It\u2019s a sign of a believer according to the hadith above!</div></div>

<div class="activity" id="al4p1">
<div class="section-badge">نَشَاط · Activity</div>
<div class="act-item"><div class="act-prompt"><strong style="color:var(--rust)">بِالتَّعَاوُنِ مَعَ مُعَلِّمِي وَزُمَلَائِي: أَمْلَأُ الْفَرَاغَاتِ السَّابِقَةَ بِمَا يُنَاسِبُهَا.</strong><br><em style="color:var(--muted);font-size:.82rem">Bi-t-taʿāwuni maʿa muʿallimī wa zumalāʾī: amlaʾu l-farāghāti s-sābiqata bi-mā yunāsibuhā.</em><br>In cooperation with my teacher and classmates, I fill in the previous blanks with what\u2019s appropriate.</div></div>
</div>
`;}

function L4P2(){return `

<div class="sec"><div class="sec-ar">فَضَائِلُ الْوُضُوء</div><div class="sec-translit">Faḍāʾilu l-wuḍūʾ</div><div class="sec-en">The Virtues of Wuḍūʾ</div></div>

<p style="margin-bottom:12px">Wuḍūʾ isn\u2019t just about being clean for prayer — it has <strong>many amazing rewards</strong>. Let\u2019s look at 4:</p>

<div class="verse"><div class="v-ar">﴿إِنَّ اللَّهَ يُحِبُّ التَّوَّابِينَ وَيُحِبُّ الْمُتَطَهِّرِينَ﴾</div><div class="v-translit">Inna-llāha yuḥibbu t-tawwābīna wa yuḥibbu l-muṭṭahhirīn.</div><div class="v-en"><strong>"Indeed, Allah loves those who repent and loves those who purify themselves."</strong></div><div class="v-ref">Sūrat al-Baqarah 2:222</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Virtue #1 — Allah loves you!</span><div class="study-note-body">Imagine Allah — the Creator of everything — <em>loves</em> you specifically because you\u2019re making wuḍūʾ? That\u2019s what this verse says! Every time you wash for wuḍūʾ, you\u2019re among those Allah says He loves. Subḥān Allāh. Isn\u2019t that worth the few minutes?</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Virtue #2: Raises your rank</div><div class="h-ar">«أَلَا أَدُلُّكُمْ عَلَى مَا يَمْحُو اللَّهُ بِهِ الْخَطَايَا وَيَرْفَعُ بِهِ الدَّرَجَاتِ؟» قَالُوا: بَلَى يَا رَسُولَ اللَّهِ. قَالَ: «إِسْبَاغُ الْوُضُوءِ عَلَى الْمَكَارِهِ، وَكَثْرَةُ الْخُطَا إِلَى الْمَسَاجِدِ، وَانْتِظَارُ الصَّلَاةِ بَعْدَ الصَّلَاةِ»</div><div class="h-translit">A-lā adullukum ʿalā mā yamḥū-llāhu bihi l-khaṭāyā wa yarfaʿu bihi d-darajāt? Qālū: balā yā rasūla-llāh. Qāla: Isbāghu l-wuḍūʾi ʿalā l-makārih, wa kathratu l-khuṭā ilā l-masājid, wa intiẓāru ṣ-ṣalāti baʿda ṣ-ṣalāh.</div><div class="h-en">"Shall I not point you to that by which Allah erases sins and raises ranks?" They said: "Of course, O Messenger of Allah." He said: <strong>"(1) Performing wuḍūʾ thoroughly even when it\u2019s difficult (like in cold weather), (2) taking many steps to the masjid, and (3) waiting for the next prayer after finishing one."</strong></div><div class="h-source">Narrated by Muslim no. 251</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What does "isbāghu l-wuḍūʾi ʿalā l-makārih" mean?</span><div class="study-note-body"><strong>Isbāgh (إسباغ)</strong> = doing wuḍūʾ thoroughly, completely — not rushing.<br>
<strong>Makārih (مكاره)</strong> = things that are hard or unpleasant.<br><br>
So the phrase means: <em>doing wuḍūʾ properly even when conditions are difficult</em> — like when the water is freezing cold in winter! The Prophet ﷺ promised that if you push through discomfort to do wuḍūʾ properly, Allah erases your sins and raises your status in Paradise.</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Virtue #3: Sins fall off</div><div class="h-ar">«مَنْ تَوَضَّأَ فَأَحْسَنَ الْوُضُوءَ، خَرَجَتْ خَطَايَاهُ مِنْ جَسَدِهِ، حَتَّى تَخْرُجَ مِنْ تَحْتِ أَظْفَارِهِ»</div><div class="h-translit">Man tawaḍḍaʾa fa-aḥsana l-wuḍūʾa, kharajat khaṭāyāhu min jasadihi, ḥattā takhruja min taḥti aẓfārih.</div><div class="h-en"><strong>"Whoever makes wuḍūʾ and does it well — his sins leave his body, until they come out from beneath his fingernails."</strong></div><div class="h-source">Narrated by Muslim no. 245</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Amazing image!</span><div class="study-note-body">Picture this: as water flows over your body during wuḍūʾ, your sins flow out with it — even from <em>under your fingernails</em>! By the end, you\u2019re physically clean AND spiritually clean. That\u2019s why doing wuḍūʾ <em>well</em> (not rushed) matters so much — more care = more sins washed away.</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Virtue #4: Shining on Day of Judgement</div><div class="h-ar">«تَبْلُغُ الْحِلْيَةُ مِنَ الْمُؤْمِنِ حَيْثُ يَبْلُغُ الْوُضُوءُ»</div><div class="h-translit">Tablughu l-ḥilyatu mina l-muʾmini ḥaythu yablughu l-wuḍūʾ.</div><div class="h-en"><strong>"The adornment (bright light) of the believer on the Day of Judgement reaches as far as the wuḍūʾ reaches (on their body)."</strong></div><div class="h-source">Narrated by Muslim no. 250</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Your wuḍūʾ will glow!</span><div class="study-note-body">On the Day of Judgement, the Prophet ﷺ will recognize his ummah by a <strong>special bright light</strong> on the places where they used to make wuḍūʾ — their faces, arms, and feet will <em>shine like stars</em>! The more carefully you made wuḍūʾ in dunyā (especially reaching all areas), the brighter your light will be on that great Day. Who wouldn\u2019t want that?!</div></div>
`;}

function L4P3(){return `

<div class="sec"><div class="sec-ar">صِفَةُ الْوُضُوء</div><div class="sec-translit">Ṣifatu l-wuḍūʾ</div><div class="sec-en">How to Perform Wuḍūʾ (Step-by-Step)</div></div>

<div class="verse"><div class="v-ar">﴿يَا أَيُّهَا الَّذِينَ آمَنُوا إِذَا قُمْتُمْ إِلَى الصَّلَاةِ فَاغْسِلُوا وُجُوهَكُمْ وَأَيْدِيَكُمْ إِلَى الْمَرَافِقِ وَامْسَحُوا بِرُؤُوسِكُمْ وَأَرْجُلَكُمْ إِلَى الْكَعْبَيْنِ﴾</div><div class="v-translit">Yā ayyuhā-lladhīna āmanū idhā qumtum ilā ṣ-ṣalāti fa-ghsilū wujūhakum wa aydīyakum ilā l-marāfiq, wa-msaḥū bi-ruʾūsikum wa arjulakum ilā l-kaʿbayn.</div><div class="v-en">"O you who believe! When you rise up for prayer, <strong>wash your faces</strong> and <strong>your hands up to the elbows</strong>, and <strong>wipe your heads</strong>, and <strong>(wash) your feet up to the ankles</strong>."</div><div class="v-ref">Sūrat al-Māʾidah 5:6</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ The Qur\u2019anic basis</span><div class="study-note-body">This verse is <strong>THE</strong> foundation of wuḍūʾ. It mentions 4 main actions: (1) wash face, (2) wash arms to elbows, (3) wipe head, (4) wash feet to ankles. All the details of wuḍūʾ come from the Prophet ﷺ showing us HOW to do what this verse says. Memorize this verse!</div></div>

<p style="margin-bottom:12px">Here are the <strong>9 steps</strong> of a complete wuḍūʾ (as illustrated in the textbook):</p>

<div class="num-list">
<li data-n="1"><div class="li-ar">أَقُولُ: «بِسْمِ اللَّهِ»</div><div class="li-translit">Aqūlu: "Bismi-llāh."</div><div class="li-en"><strong>I say: "Bismillāh"</strong> (In the name of Allah) — at the very start of wuḍūʾ.</div></li>

<li data-n="2"><div class="li-ar">أَغْسِلُ كَفَّيَّ ثَلَاثَ مَرَّاتٍ.</div><div class="li-translit">Aghsilu kaffayya thalātha marrāt.</div><div class="li-en"><strong>I wash both hands (wrists) 3 times.</strong></div></li>

<li data-n="3"><div class="li-ar">أَتَمَضْمَضُ وَأَسْتَنْشِقُ بِيَدِي الْيُمْنَى، ثُمَّ أَسْتَنْثِرُ بِيَدِي الْيُسْرَى، أُكَرِّرُ ذَلِكَ ثَلَاثَ مَرَّاتٍ.</div><div class="li-translit">Atamaḍmaḍu wa astanshiqu bi-yadiya l-yumnā, thumma astanthiru bi-yadiya l-yusrā, ukarriru dhālika thalātha marrāt.</div><div class="li-en"><strong>I rinse my mouth (madmaḍah) and draw water into my nose (istinshāq) with my right hand, then blow it out (istinthār) with my left hand — repeating 3 times.</strong></div></li>

<li data-n="4"><div class="li-ar">أَغْسِلُ وَجْهِي مِنْ مَنَابِتِ شَعْرِ الرَّأْسِ إِلَى مَا انْحَدَرَ مِنَ اللِّحْيَيْنِ طُولًا، وَمِنَ الْأُذُنِ إِلَى الْأُذُنِ عَرْضًا، أُكَرِّرُ ذَلِكَ ثَلَاثَ مَرَّاتٍ.</div><div class="li-translit">Aghsilu wajhī min manābiti shaʿri r-raʾsi ilā mā-nḥadara mina l-liḥyayni ṭūlan, wa mina l-udhni ilā l-udhni ʿarḍan, ukarriru dhālika thalātha marrāt.</div><div class="li-en"><strong>I wash my face</strong> — from <strong>the hairline of the head</strong> down to what descends from the <strong>two jawbones</strong> (lengthwise), and from <strong>ear to ear</strong> (widthwise) — <strong>repeating 3 times.</strong></div></li>

<li data-n="5"><div class="li-ar">أَغْسِلُ يَدِي الْيُمْنَى مِنْ أَطْرَافِ الْأَصَابِعِ إِلَى الْمِرْفَقِ ثَلَاثَ مَرَّاتٍ، ثُمَّ أَغْسِلُ يَدِي الْيُسْرَى مِنْ أَطْرَافِ الْأَصَابِعِ إِلَى الْمِرْفَقِ ثَلَاثَ مَرَّاتٍ.</div><div class="li-translit">Aghsilu yadiya l-yumnā min aṭrāfi l-aṣābiʿi ilā l-mirfaqi thalātha marrāt, thumma aghsilu yadiya l-yusrā min aṭrāfi l-aṣābiʿi ilā l-mirfaqi thalātha marrāt.</div><div class="li-en"><strong>I wash my right arm</strong> from fingertips up to the elbow 3 times, then the <strong>left arm</strong> from fingertips to elbow 3 times.</div></li>

<li data-n="6"><div class="li-ar">أَبُلُّ يَدَيَّ بِالْمَاءِ ثُمَّ أَمْسَحُ بِهِمَا رَأْسِي، أَبْتَدِئُ مِنْ مُقَدَّمِ الرَّأْسِ حَتَّى أَصِلَ إِلَى قَفَاهُ، ثُمَّ أُعِيدُهُمَا إِلَى مُقَدَّمِ الرَّأْسِ مَرَّةً أُخْرَى، أَفْعَلُ ذَلِكَ مَرَّةً وَاحِدَةً.</div><div class="li-translit">Abullu yadayya bi-l-māʾi thumma amsaḥu bihimā raʾsī, abtadiʾu min muqaddami r-raʾsi ḥattā aṣila ilā qafāh, thumma uʿīduhumā ilā muqaddami r-raʾsi marratan ukhrā, afʿalu dhālika marratan wāḥidah.</div><div class="li-en"><strong>I wet my hands with water and wipe my head</strong> — starting from the <strong>front of the head</strong>, passing to the <strong>nape</strong>, then bringing them back to the front — doing this <strong>ONCE</strong>.</div></li>

<li data-n="7"><div class="li-ar">أَمْسَحُ أُذُنَيَّ، بَاطِنَهُمَا بِإِصْبَعَيِ السَّبَّابَتَيْنِ، وَظَاهِرَهُمَا بِإِبْهَامَيَّ، أَفْعَلُ ذَلِكَ مَرَّةً وَاحِدَةً.</div><div class="li-translit">Amsaḥu udhunayya, bāṭinahumā bi-iṣbaʿayi s-sabbābatayn, wa ẓāhirahumā bi-ibhāmayya, afʿalu dhālika marratan wāḥidah.</div><div class="li-en"><strong>I wipe my ears</strong> — the <strong>inner part with my two index fingers</strong>, and the <strong>outer part with my thumbs</strong> — doing this <strong>ONCE</strong>.</div></li>

<li data-n="8"><div class="li-ar">أَغْسِلُ رِجْلِيَ الْيُمْنَى إِلَى الْكَعْبَيْنِ ثَلَاثَ مَرَّاتٍ، ثُمَّ أَغْسِلُ رِجْلِيَ الْيُسْرَى إِلَى الْكَعْبَيْنِ ثَلَاثَ مَرَّاتٍ.</div><div class="li-translit">Aghsilu rijliya l-yumnā ilā l-kaʿbayni thalātha marrāt, thumma aghsilu rijliya l-yusrā ilā l-kaʿbayni thalātha marrāt.</div><div class="li-en"><strong>I wash my right foot</strong> up to the ankles 3 times, then the <strong>left foot</strong> up to the ankles 3 times.</div></li>

<li data-n="9"><div class="li-ar">أَقُولُ بَعْدَ انْتِهَاءِ الْوُضُوءِ: «أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ، وَأَنَّ مُحَمَّدًا عَبْدُ اللَّهِ وَرَسُولُهُ».</div><div class="li-translit">Aqūlu baʿda intihāʾi l-wuḍūʾi: "Ashhadu an lā ilāha illā-llāh, wa anna Muḥammadan ʿabdu-llāhi wa rasūluh."</div><div class="li-en"><strong>After finishing, I say:</strong> "I bear witness that none has the right to be worshipped except Allah, and that Muḥammad is His servant and messenger."</div></li>
</div>

<div class="study-note beginner"><span class="study-note-label">💡 Quick memory rule</span><div class="study-note-body"><strong>Hands → Mouth/Nose → Face → Arms → Head → Ears → Feet</strong><br><br>
Notice the <em>order</em>: top of body to bottom! Also notice which parts are <strong>washed (3 times)</strong> and which are <strong>wiped (1 time)</strong>:<br>
• Washed 3x: hands, face, arms, feet<br>
• Wiped 1x: head, ears (part of the head!)<br><br>
This matches Sūrat al-Māʾidah 5:6 exactly!</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Reward for closing duʿāʾ</div><div class="h-ar">«مَا مِنْكُمْ مِنْ أَحَدٍ يَتَوَضَّأُ فَيُبْلِغُ - أَوْ فَيُسْبِغُ - الْوُضُوءَ، ثُمَّ يَقُولُ: أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ وَأَنَّ مُحَمَّدًا عَبْدُ اللَّهِ وَرَسُولُهُ، إِلَّا فُتِحَتْ لَهُ أَبْوَابُ الْجَنَّةِ الثَّمَانِيَةُ يَدْخُلُ مِنْ أَيِّهَا شَاءَ»</div><div class="h-translit">Mā minkum min aḥadin yatawaḍḍaʾu fa-yublighu - aw fa-yusbighu - l-wuḍūʾa, thumma yaqūlu: ashhadu an lā ilāha illā-llāh wa anna Muḥammadan ʿabdu-llāhi wa rasūluh, illā futiḥat lahu abwābu l-jannati th-thamāniyatu yadkhulu min ayyihā shāʾ.</div><div class="h-en"><strong>"There is no one among you who makes wuḍūʾ and does it completely, then says: \"Ashhadu an lā ilāha illā-llāh wa anna Muḥammadan ʿabdu-llāhi wa rasūluh,\" except that the eight gates of Paradise will be opened for him — he may enter through whichever he wishes!"</strong></div><div class="h-source">Narrated by Muslim no. 234</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ EIGHT gates of Paradise!</span><div class="study-note-body">Did you know Paradise has 8 gates? And this simple duʿāʾ after wuḍūʾ opens <strong>all of them</strong> for you! That\u2019s a mind-blowing reward for just a few words. Never skip the closing duʿāʾ of wuḍūʾ!</div></div>
`;}

function L4P4(){return `

<div class="sec"><div class="sec-ar">شُرُوطُ الْوُضُوء</div><div class="sec-translit">Shurūṭu l-wuḍūʾ</div><div class="sec-en">Conditions of Wuḍūʾ</div></div>

<p style="margin-bottom:10px">For wuḍūʾ to be <strong>valid</strong>, these conditions must be met:</p>

<div class="num-list">
<li data-n="1"><div class="li-ar">النِّيَّة</div><div class="li-translit">An-niyyah</div><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">مَحَلُّ النِّيَّةِ الْقَلْبُ، وَالتَّلَفُّظُ بِهَا بِدْعَةٌ، وَكُلُّ مَنْ أَرَادَ الْوُضُوءَ فَقَدْ نَوَى، أَمَّا غَسْلُ أَعْضَاءِ الْوُضُوءِ بِنِيَّةِ التَّبَرُّدِ أَوِ التَّنَظُّفِ فَلَيْسَ بِوُضُوءٍ.</em><strong>Intention</strong> — its place is the <strong>heart</strong>; uttering it out loud is <strong>bidʿah</strong> (innovation). Whoever wants to make wuḍūʾ has already intended it. But if someone washes the wuḍūʾ-parts intending <strong>to cool down or just clean up</strong> (not wuḍūʾ), <strong>it is not a valid wuḍūʾ</strong>.</div></li>
<li data-n="2"><div class="li-ar">طَهَارَةُ الْمَاء</div><div class="li-translit">Ṭahāratu l-māʾ</div><div class="li-en"><strong>Purity of the water</strong> — it must be <em>ṭahūr</em> water (remember Lesson 1!). Water changed by impurity cannot be used.</div></li>
<li data-n="3"><div class="li-ar">إِزَالَةُ مَا يَمْنَعُ وُصُولَ الْمَاءِ إِلَى الْبَشَرَةِ</div><div class="li-translit">Izālatu mā yamnaʿu wuṣūla l-māʾi ilā l-basharah</div><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">إِذَا وُجِدَ عَلَى أَعْضَاءِ الْوُضُوءِ صَمْغٌ أَوْ صِبْغٌ لَهُ جِرْمٌ (كَطِلَاءِ الْأَظْفَارِ لِلنِّسَاءِ وَالْعَجِينِ) وَنَحْوِهِمَا مِمَّا يَمْنَعُ وُصُولَ الْمَاءِ لِلْبَشَرَةِ لَمْ يَصِحَّ الْوُضُوءُ.</em><strong>Removing anything that blocks water from reaching the skin.</strong> If there is gum, a substance-having dye (like <strong>nail polish</strong> for women, or dough), or anything similar on the wuḍūʾ body parts <strong>that prevents water from reaching the skin</strong>, <strong>the wuḍūʾ is not valid</strong>.</div></li>
</div>

<div class="body-text"><div class="bt-label">📖 Reminder (تَذَكَّرْ)</div><div class="bt-ar">بَعْضُ النَّاسِ يَظُنُّ أَنَّ مِنَ الْوَاجِبِ عَلَيْهِ قَبْلَ كُلِّ وُضُوءٍ أَنْ يَسْتَنْجِيَ بِالْمَاءِ، وَهَذَا خَطَأٌ، وَالصَّحِيحُ أَنَّ الاِسْتِنْجَاءَ لَا يَجِبُ إِلَّا بَعْدَ قَضَاءِ الْحَاجَةِ.</div><div class="bt-translit">Baʿḍu n-nāsi yaẓunnu anna mina l-wājibi ʿalayhi qabla kulli wuḍūʾin an yastanjiya bi-l-māʾ, wa hādhā khaṭaʾ, wa ṣ-ṣaḥīḥu anna l-istinjāʾa lā yajibu illā baʿda qaḍāʾi l-ḥājah.</div><div class="bt-en"><strong>Common misconception:</strong> Some people think it is obligatory to perform istinjāʾ (cleaning with water) <strong>before every wuḍūʾ</strong>. <strong>This is wrong!</strong> The correct view: istinjāʾ is only required <strong>after relieving oneself</strong> — not before wuḍūʾ itself.</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Very practical note on nail polish!</span><div class="study-note-body">This is super important, especially for women: <strong>regular nail polish blocks water from reaching the nail</strong>. That means wuḍūʾ made with nail polish on is <em>not valid</em>, and the prayer afterward is <em>not valid</em>.<br><br>
Solution: Remove nail polish before wuḍūʾ, <strong>OR</strong> use special "breathable/water-permeable" nail polish designed for Muslim women (it lets water pass through).<br><br>
Same rule applies to: thick paint, glue, tar, anything stuck hard on the skin.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Niyyah is in the heart, not on the tongue!</span><div class="study-note-body">Many people think you have to <em>say</em> "I intend to make wuḍūʾ" out loud. <strong>This is wrong</strong> — in fact, saying it out loud is a bidʿah (innovation) the Prophet ﷺ never did!<br><br>
The intention is automatic: the moment you decide "I\u2019m going to make wuḍūʾ" in your heart, that\u2019s the niyyah. No words needed. Just start washing!</div></div>

<div class="sec"><div class="sec-ar">فُرُوضُ الْوُضُوء</div><div class="sec-translit">Furūḍu l-wuḍūʾ</div><div class="sec-en">The Pillars (Obligatory Parts) of Wuḍūʾ</div></div>

<div class="body-text"><div class="bt-ar">فُرُوضُ الْوُضُوءِ هِيَ: الْأُمُورُ الَّتِي لَا يَصِحُّ الْوُضُوءُ إِلَّا بِهَا، فَمَنْ تَرَكَ وَاحِدًا مِنْهَا أَوْ بَعْضَهُ بِغَيْرِ عُذْرٍ، لَمْ يَصِحَّ وُضُوؤُهُ.</div><div class="bt-translit">Furūḍu l-wuḍūʾi hiya: al-umūru llatī lā yaṣiḥḥu l-wuḍūʾu illā bihā, fa-man taraka wāḥidan minhā aw baʿḍahu bi-ghayri ʿudhrin, lam yaṣiḥḥa wuḍūʾuh.</div><div class="bt-en">The <strong>pillars (furūḍ) of wuḍūʾ</strong> are: the things without which <strong>wuḍūʾ is not valid</strong>. Whoever leaves <strong>one of them, or even part of one, without a valid excuse</strong> — <strong>his wuḍūʾ is invalid</strong>.</div></div>

<p style="margin-bottom:10px">The <strong>pillars (furūḍ)</strong> are the <em>essential parts</em> without which wuḍūʾ is not valid. There are <strong>6</strong>:</p>

<div class="ruling-chart">
  <div class="ruling-card wajib"><div class="rc-num">1</div><div class="rc-ar">غَسْلُ الْوَجْه</div><div class="rc-translit">Ghaslu l-wajh</div><div class="rc-def"><strong>Washing the face</strong> — includes rinsing mouth (maḍmaḍah) and nose (istinshāq)</div></div>
  <div class="ruling-card wajib"><div class="rc-num">2</div><div class="rc-ar">غَسْلُ الْيَدَيْنِ مَعَ الْمِرْفَقَيْن</div><div class="rc-translit">Ghaslu l-yadayni maʿa l-mirfaqayn</div><div class="rc-def"><strong>Washing the arms including the elbows</strong></div></div>
  <div class="ruling-card wajib"><div class="rc-num">3</div><div class="rc-ar">مَسْحُ جَمِيعِ الرَّأْسِ وَمِنْهُ الْأُذُنَان</div><div class="rc-translit">Masḥu jamīʿi r-raʾsi wa minhu l-udhunān</div><div class="rc-def"><strong>Wiping the entire head</strong> — including the ears</div></div>
  <div class="ruling-card wajib"><div class="rc-num">4</div><div class="rc-ar">غَسْلُ الرِّجْلَيْنِ مَعَ الْكَعْبَيْن</div><div class="rc-translit">Ghaslu r-rijlayni maʿa l-kaʿbayn</div><div class="rc-def"><strong>Washing the feet including the ankles</strong></div></div>
  <div class="ruling-card wajib"><div class="rc-num">5</div><div class="rc-ar">التَّرْتِيب</div><div class="rc-translit">At-tartīb</div><div class="rc-def"><strong>Order</strong> — following the exact order above (face → arms → head → feet)</div></div>
  <div class="ruling-card wajib"><div class="rc-num">6</div><div class="rc-ar">الْمُوَالَاة</div><div class="rc-translit">Al-muwālāh</div><div class="rc-def"><strong>Continuity</strong> — don\u2019t leave long gaps between washing parts; previous part shouldn\u2019t dry completely before next</div></div>
</div>

<div class="study-note remember"><span class="study-note-label">⭐ Memory trick: "FAHF + Order + Continuity"</span><div class="study-note-body"><strong>F</strong>ace → <strong>A</strong>rms → <strong>H</strong>ead → <strong>F</strong>eet + Order (tartīb) + Continuity (muwālāh)<br><br>
If you skip one of the 4 body parts, your wuḍūʾ is invalid. If you do them out of order, invalid. If you take a long break in the middle (the water dries on the washed parts), invalid.<br><br>
That\u2019s why these are called <em>furūḍ</em> — pillars that must all stand together for the building to stay up!</div></div>

<div class="sec"><div class="sec-ar">سُنَنُ الْوُضُوء</div><div class="sec-translit">Sunanu l-wuḍūʾ</div><div class="sec-en">The Sunnahs (Recommended Acts) of Wuḍūʾ</div></div>

<p style="margin-bottom:10px">These are <strong>mustaḥabb</strong> — extra actions that bring more reward but aren\u2019t required:</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Washing the hands/wrists</strong> at the <em>beginning</em> of wuḍūʾ.</div></li>
<li data-n="2"><div class="li-ar">التَّيَامُن</div><div class="li-translit">At-tayāmun</div><div class="li-en"><strong>Starting from the right side</strong> (right arm before left, right foot before left).</div></li>
<li data-n="3"><div class="li-ar">التَّسَوُّك</div><div class="li-translit">At-tasawwuk</div><div class="li-en"><strong>Using the siwāk</strong> before wuḍūʾ.</div></li>
<li data-n="4"><div class="li-en"><strong>Washing each part 3 times</strong> (minimum is once, 3 is best).</div></li>
<li data-n="5"><div class="li-en"><strong>Running water between the fingers and toes</strong> (takhlīl) to make sure water reaches the skin.</div></li>
</div>

<div class="study-note beginner"><span class="study-note-label">💡 Pillars vs Sunnahs — what\u2019s the difference?</span><div class="study-note-body"><strong>Pillars (furūḍ)</strong> = MUST do. Skip them → wuḍūʾ invalid → prayer invalid.<br>
<strong>Sunnahs</strong> = SHOULD do. Skip them → wuḍūʾ is still valid, but you get less reward.<br><br>
Think of building a house: <em>Pillars</em> are the structural columns (remove them and the house falls). <em>Sunnahs</em> are the paint, carpeting, nice furniture (house still stands without them, but it\u2019s much nicer with them).</div></div>
`;}

function L4P5(){return `

<div class="sec"><div class="sec-ar">نَوَاقِضُ الْوُضُوء</div><div class="sec-translit">Nawāqiḍu l-wuḍūʾ</div><div class="sec-en">Nullifiers of Wuḍūʾ (What Breaks It)</div></div>

<p style="margin-bottom:10px">Your wuḍūʾ <strong>breaks</strong> (and you must redo it) when any of these happen:</p>

<div class="num-list">
<li data-n="1"><div class="li-ar">كُلُّ خَارِجٍ مِنَ السَّبِيلَيْنِ</div><div class="li-translit">Kullu khārijin mina s-sabīlayn</div><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">كُلُّ خَارِجٍ مِنَ السَّبِيلَيْنِ، مِثْلَ: الْبَوْلِ وَالْغَائِطِ وَالرِّيحِ.</em><strong>Anything exiting from the two "exits"</strong> (front/back private parts) — such as <strong>urine, feces, and passing gas</strong>.</div></li>
<li data-n="2"><div class="li-ar">مَسُّ الْفَرْجِ بِالْيَدِ مِنْ غَيْرِ حَائِلٍ</div><div class="li-translit">Massu l-farji bi-l-yadi min ghayri ḥāʾil</div><div class="li-en"><strong>Touching the private parts with the hand without a barrier</strong> (bare skin).</div></li>
<li data-n="3"><div class="li-ar">النَّوْمُ الْمُسْتَغْرِقُ وَمَا شَابَهَهُ</div><div class="li-translit">An-nawmu l-mustaghriqu wa mā shābahah</div><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">النَّوْمُ الْمُسْتَغْرِقُ وَمَا شَابَهَهُ كَالْإِغْمَاءِ وَالتَّخْدِيرِ الْكَامِلِ، أَمَّا يَسِيرُ النَّوْمِ (النُّعَاسُ) فَلَا يَنْقُضُ الْوُضُوءَ.</em><strong>Deep (absorbing) sleep and what resembles it</strong> — such as <strong>fainting</strong> and <strong>full anesthesia</strong>. As for <strong>light drowsiness (nuʿās), it does NOT break wuḍūʾ</strong>.</div></li>
<li data-n="4"><div class="li-ar">أَكْلُ لَحْمِ الْإِبِلِ</div><div class="li-translit">Aklu laḥmi l-ibil</div><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">أَكْلُ لَحْمِ الْإِبِلِ، وَلَا يَدْخُلُ فِيهِ لَبَنُهَا أَوِ الْمَرَقُ الَّذِي طُبِخَ فِيهِ لَحْمُهَا.</em><strong>Eating camel meat.</strong> This does <strong>not</strong> include its <strong>milk</strong>, nor the <strong>broth</strong> in which its meat was cooked.</div></li>
</div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ The camel meat rule is unique</span><div class="study-note-body">Why camel meat specifically? The Prophet ﷺ was <strong>directly asked</strong>: "Should we do wuḍūʾ after eating camel meat?" He said: <strong>"Yes."</strong> Then he was asked: "Should we do wuḍūʾ after eating sheep meat?" He said: <strong>"If you wish."</strong><br><br>
So camel meat is special — if you eat it, you MUST redo wuḍūʾ. The wisdom might be connected to the nature of camels themselves (they\u2019re described in some hadiths as created from shayāṭīn). We follow the command even if we don\u2019t fully understand the wisdom — that\u2019s taslīm (submission).</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Deep sleep vs light sleep</span><div class="study-note-body">You\u2019re lying down, eyes closed, but you can still hear the TV or your mom talking? That\u2019s <strong>light drowsiness</strong> — wuḍūʾ is fine!<br><br>
You\u2019re totally out, unaware of what\u2019s happening, woke up surprised? That\u2019s <strong>deep sleep</strong> — wuḍūʾ is broken, redo it before prayer.<br><br>
The reason? When you\u2019re completely asleep, you might pass gas without realizing. So the Prophet ﷺ made deep sleep a nullifier, just to be safe.</div></div>

<div class="sec"><div class="sec-ar">مِنْ أَحْكَامِ الْوُضُوء</div><div class="sec-translit">Min aḥkāmi l-wuḍūʾ</div><div class="sec-en">Some Important Rulings on Wuḍūʾ</div></div>

<div class="num-list">
<li data-n="1"><div class="li-ar">مَنْ صَلَّى بِغَيْرِ وُضُوءٍ نَاسِيًا وَجَبَ عَلَيْهِ إِعَادَةُ الصَّلَاةِ.</div><div class="li-translit">Man ṣallā bi-ghayri wuḍūʾin nāsiyan wajaba ʿalayhi iʿādatu ṣ-ṣalāh.</div><div class="li-en"><strong>Whoever prays without wuḍūʾ forgetfully</strong> — he must <strong>redo the prayer</strong>.</div></li>
<li data-n="2"><div class="li-ar">يَجِبُ الْحِرْصُ عَلَى إِيصَالِ الْمَاءِ لِجَمِيعِ الْأَعْضَاءِ الْوَاجِبِ غَسْلُهَا.</div><div class="li-translit">Yajibu l-ḥirṣu ʿalā īṣāli l-māʾi li-jamīʿi l-aʿḍāʾi l-wājibi ghasluhā.</div><div class="li-en"><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:4px;line-height:1.8">وَمِنْ ذَلِكَ: مَا بَيْنَ الْأَصَابِعِ، وَالْمِرْفَقَانِ، وَالْكَعْبَانِ، وَالْبَيَاضُ الَّذِي بَيْنَ الْأُذُنِ وَالْعَارِضِ فِي غَسْلِ الْوَجْهِ.</em><strong>Make sure water reaches EVERY spot</strong> that must be washed — including: <strong>between the fingers, the elbows, the ankles,</strong> and the <strong>white skin between the ear and the beard/sideburns</strong> when washing the face.</div></li>
<li data-n="3"><div class="li-ar">يَجُوزُ غَسْلُ أَعْضَاءِ الْوُضُوءِ مَرَّةً مَرَّةً، أَوْ مَرَّتَيْنِ مَرَّتَيْنِ، أَوْ ثَلَاثًا ثَلَاثًا، أَوْ بَعْضَهَا مَرَّةً وَبَعْضَهَا مَرَّتَيْنِ وَبَعْضَهَا ثَلَاثًا.</div><div class="li-translit">Yajūzu ghaslu aʿḍāʾi l-wuḍūʾi marratan marrah, aw marratayni marratayn, aw thalāthan thalāthan, aw baʿḍahā marratan wa baʿḍahā marratayn wa baʿḍahā thalāthan.</div><div class="li-en">It is <strong>permitted to wash the wuḍūʾ-parts: once each, twice each, thrice each, or some once and some twice and some thrice</strong>. All are valid.</div></li>
<li data-n="4"><div class="li-ar">مَنْ شَكَّ فِي غَسْلِ أَحَدِ أَعْضَائِهِ بَعْدَ انْتِهَاءِ الْوُضُوءِ لَمْ يَلْتَفِتْ إِلَى هَذَا الشَّكِّ.</div><div class="li-translit">Man shakka fī ghasli aḥadi aʿḍāʾihi baʿda intihāʾi l-wuḍūʾi lam yaltafit ilā hādhā sh-shakk.</div><div class="li-en"><strong>Whoever doubts whether he washed one of his parts AFTER finishing wuḍūʾ</strong> — <strong>should not pay attention to this doubt</strong>. His wuḍūʾ is valid.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Warning for dry heels!</div><div class="h-ar">«وَيْلٌ لِلْأَعْقَابِ مِنَ النَّارِ»</div><div class="h-translit">Waylun li-l-aʿqābi mina n-nār.</div><div class="h-en"><strong>"Woe to the heels from the Fire!"</strong></div><div class="h-source">Narrated by al-Bukhārī no. 60 and Muslim no. 240</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ The story behind this warning</span><div class="study-note-body">The Prophet ﷺ saw some companions making wuḍūʾ in a rush — they splashed water so quickly that <strong>their heels stayed dry</strong>. The Prophet ﷺ raised his voice and shouted <em>"Woe to the heels from the Fire!"</em><br><br>
<strong>Lesson:</strong> Don\u2019t rush wuḍūʾ! Make sure water reaches <em>every</em> spot — especially the <strong>heels</strong>, <strong>elbows</strong>, and between the toes. These are places people commonly miss. A careless wuḍūʾ that leaves dry spots can make your prayer invalid AND bring punishment.</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Don\u2019t fall into waswasah (doubts)!</span><div class="study-note-body">Some people get stuck in constant doubt: "Did I wash my arm 3 times? Maybe I missed a spot..." They keep redoing their wuḍūʾ, sometimes 5-10 times! This is called <strong>waswasah</strong> (whispers from Shayṭān) and is a trap.<br><br>
<strong>The rule:</strong> After you finish wuḍūʾ, if you doubt whether you did something, <em>ignore the doubt</em>. Your wuḍūʾ is valid. Shayṭān wants to exhaust you and distract you from actual worship — don\u2019t let him!</div></div>
`;}

function L4P6(){return `

<div class="sec"><div class="sec-ar">السِّوَاك</div><div class="sec-translit">As-siwāk</div><div class="sec-en">The Siwāk (Tooth-Stick)</div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">السِّوَاكُ خَصْلَةٌ مِنْ خِصَالِ الْفِطْرَةِ، يُسَنُّ لِلرَّجُلِ وَالْمَرْأَةِ، وَالصَّغِيرِ وَالْكَبِيرِ، وَالصَّائِمِ وَالْمُفْطِرِ.</div><div class="bt-translit">As-siwāku khaṣlatun min khiṣāli l-fiṭrah, yusannu li-r-rajuli wa l-marʾah, wa ṣ-ṣaghīri wa l-kabīr, wa ṣ-ṣāʾimi wa l-mufṭir.</div><div class="bt-en">The siwāk is a <strong>quality from the natural qualities (fiṭrah)</strong>. It is <strong>sunnah</strong> for <strong>men and women, young and old, the fasting and the non-fasting</strong>.</div></div>

<div class="defbox"><div class="defbox-tag">📌 What is the siwāk?</div><div class="defbox-body"><div class="defbox-en">The <strong>siwāk (also called <em>miswāk</em>)</strong> is a thin stick cut from the roots of the <em>arak</em> tree (Salvadora persica), used to clean the teeth. It was the original "toothbrush" used by the Prophet ﷺ and is a beloved sunnah.</div></div></div>

<div class="body-text"><div class="bt-ar">وَهُوَ سُنَّةٌ مُؤَكَّدَةٌ، أَمَرَ بِهِ النَّبِيُّ ﷺ وَحَثَّ عَلَيْهِ فِي أَحَادِيثَ كَثِيرَةٍ.</div><div class="bt-translit">Wa huwa sunnatun muʾakkadatun, amara bihi n-nabiyyu ﷺ wa ḥaththa ʿalayhi fī aḥādītha kathīrah.</div><div class="bt-en">It is a <strong>sunnah muʾakkadah (strongly emphasized sunnah)</strong> — the Prophet ﷺ commanded and urged its use in <strong>many hadiths</strong>.</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Importance of siwāk</div><div class="h-ar">«لَوْلَا أَنْ أَشُقَّ عَلَى أُمَّتِي لَأَمَرْتُهُمْ بِالسِّوَاكِ مَعَ كُلِّ صَلَاةٍ»</div><div class="h-translit">Law-lā an ashuqqa ʿalā ummatī la-amartuhum bi-s-siwāki maʿa kulli ṣalāh.</div><div class="h-en"><strong>"If I didn\u2019t fear it would be hard on my ummah, I would have ordered them to use the siwāk with every prayer."</strong></div><div class="h-source">Narrated by al-Bukhārī no. 887 and Muslim no. 252</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ The Prophet\u2019s ﷺ mercy!</span><div class="study-note-body">Look at the mercy of the Prophet ﷺ: he <em>wanted</em> to command us to use siwāk 5 times a day (before every prayer), but he held back <em>because he didn\u2019t want to make things hard</em> for his ummah.<br><br>
This tells us: using siwāk is <strong>extremely</strong> beloved to him — just one level below being obligatory. If you want to really love and follow the Prophet ﷺ, pick up this sunnah!</div></div>

<div class="sec"><div class="sec-ar">فَوَائِدُ السِّوَاك</div><div class="sec-translit">Fawāʾidu s-siwāk</div><div class="sec-en">The Benefits of Siwāk</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — ʿĀʾishah</div><div class="h-ar">«السِّوَاكُ مَطْهَرَةٌ لِلْفَمِ، مَرْضَاةٌ لِلرَّبِّ»</div><div class="h-translit">As-siwāku maṭharatun li-l-fam, marḍātun li-r-rabb.</div><div class="h-en"><strong>"The siwāk is a cleanser for the mouth and a means of pleasing the Lord."</strong></div><div class="h-source">Narrated by Aḥmad and an-Nasāʾī (ṣaḥīḥ)</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Two benefits in one tool!</span><div class="study-note-body">Most things give you <em>one</em> benefit. The siwāk gives <strong>two</strong>:<br>
1. <strong>Physical:</strong> cleans your mouth (modern science confirms siwāk has natural antibacterial properties — fluoride, chloride, silica)<br>
2. <strong>Spiritual:</strong> pleases Allah<br><br>
You get dental health AND Allah\u2019s pleasure, all in one simple habit!</div></div>

<div class="sec"><div class="sec-ar">الْحَالَاتُ الَّتِي يَتَأَكَّدُ فِيهَا السِّوَاك</div><div class="sec-translit">Al-ḥālātu llatī yataʾakkadu fīhā s-siwāk</div><div class="sec-en">When Siwāk is Especially Emphasized</div></div>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>When waking up from sleep</strong></div></li>
<li data-n="2"><div class="li-en"><strong>Before making wuḍūʾ</strong></div></li>
<li data-n="3"><div class="li-en"><strong>When the mouth has a bad odor</strong> (after eating strong foods, etc.)</div></li>
<li data-n="4"><div class="li-en"><strong>When entering your home</strong></div></li>
<li data-n="5"><div class="li-en"><strong>Before praying</strong></div></li>
</div>

<div class="sec"><div class="sec-ar">اسْتِخْدَامُ الْفُرْشَاةِ وَالْمَعَاجِينِ الْحَدِيثَة</div><div class="sec-translit">Istikhdāmu l-furshāti wa l-maʿājīni l-ḥadīthah</div><div class="sec-en">Using Modern Toothbrush and Toothpaste</div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">لَمَّا كَانَ الْمَقْصُودُ مِنَ السِّوَاكِ تَنْظِيفَ الْفَمِ وَتَطْيِيبَهُ، فَإِنَّ كُلَّ مَا يُحَقِّقُ هَذَا الْمَقْصَدَ لَهُ حُكْمُ السِّوَاكِ. وَفُرْشَاةُ الْأَسْنَانِ وَالْمَعَاجِينُ الْحَدِيثَةُ تُسْهِمُ فِي تَنْظِيفِ الْفَمِ وَتَطْيِيبِهِ، وَلِذَلِكَ فَإِنَّ لَهَا حُكْمَ السِّوَاكِ فِي الْمَشْرُوعِيَّةِ، إِلَّا أَنَّهَا لَا تُغْنِي عَنْهُ، لِأَنَّ السِّوَاكَ مِنْ هَدْيِ النَّبِيِّ ﷺ وَسُنَّتِهِ، كَمَا يُمْكِنُ اصْطِحَابُ الْمِسْوَاكِ فِي كُلِّ حِينٍ، وَبِخَاصَّةٍ عِنْدَ أَدَاءِ الصَّلَاةِ بِخِلَافِ غَيْرِهِ، كَمَا أَنَّ فِيهِ مَوَادَّ طَبِيعِيَّةً مُنَظِّفَةً وَمُطَهِّرَةً لَا تُوجَدُ فِي غَيْرِهِ.</div><div class="bt-translit">Lammā kāna l-maqṣūdu mina s-siwāki tanẓīfa l-fami wa taṭyībah, fa-inna kulla mā yuḥaqqiqu hādhā l-maqṣada lahu ḥukmu s-siwāk. Wa furshātu l-asnāni wa l-maʿājīnu l-ḥadīthatu tus-himu fī tanẓīfi l-fami wa taṭyībih, wa li-dhālika fa-inna lahā ḥukma s-siwāki fī l-mashrūʿiyyah, illā annahā lā tughnī ʿanh, li-anna s-siwāka min hadyi n-nabiyyi ﷺ wa sunnatih, kamā yumkinu ṣṭiḥābu l-miswāki fī kulli ḥīn, wa bi-khāṣṣatin ʿinda adāʾi ṣ-ṣalāti bi-khilāfi ghayrih, kamā anna fīhi mawādda ṭabīʿiyyatan munaẓẓifatan wa muṭahhiratan lā tūjadu fī ghayrih.</div><div class="bt-en">Since the <strong>purpose of the siwāk is cleaning and freshening the mouth</strong>, everything that achieves this purpose <strong>takes the same ruling as the siwāk</strong>. The modern <strong>toothbrush and toothpaste</strong> help clean and freshen the mouth — so they share the siwāk\u2019s ruling in <strong>being legitimate worship</strong>. <strong>However, they do not replace it</strong>, because the siwāk is from the <strong>guidance and sunnah of the Prophet ﷺ</strong>. Additionally, one can <strong>carry the siwāk at all times</strong>, especially when offering prayer — unlike a toothbrush — and it contains <strong>natural cleansing and purifying substances not found in others</strong>.</div></div>

<div class="body-text"><div class="bt-ar">السُّنَّةُ أَنْ يُبْدَأَ بِالاِسْتِيَاكِ مِنْ جَانِبِ الْفَمِ الْأَيْمَنِ.</div><div class="bt-translit">As-sunnatu an yubdaʾa bi-l-istiyāki min jānibi l-fami l-ayman.</div><div class="bt-en">The <strong>sunnah is to start using the siwāk from the RIGHT side of the mouth</strong>.</div></div>

<p style="margin-bottom:10px"><strong>Summary:</strong> Modern toothbrush + toothpaste:</p>
<ul class="impl-list">
<li>Gives you the reward of the sunnah of siwāk ✓</li>
<li>Often cleans even better than a siwāk stick ✓</li>
<li>Contains modern cleaning agents unavailable before ✓</li>
<li><strong>But does NOT fully replace the siwāk</strong>, which has unique virtues (portable, natural substances, direct Prophetic sunnah).</li>
</ul>

<div class="study-note beginner"><span class="study-note-label">💡 Best of both worlds</span><div class="study-note-body">Many people do this: <strong>use a toothbrush at home</strong> (morning/evening) for thorough cleaning, AND <strong>keep a small siwāk in their bag</strong> to use before prayers throughout the day. You get the modern efficiency + the prophetic sunnah!</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Sunnah tip</span><div class="study-note-title">الْفَمُ الْأَيْمَن · al-famu l-ayman</div><div class="study-note-body">The sunnah is to <strong>start from the RIGHT side of the mouth</strong> when using siwāk (or brushing). Why? Because the Prophet ﷺ loved starting everything good from the right side — combing hair, wearing shoes, entering the masjid. This is called <em>at-tayāmun</em> (starting with the right). Apply this to your brushing too!</div></div>
`;}

function L4P7(){return `

<div class="assessment" id="as4p7"><div class="section-badge">التَّقْوِيم · Assessment</div>
<p class="assessment-intro" style="margin-top:8px">Try each question before revealing.</p>
<div class="activity-controls"><button class="btn-reveal-all" onclick="revealAll(document.getElementById('as4p7'))">Reveal All</button><button class="btn-hide-all" onclick="hideAll(document.getElementById('as4p7'))">Hide All</button></div>

<div class="q-item"><span class="q-num">1</span><div class="q-en">Distinguish whose wuḍūʾ breaks from whose does not in each case, and explain why:</div>
<div style="margin-top:8px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">a) A person got impurity (najāsah) on their hand.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Wuḍūʾ does NOT break.</strong> Why? Impurity on the hand is <em>najāsah</em> (visible filth). This is removed by <strong>washing that spot</strong>, not by redoing wuḍūʾ. Wuḍūʾ only removes <em>ḥadath</em> (invisible ritual state).</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">b) A person dozed lightly while sitting in the masjid.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Wuḍūʾ does NOT break.</strong> Light drowsiness (<em>nuʿās</em>) — where you\u2019re still somewhat aware — does not nullify wuḍūʾ. Only <em>deep</em> sleep does.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">c) A person drank camel\u2019s milk.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Wuḍūʾ does NOT break.</strong> Only <em>camel meat</em> breaks wuḍūʾ. Its milk, and soup cooked without the meat, do NOT break wuḍūʾ.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">d) A person had surgery under full general anesthesia.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Wuḍūʾ BREAKS.</strong> Full anesthesia is like deep sleep (even worse — complete unconsciousness). Wuḍūʾ must be renewed after waking.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">e) A person fainted for an hour and then woke up.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Wuḍūʾ BREAKS.</strong> Fainting (complete loss of consciousness) breaks wuḍūʾ — same ruling as deep sleep.</div></div>
</div>

<div class="q-item"><span class="q-num">2</span><div class="q-en">The Prophet ﷺ saw his Companions doing wuḍūʾ, and noticed some of their heels had not been touched by water. He said: "Woe to the heels from the Fire!"</div>
<div style="margin-top:6px;font-style:italic;color:var(--muted);font-size:.85rem">Reflect on the hadith and answer:</div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">a) What ruling of wuḍūʾ does this hadith emphasize?</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">The hadith emphasizes <strong>the obligation to make water reach EVERY required part</strong> when washing — no dry spots allowed. Specifically: washing the <em>entire</em> foot including the heels, washing the <em>entire</em> arm including the elbows. This is one of the <strong>pillars (furūḍ)</strong> of wuḍūʾ.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">b) What behavior does this hadith warn against?</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box">It warns against <strong>rushing through wuḍūʾ</strong> — doing it quickly without making sure water reaches all spots. Specifically, it warns against <strong>neglecting the heels</strong>, which is a common mistake when people are in a hurry. The consequence is serious: punishment in the Fire for those dry spots!</div></div>
</div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">تُغْسَلُ مَا حَوْلَ الْحَوَائِلِ، وَتُمْسَحُ عَلَى الْحَائِلِ مِنْ جَمِيعِ جَوَانِبِهِ، مَعَ مُلَاحَظَةِ أَنَّهُ لَا يُحْتَاجُ إِلَى مَسْحِ مَا زَادَ عَلَى مَحَلِّ الْوُضُوءِ. فَلَوْ كَانَ عَلَى رِجْلِ الْمُتَوَضِّئِ جَبِيرَةٌ جُزْءٌ مِنْهَا عَلَى السَّاقِ فَإِنَّهُ لَا يَمْسَحُ عَلَى مَا زَادَ عَنْ حَدِّ الْكَعْبَيْنِ، وَفِي الْغُسْلِ يَمْسَحُ عَلَى الْجَبِيرَةِ كُلِّهَا، وَيَغْسِلُ بَقِيَّةَ الْبَدَنِ.</div><div class="bt-translit">Tughsalu mā ḥawla l-ḥawāʾil, wa tumsaḥu ʿalā l-ḥāʾili min jamīʿi jawānibih, maʿa mulāḥaẓati annahu lā yuḥtāju ilā masḥi mā zāda ʿalā maḥalli l-wuḍūʾ. Fa-law kāna ʿalā rijli l-mutawaḍḍiʾi jabīratun juzʾun minhā ʿalā s-sāq fa-innahu lā yamsaḥu ʿalā mā zāda ʿan ḥaddi l-kaʿbayn, wa fī l-ghusli yamsaḥu ʿalā l-jabīrati kullihā, wa yaghsilu baqiyyata l-badan.</div><div class="bt-en"><strong>Wash the area around the coverings</strong>, and <strong>wipe over the covering from ALL its sides</strong>, with the note that <strong>one does not need to wipe beyond the wuḍūʾ area</strong>. For example, if a person making wuḍūʾ has a <strong>splint on his foot that extends up onto his shin</strong>, he does <strong>not wipe beyond the ankle</strong>. In <strong>ghusl</strong>, however, he wipes <strong>the entire splint</strong> and washes the rest of the body.</div></div>

`;}

function L6P1(){return `

<div class="sec"><div class="sec-ar">تَعْرِيفُ التَّيَمُّم</div><div class="sec-translit">Taʿrīfu t-tayammum</div><div class="sec-en">Definition of Tayammum</div></div>

<div class="defbox"><div class="defbox-tag">📌 Definition</div><div class="defbox-body"><div class="defbox-ar">مَسْحُ الْوَجْهِ وَالْكَفَّيْنِ بِالتُّرَابِ الطَّاهِرِ بِقَصْدِ الطَّهَارَةِ.</div><div class="defbox-translit">Masḥu l-wajhi wa l-kaffayni bi-t-turābi ṭ-ṭāhiri bi-qaṣdi ṭ-ṭahārah.</div><div class="defbox-en"><strong>Tayammum</strong> is: <strong>wiping the face and hands with pure dust</strong>, with the intention of purification.</div></div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What is tayammum?</span><div class="study-note-body">Sometimes in life, you need to pray but you <em>can\u2019t use water</em> — maybe you\u2019re in a desert with no water, or you\u2019re sick and water would hurt you. What do you do? Do you just skip prayer?<br><br>
<strong>No!</strong> Allah gave us a special alternative called <strong>tayammum</strong> — purifying with <em>dust</em> instead of water. It\u2019s Allah\u2019s mercy so that Muslims can <em>always</em> pray, no matter what the situation.<br><br>
Think of it as a "backup plan" for wuḍūʾ/ghusl — same result (you become pure for prayer), different tool (dust instead of water).</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word of the day</span><div class="study-note-title">تَيَمُّم · tayammum</div><div class="study-note-body">From root ي-م-م (y-m-m) meaning <strong>"to intend / to aim for"</strong>. Tayammum literally means "aiming/heading for" the dust. In the Qur\u2019an, Allah says <em>"fa-tayammamū ṣaʿīdan ṭayyibā"</em> — "then aim for/seek out pure dust." The word itself reminds us: you have to <em>intend</em> to use dust for purification; it\u2019s not automatic!</div></div>

<div class="sec"><div class="sec-ar">الْحُكْم</div><div class="sec-translit">Al-ḥukm</div><div class="sec-en">The Ruling</div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">يَجِبُ التَّيَمُّمُ بَدَلًا مِنَ الْوُضُوءِ وَالْغُسْلِ عِنْدَ فَقْدِ الْمَاءِ، أَوْ عَدَمِ الْقُدْرَةِ عَلَى اسْتِعْمَالِهِ.</div><div class="bt-translit">Yajibu t-tayammumu badalan mina l-wuḍūʾi wa l-ghusli ʿinda faqdi l-māʾ, aw ʿadami l-qudrati ʿalā stiʿmālih.</div><div class="bt-en"><strong>Tayammum is OBLIGATORY</strong> as a <strong>substitute for wuḍūʾ and ghusl</strong> when <strong>water is unavailable</strong>, or when one is <strong>unable to use it</strong>.</div></div>

<div class="callout rust"><div class="callout-label">Ruling</div><div class="callout-en"><strong>Tayammum is OBLIGATORY (wājib)</strong> instead of wuḍūʾ and ghusl <strong>when water is unavailable</strong> — or when it\u2019s available but <strong>cannot be used</strong>.</div></div>

<div class="sec"><div class="sec-ar">الدَّلِيل</div><div class="sec-translit">Ad-dalīl</div><div class="sec-en">The Evidence</div></div>

<div class="verse"><div class="v-ar">﴿فَلَمْ تَجِدُوا مَاءً فَتَيَمَّمُوا صَعِيدًا طَيِّبًا فَامْسَحُوا بِوُجُوهِكُمْ وَأَيْدِيكُم مِّنْهُ﴾</div><div class="v-translit">Fa-lam tajidū māʾan fa-tayammamū ṣaʿīdan ṭayyibā, fa-msaḥū bi-wujūhikum wa aydīkum minhu.</div><div class="v-en">"…and you do not find water, then <strong>perform tayammum with pure earth — wipe your faces and hands with it</strong>."</div><div class="v-ref">Sūrat al-Māʾidah 5:6</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ The key Qur\u2019an verse</span><div class="study-note-body">This is <strong>THE</strong> verse that establishes tayammum! Notice 3 things:<br><br>
1. <strong>"fa-lam tajidū māʾan"</strong> — "if you don\u2019t find water" — shows the condition.<br>
2. <strong>"ṣaʿīdan ṭayyibā"</strong> — "pure earth/dust" — must be clean dust.<br>
3. <strong>"wujūhikum wa aydīkum"</strong> — "faces and hands" — these are the <em>two</em> body parts you wipe.<br><br>
Memorize this verse! You\u2019ll see it again throughout your study of fiqh.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why dust specifically?</span><div class="study-note-body">Allah could have said "pray anyway, no purification needed" or "use any substitute." But He chose <strong>dust</strong>. Why?<br><br>
• Dust is <em>everywhere</em> — you can always find it (earth, sand, stone).<br>
• Dust has a <strong>spiritual connection</strong> to humility (the prostration, face to the ground).<br>
• Science: dust can actually absorb bacteria and clean skin — a fact modern medicine now recognizes!<br><br>
Allah\u2019s wisdom: even our "backup" method for purity has purpose and blessing.</div></div>

The whole thing takes about 15 seconds. A beautiful gift of ease from Allah.</div></div>
