<div class="sec"><div class="sec-ar">كَيْفَ شُرِعَ الْأَذَان؟</div><div class="sec-translit">Kayfa shuriʿa l-adhān?</div><div class="sec-en">How Was the Adhān Prescribed?</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 The amazing story of how adhān started</span><div class="study-note-body">When the Prophet ﷺ first migrated to Madīnah (Year 1 AH), the Muslims had a problem: <strong>how would everyone know when prayer time came?</strong><br><br>
They discussed ideas: a bell (like Christians), a horn (like Jews), a fire signal. The Prophet ﷺ wasn\u2019t fully satisfied with any. Then, that night, a companion named <strong>ʿAbdullāh ibn Zayd</strong> had an amazing dream — an angel taught him the exact words of the adhān!<br><br>
When he told the Prophet ﷺ, the Prophet said: <em>"That\u2019s a true dream, inshāʾAllāh!"</em> and appointed Bilāl ibn Rabāḥ ﷺ (who had a beautiful voice) as the first muʾadhdhin.<br><br>
Isn\u2019t it beautiful? Our call to prayer was literally <em>taught by an angel</em>!</div></div>

<p style="margin-bottom:10px">The adhān was prescribed in the <strong>1st year after Hijrah</strong>. When Muslims needed a sign to know prayer time, they discussed options. Then:</p>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">شُرِعَ الْأَذَانُ فِي السَّنَةِ الْأُولَى مِنَ الْهِجْرَةِ، وَكَانَ سَبَبُ ذَلِكَ: أَنَّهُ لَمَّا دَعَتِ الْحَاجَةُ إِلَى وَضْعِ عَلَامَةٍ يَعْرِفُ بِهَا الْجَمِيعُ دُخُولَ وَقْتِ الصَّلَاةِ تَشَاوَرَ الْمُسْلِمُونَ فِي ذَلِكَ، فَلَمَّا كَانَ مِنَ اللَّيْلِ أُرِيَ عَبْدُاللَّهِ بْنُ زَيْدٍ ﷺ فِي الْمَنَامِ رَجُلًا يَحْمِلُ نَاقُوسًا، فَقَالَ لَهُ: أَتَبِيعُ هَذَا النَّاقُوسَ؟ فَقَالَ الرَّجُلُ: مَاذَا تَعْمَلُ بِهِ؟ قَالَ عَبْدُ اللَّهِ: نَدْعُو بِهِ إِلَى الصَّلَاةِ. فَقَالَ الرَّجُلُ: أَلَا أَدُلُّكَ عَلَى مَا هُوَ خَيْرٌ مِنْهُ؟ قَالَ عَبْدُ اللَّهِ: بَلَى. فَعَلَّمَهُ الْأَذَانَ الْمَعْرُوفَ، ثُمَّ عَلَّمَهُ الْإِقَامَةَ. قَالَ عَبْدُ اللَّهِ: فَلَمَّا أَصْبَحْتُ أَتَيْتُ الرَّسُولَ ﷺ، فَأَخْبَرْتُهُ بِمَا رَأَيْتُ، فَقَالَ: «إِنَّهَا لَرُؤْيَا حَقٌّ إِنْ شَاءَ اللَّهُ، فَقُمْ مَعَ بِلَالٍ فَأَلْقِ عَلَيْهِ مَا رَأَيْتَ فَلْيُؤَذِّنْ بِهِ، فَإِنَّهُ أَنْدَى صَوْتًا مِنْكَ».</div><div class="bt-translit">Shuriʿa l-adhānu fī s-sanati l-ūlā mina l-hijrah, wa kāna sababu dhālika: annahu lammā daʿati l-ḥājatu ilā waḍʿi ʿalāmatin yaʿrifu bihā l-jamīʿu dukhūla waqti ṣ-ṣalāh tashāwara l-muslimūna fī dhālik, fa-lammā kāna mina l-layli uriya ʿAbdullāhu bnu Zaydin ﷺ fī l-manāmi rajulan yaḥmilu nāqūsan, fa-qāla lahu: a-tabīʿu hādhā n-nāqūs? Fa-qāla r-rajul: mādhā taʿmalu bih? Qāla ʿAbdullāh: nadʿū bihi ilā ṣ-ṣalāh. Fa-qāla r-rajul: a-lā adulluka ʿalā mā huwa khayrun minhu? Qāla ʿAbdullāh: balā. Fa-ʿallamahu l-adhāna l-maʿrūf, thumma ʿallamahu l-iqāmah. Qāla ʿAbdullāh: fa-lammā aṣbaḥtu ataytu r-rasūla ﷺ, fa-akhbartuhu bi-mā raʾaytu, fa-qāla: "Innahā la-ruʾyā ḥaqqun in shāʾa-llāh, fa-qum maʿa Bilālin fa-alqi ʿalayhi mā raʾayta fa-l-yuʾadhdhin bih, fa-innahu andā ṣawtan minka."</div><div class="bt-en">The adhān was prescribed in <strong>the first year of the Hijrah</strong>. The reason: when the need arose for <strong>a sign by which everyone could know the entry of prayer time</strong>, the Muslims consulted about it. That night, ʿAbdullāh ibn Zayd ﷺ saw in a dream a man carrying a bell. He said: "Will you sell this bell?" The man asked: "What will you do with it?" ʿAbdullāh said: "We will call people to prayer with it." The man said: "Shall I not show you something <strong>better</strong> than that?" ʿAbdullāh said: "Yes!" So the man taught him the well-known adhān, then taught him the iqāmah. ʿAbdullāh said: <em>When I woke up I came to the Messenger ﷺ and told him what I saw. He said:</em> <strong>"It is a true dream, inshāʾAllāh! Stand with Bilāl and teach him what you saw — let him call the adhān with it, for his voice is more beautiful (more resounding) than yours."</strong></div></div>

<ul class="impl-list">
<li>ʿAbdullāh ibn Zayd ﷺ saw a dream where a man taught him the adhān and then the iqāmah.</li>
<li>He told the Prophet ﷺ, who said: <em>"It is a true dream, inshāʾAllāh. Go with Bilāl and teach him what you saw — for his voice is louder/better than yours."</em></li>
<li>Bilāl ﷺ became the first muʾadhdhin in Islam.</li>
</ul>

<div class="hadith"><div class="hadith-label">Ḥadīth source</div><div class="h-ar">«إِنَّهَا لَرُؤْيَا حَقٌّ إِنْ شَاءَ اللَّهُ، فَقُمْ مَعَ بِلَالٍ فَأَلْقِ عَلَيْهِ مَا رَأَيْتَ فَلْيُؤَذِّنْ بِهِ، فَإِنَّهُ أَنْدَى صَوْتًا مِنْكَ»</div><div class="h-translit">Innahā la-ruʾyā ḥaqqun in shāʾa-llāh, fa-qum maʿa Bilālin fa-alqi ʿalayhi mā raʾayta fa-l-yuʾadhdhin bihi, fa-innahu andā ṣawtan minka.</div><div class="h-en">"It is indeed a true dream, inshāʾAllāh. Get up with Bilāl and teach him what you saw, let him call to prayer with it — for his voice is higher/more beautiful than yours."</div><div class="h-source">Narrated by Aḥmad no. 16478</div></div>

<div class="sec"><div class="sec-ar">تَعْرِيفُ الْأَذَانِ وَالْإِقَامَة</div><div class="sec-translit">Taʿrīfu l-adhāni wa l-iqāmah</div><div class="sec-en">Definitions of Adhān and Iqāmah</div></div>

<div class="body-text"><div class="bt-ar">الْأَذَانُ وَالْإِقَامَةُ مِنَ الْعِبَادَاتِ الَّتِي تَمَيَّزَتْ بِهَا هَذِهِ الْأُمَّةُ عَنْ غَيْرِهَا مِنَ الْأُمَمِ.<br>١. تَعْرِيفُ الْأَذَانِ: الْإِعْلَامُ بِدُخُولِ وَقْتِ الصَّلَاةِ.<br>٢. تَعْرِيفُ الْإِقَامَةِ: الْإِعْلَامُ بِالْقِيَامِ لِأَدَاءِ الصَّلَاةِ.</div><div class="bt-translit">Al-adhānu wa l-iqāmatu mina l-ʿibādāti llatī tamayyazat bihā hādhihi l-ummatu ʿan ghayrihā mina l-umam.<br>(1) Taʿrīfu l-adhān: al-iʿlāmu bi-dukhūli waqti ṣ-ṣalāh.<br>(2) Taʿrīfu l-iqāmah: al-iʿlāmu bi-l-qiyāmi li-adāʾi ṣ-ṣalāh.</div><div class="bt-en">The adhān and iqāmah are among the <strong>acts of worship that distinguish this Ummah</strong> from all other nations.<br><strong>1. Definition of the adhān:</strong> announcing the <strong>entry of the prayer time</strong>.<br><strong>2. Definition of the iqāmah:</strong> announcing <strong>standing up to perform the prayer</strong>.</div></div>

<div class="compare-grid">
<div class="compare-card"><div class="compare-card-head rust"><span class="ch-ar">الْأَذَان</span><span class="ch-translit">Al-adhān</span><br>The Call to Prayer</div><ul class="compare-card-body"><li><strong>Definition:</strong> Announcing that the <em>time of prayer has entered</em> (i-ʿlāmun bi-dukhūli waqti ṣ-ṣalāh)</li><li>Called 5 minutes before each of the 5 prayers</li><li>Heard from minarets worldwide</li></ul></div>
<div class="compare-card"><div class="compare-card-head gold"><span class="ch-ar">الْإِقَامَة</span><span class="ch-translit">Al-iqāmah</span><br>The "Stand-Up" Call</div><ul class="compare-card-body"><li><strong>Definition:</strong> Announcing that <em>people should stand to perform the prayer</em> (i-ʿlāmun bi-l-qiyāmi li-adāʾi ṣ-ṣalāh)</li><li>Said right before the prayer begins</li><li>Shorter than adhān — each phrase said once (not twice)</li></ul></div>
</div>

<div class="study-note remember"><span class="study-note-label">⭐ Two calls, two purposes</span><div class="study-note-body">Think of it like <strong>two announcements</strong> at a school:<br>
• <strong>Adhān (first bell)</strong>: "Class time is approaching! Start heading over!"<br>
• <strong>Iqāmah (second bell)</strong>: "Class is starting RIGHT NOW — take your seats!"<br><br>
The adhān gives you time to make wuḍūʾ, walk to the masjid, and get ready. The iqāmah means: "Stand up, straighten the lines, prayer is starting!"</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word roots</span><div class="study-note-title">Adhān & Iqāmah</div><div class="study-note-body"><strong>أَذَان</strong> from root أ-ذ-ن (ʾ-dh-n) = "to announce / give permission." Same root as <em>udhun</em> (ear) — connected to hearing/listening.<br><br>
<strong>إِقَامَة</strong> from root ق-و-م (q-w-m) = "to stand up / establish." Literally "the calling to stand." Makes sense — you stand up for the prayer!</div></div>
`;}

function L7P2(){return `

<div class="sec"><div class="sec-ar">حُكْمُهُمَا</div><div class="sec-translit">Ḥukmuhumā</div><div class="sec-en">The Ruling on Both</div></div>

<div class="callout rust"><div class="callout-label">Ruling</div><div class="callout-en">The adhān and iqāmah for the <strong>five obligatory prayers</strong> are <strong>farḍ kifāyah</strong> (a collective obligation) on a <strong>group of men</strong>. If some perform it, the rest are relieved of the obligation.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What does "farḍ kifāyah" mean?</span><div class="study-note-body">There are two types of obligations in Islam:<br><br>
<strong>1. Farḍ ʿayn (فرض عين)</strong> — individual duty. <em>Every</em> Muslim must do it. Example: the 5 daily prayers.<br><br>
<strong>2. Farḍ kifāyah (فرض كفاية)</strong> — collective duty. If <em>some</em> Muslims do it, the rest are excused. If <em>no one</em> does it, everyone sins. Examples: adhān, funeral prayer, burying the dead, responding to salām in a group.<br><br>
So for adhān: as long as someone in your community is making the adhān, you\u2019re fine. If no one calls it for any prayer, the whole community sins.</div></div>

<p style="margin:12px 0"><strong>Non-obligatory prayers</strong> (like ʿĪd prayer, Tarāwīḥ, eclipse prayer) do <strong>NOT</strong> have adhān or iqāmah.</p>

<div class="hadith"><div class="hadith-label">Ḥadīth — Mālik ibn al-Ḥuwayrith</div><div class="h-ar">«إِذَا حَضَرَتِ الصَّلَاةُ فَلْيُؤَذِّنْ لَكُمْ أَحَدُكُمْ، وَلْيَؤُمَّكُمْ أَكْبَرُكُمْ»</div><div class="h-translit">Idhā ḥaḍarati ṣ-ṣalātu fa-l-yuʾadhdhin lakum aḥadukum, wa l-yaʾummakum akbarukum.</div><div class="h-en">"When the time for prayer comes, <strong>let one of you make the adhān, and let the oldest/most learned among you lead the prayer</strong>."</div><div class="h-source">Narrated by al-Bukhārī no. 628</div></div>

<div class="sec"><div class="sec-ar">مَا يُسَنُّ عِنْدَ سَمَاعِ الْأَذَان</div><div class="sec-translit">Mā yusannu ʿinda samāʿi l-adhān</div><div class="sec-en">What is Recommended When Hearing the Adhān</div></div>

<p style="margin-bottom:10px">When you hear the muʾadhdhin, these 4 things are <em>sunnah</em> for you to do:</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Repeat what the muʾadhdhin says</strong> — EXCEPT for <em>"ḥayya ʿalā ṣ-ṣalāh"</em> and <em>"ḥayya ʿalā l-falāḥ"</em>. For those two, instead say: <strong>"Lā ḥawla wa lā quwwata illā billāh"</strong> (There is no power or strength except with Allah).</div></li>
<li data-n="2"><div class="li-en"><strong>Send ṣalāh on the Prophet ﷺ</strong> after the adhān ends.</div></li>
<li data-n="3"><div class="li-en"><strong>Say this beautiful duʿāʾ:</strong> <em>"Allāhumma rabba hādhihi d-daʿwati t-tāmmah, wa ṣ-ṣalāti l-qāʾimah, āti Muḥammadan al-wasīlata wa l-faḍīlah, wa bʿathhu maqāman maḥmūdan alladhī waʿadtah."</em></div></li>
<li data-n="4"><div class="li-en"><strong>Make your own personal duʿāʾ</strong> for whatever you need — the time between adhān and iqāmah is a time when duʿāʾ is especially accepted!</div></li>
</div>

<div class="study-note remember"><span class="study-note-label">⭐ Duʿāʾ between adhān and iqāmah — a golden opportunity!</span><div class="study-note-body">The Prophet ﷺ said: <em>"Duʿāʾ between the adhān and the iqāmah is not rejected."</em> (Abū Dāwūd, Tirmidhī — authentic)<br><br>
This is one of the <strong>special times</strong> when Allah accepts duʿāʾs! So next time you hear the adhān, don\u2019t waste that 15-20 minutes scrolling your phone. Make duʿāʾ for everything you need: guidance, parents, siblings, good grades, forgiveness — whatever\u2019s in your heart!</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why say "lā ḥawla wa lā quwwata" for those two phrases?</span><div class="study-note-body">"Ḥayya ʿalā ṣ-ṣalāh" means "Come to prayer!" — but you\u2019re not the muʾadhdhin inviting others. So if you just repeated it, it would sound odd.<br><br>
Instead, you respond with: <strong>"There is no power or strength except with Allah"</strong> — a beautiful statement of humility, acknowledging that getting up to pray only happens by Allah\u2019s help! It\u2019s like saying "I can only answer this call through Allah\u2019s strength, not my own."</div></div>
`;}

function L7P3(){return `

<div class="sec"><div class="sec-ar">فَضَائِلُ الْأَذَان</div><div class="sec-translit">Faḍāʾilu l-adhān</div><div class="sec-en">The Virtues of the Adhān</div></div>

<p style="margin-bottom:12px">The adhān isn\u2019t just a practical announcement — it has <strong>amazing spiritual rewards</strong>. Here are 4:</p>

<div class="hadith"><div class="hadith-label">Virtue 1 — Shayṭān runs away</div><div class="h-ar">«إِذَا نُودِيَ لِلصَّلَاةِ أَدْبَرَ الشَّيْطَانُ وَلَهُ ضُرَاطٌ، حَتَّى لَا يَسْمَعَ التَّأْذِينَ»</div><div class="h-translit">Idhā nūdiya li-ṣ-ṣalāti adbara sh-shayṭānu wa lahu ḍurāṭ, ḥattā lā yasmaʿa t-taʾdhīn.</div><div class="h-en">"When the adhān is called, <strong>Shayṭān runs away farting loudly</strong>, so he doesn\u2019t hear the adhān."</div><div class="h-source">Narrated by al-Bukhārī no. 608</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Virtue — adhān repels Shayṭān!</span><div class="study-note-body">This hadith is <em>incredible</em> — and slightly funny! The adhān is so powerful that <strong>Shayṭān literally flees in panic</strong> when he hears it. Why?<br><br>
Because the adhān is a public declaration of tawhid ("Lā ilāha illā-llāh") and a call to worship the One God. Shayṭān can\u2019t stand to hear it. So every time the adhān is called, evil is pushed back.<br><br>
This means: just <em>being near</em> where the adhān is called is a form of protection. Make sure you live/work where you can hear it!</div></div>

<div class="hadith"><div class="hadith-label">Virtue 2 — Everything testifies for the muʾadhdhin</div><div class="h-ar">«لَا يَسْمَعُ مَدَى صَوْتِ الْمُؤَذِّنِ جِنٌّ وَلَا إِنْسٌ وَلَا شَيْءٌ، إِلَّا شَهِدَ لَهُ يَوْمَ الْقِيَامَةِ»</div><div class="h-translit">Lā yasmaʿu madā ṣawti l-muʾadhdhini jinnun wa lā insun wa lā shayʾ, illā shahida lahu yawma l-qiyāmah.</div><div class="h-en">"<strong>Nothing that hears the voice of the muʾadhdhin — whether jinn, human, or anything else — except that it will testify for him on the Day of Judgement.</strong>"</div><div class="h-source">Narrated by al-Bukhārī no. 609</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Think about this!</span><div class="study-note-body">Every <em>tree</em>, every <em>rock</em>, every <em>bird</em>, every <em>human</em>, every <em>jinn</em> that hears the muʾadhdhin will <strong>stand up on Day of Judgement and testify</strong> for him!<br><br>
If the muʾadhdhin\u2019s voice reaches 1 km, that\u2019s thousands of things listening. What a reward! This is why being a muʾadhdhin is considered such an honor.</div></div>

<div class="hadith"><div class="hadith-label">Virtue 3 — Forgiveness reaching as far as your voice</div><div class="h-ar">«الْمُؤَذِّنُ يُغْفَرُ لَهُ مَدَّ صَوْتِهِ، وَلَهُ مِثْلُ أَجْرِ مَنْ صَلَّى مَعَهُ»</div><div class="h-translit">Al-muʾadhdhinu yughfaru lahu madda ṣawtih, wa lahu mithlu ajri man ṣallā maʿah.</div><div class="h-en">"<strong>The muʾadhdhin is forgiven as far as his voice reaches, and he gets the same reward as everyone who prays because of his call.</strong>"</div><div class="h-source">Narrated by an-Nasāʾī no. 1622</div></div>

<div class="hadith"><div class="hadith-label">Virtue 4 — Allah marvels at the sincere shepherd</div><div class="h-ar">«يَعْجَبُ رَبُّكُمْ مِنْ رَاعِي غَنَمٍ فِي رَأْسِ شَظِيَّةِ جَبَلٍ، يُؤَذِّنُ وَيُصَلِّي، فَيَقُولُ اللَّهُ عَزَّ وَجَلَّ: انْظُرُوا إِلَى عَبْدِي هَذَا، يُؤَذِّنُ وَيُقِيمُ، يَخَافُ مِنِّي، فَقَدْ غَفَرْتُ لِعَبْدِي، وَأَدْخَلْتُهُ الْجَنَّةَ»</div><div class="h-translit">Yaʿjabu rabbukum min rāʿī ghanamin fī raʾsi shaẓiyyati jabalin, yuʾadhdhinu wa yuṣallī, fa-yaqūlu-llāhu ʿazza wa jalla: unẓurū ilā ʿabdī hādhā, yuʾadhdhinu wa yuqīm, yakhāfu minnī, fa-qad ghafartu li-ʿabdī, wa adkhaltuhu l-jannah.</div><div class="h-en">"Your Lord <strong>marvels at a shepherd on top of a cliff who calls the adhān and prays</strong>. Allah ﷻ says: <em>Look at this servant of Mine — calling adhān and prayer (with no one around), fearing Me. I have forgiven him and entered him into Paradise!</em>"</div><div class="h-source">Narrated by Abū Dāwūd no. 1203</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Amazing image!</span><div class="study-note-body">Picture it: a shepherd alone on top of a mountain, no one around for miles. He could skip the adhān — no one would know! But he calls it anyway, just for Allah\u2019s sake.<br><br>
Allah is so pleased that He <em>marvels</em> and tells the angels: "Look at this one!" And the reward? <strong>Forgiveness and Paradise.</strong><br><br>
<strong>Lesson:</strong> Do good <em>especially when no one is watching</em>. That\u2019s when sincerity shines brightest, and Allah\u2019s love is strongest.</div></div>
`;}

<div class="sec"><div class="sec-ar">مِنْ أَحْكَامِ الْأَذَان</div><div class="sec-translit">Min aḥkāmi l-adhān</div><div class="sec-en">Some Important Rulings on the Adhān</div></div>

<p style="margin-bottom:10px"><strong>(a) Leaving the masjid after the adhān:</strong></p>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Hurayrah</div><div class="h-ar">كُنَّا قُعُودًا مَعَ أَبِي هُرَيْرَةَ فِي الْمَسْجِدِ، فَأَذَّنَ الْمُؤَذِّنُ، فَقَامَ رَجُلٌ مِنَ الْمَسْجِدِ يَمْشِي، فَأَتْبَعَهُ أَبُو هُرَيْرَةَ بَصَرَهُ حَتَّى خَرَجَ مِنَ الْمَسْجِدِ، فَقَالَ أَبُو هُرَيْرَةَ: «أَمَّا هَذَا فَقَدْ عَصَى أَبَا الْقَاسِمِ ﷺ»</div><div class="h-translit">…Fa-qāma rajulun mina l-masjidi yamshī, fa-atbaʿahu Abū Hurayrata baṣarahu ḥattā kharaja mina l-masjid, fa-qāla Abū Hurayrah: "Ammā hādhā fa-qad ʿaṣā Abā l-Qāsim ﷺ."</div><div class="h-en">We were sitting with Abū Hurayrah in the masjid when the muʾadhdhin called the adhān. A man stood up and walked out of the masjid. Abū Hurayrah followed him with his eyes until he left, and said: <strong>"As for this one — he has disobeyed Abū al-Qāsim (the Prophet ﷺ)."</strong></div><div class="h-source">Narrated by Muslim no. 655</div></div>

<div class="callout rust"><div class="callout-label">Ruling</div><div class="callout-en">It is <strong>forbidden (muḥarram)</strong> for a Muslim to leave the masjid after the adhān has been called — <em>unless</em> he has a genuine need and intends to return, or plans to catch the congregation at another masjid.</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Take the adhān seriously!</span><div class="study-note-body">Notice Abū Hurayrah\u2019s harsh words: <em>"He disobeyed the Prophet ﷺ!"</em> — just for walking out after the adhān without reason.<br><br>
This shows how seriously the companions took the adhān. When you\u2019re in a masjid and the adhān is called — stay. Pray there. Don\u2019t keep walking out "real quick to do something." The only exception is a real need (like going to another masjid for a better teacher, or having no wuḍūʾ and returning).</div></div>

<p style="margin:14px 0 10px"><strong>(b) Adhān when combining two prayers:</strong></p>

<p style="margin-bottom:10px">If you want to combine Maghrib + ʿIshāʾ (or Ẓuhr + ʿAṣr — when allowed, such as when traveling):</p>

<ul class="impl-list">
<li>Make <strong>ONE adhān for both prayers</strong> (just one)</li>
<li>Make <strong>a separate iqāmah for each prayer</strong></li>
</ul>

<div class="study-note beginner"><span class="study-note-label">💡 Simple rule for combining</span><div class="study-note-body"><strong>Adhān: 1</strong> (for the first prayer)<br>
<strong>Iqāmah: 2</strong> (one before each prayer)<br><br>
So if you combine Maghrib and ʿIshāʾ:<br>
1. Adhān → Iqāmah → pray Maghrib<br>

Why? The second prayer still needs its own "stand up!" signal. But you don\u2019t need two time announcements.</div></div>
`;}

function L8P1(){return `

<div class="sec"><div class="sec-ar">مَكَانَةُ الصَّلَاة</div><div class="sec-translit">Makānatu ṣ-ṣalāh</div><div class="sec-en">The Status of Ṣalāh</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What does "status" mean here?</span><div class="study-note-body">"Status" (<em>makānah</em>) means <strong>how important something is</strong>. Think of school: the principal has a higher status than a student because of their role. Among all the acts of worship in Islam, <strong>ṣalāh has the highest status</strong> — second only to the shahādatayn (the two testimonies).<br><br>
This lesson explains <em>why</em> ṣalāh is so special and why you should take it more seriously than anything else!</div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">لِلصَّلَاةِ فِي الْإِسْلَامِ مَنْزِلَةٌ رَفِيعَةٌ، وَمَكَانَةٌ عَالِيَةٌ، فَهِيَ صِلَةٌ بَيْنَ الْعَبْدِ وَرَبِّهِ، وَمَنْزِلَتُهَا مِنَ الْإِسْلَامِ بِمَنْزِلَةِ الرُّوحِ مِنَ الْجَسَدِ، وَالصَّلَاةُ تُرَبِّي النَّفْسَ وَتُهَذِّبُ الرُّوحَ وَتُنِيرُ الْقَلْبَ بِمَا تَغْرِسُ فِيهِ مِنْ جَلَالِ اللَّهِ وَعَظَمَتِهِ، وَتُحَلِّي الْمَرْءَ وَتُجَمِّلُهُ بِمَكَارِمِ الْأَخْلَاقِ. وَهِيَ عَمُودُ الْإِسْلَامِ وَالرُّكْنُ الثَّانِي مِنْ أَرْكَانِهِ، فَلَا يَقُومُ إِلَّا بِهَا. كَمَا أَنَّ لَهَا مَكَانَةً خَاصَّةً حَيْثُ فَرَضَهَا اللَّهُ تَعَالَى عَلَى رَسُولِهِ ﷺ فِي لَيْلَةِ الْمِعْرَاجِ، وَهَذَا مِمَّا اخْتُصَّتْ بِهِ الصَّلَاةُ عَنْ سَائِرِ الْعِبَادَاتِ.</div><div class="bt-translit">Li-ṣ-ṣalāti fī l-islāmi manzilatun rafīʿah, wa makānatun ʿāliyah, fa-hiya ṣilatun bayna l-ʿabdi wa rabbih, wa manzilatuhā mina l-islāmi bi-manzilati r-rūḥi mina l-jasad. Wa ṣ-ṣalātu turabbī n-nafsa wa tuhadhdhibu r-rūḥa wa tunīru l-qalba bi-mā taghrisu fīhi min jalāli-llāhi wa ʿaẓamatih, wa tuḥallī l-marʾa wa tujammiluhu bi-makārimi l-akhlāq. Wa hiya ʿamūdu l-islāmi wa r-ruknu th-thānī min arkānih, fa-lā yaqūmu illā bihā. Kamā anna lahā makānatan khāṣṣatan ḥaythu faraḍahā-llāhu taʿālā ʿalā rasūlihi ﷺ fī laylati l-miʿrāj, wa hādhā mimmā ukhtuṣṣat bihi ṣ-ṣalātu ʿan sāʾiri l-ʿibādāt.</div><div class="bt-en">Prayer in Islam has a lofty rank and an elevated status. It is a <strong>connection between the servant and his Lord</strong>, and its place in Islam is like <strong>the place of the soul in the body</strong>. Prayer trains the soul, refines the spirit, and illuminates the heart with what it plants in it of Allah\u2019s majesty and greatness; it beautifies and adorns the person with noble character. It is the <strong>pillar of Islam</strong> and <strong>the second of its pillars</strong> — Islam cannot stand without it. It also has a special status in that Allah made it obligatory upon His Messenger ﷺ on <strong>the Night of Miʿrāj</strong> — this is something unique to prayer among all other acts of worship.</div></div>

<p style="margin-bottom:10px">From this passage we can extract <strong>4 things</strong> that show the status of ṣalāh in Islam:</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>It is a connection between the servant and his Lord</strong> (<em>ṣilah bayna l-ʿabdi wa rabbih</em>) — in Islam, prayer is like <em>the soul to the body</em>. Without the soul, the body is dead. Without prayer, faith is dead.</div></li>
<li data-n="2"><div class="li-en"><strong>Ṣalāh trains the soul, refines the spirit, and enlightens the heart</strong> — it fills the heart with Allah\u2019s greatness and beautifies the person with noble character.</div></li>
<li data-n="3"><div class="li-en"><strong>Ṣalāh is the pillar of Islam and the second rukn</strong> — Islam cannot stand without it. It\u2019s <em>the</em> pillar (<em>ʿamūd</em>) that holds up the whole religion.</div></li>
<li data-n="4"><div class="li-en"><strong>Ṣalāh has a unique status: it was prescribed directly to the Prophet ﷺ on Laylat al-Miʿrāj</strong> (the Night of Ascension) — above the seven heavens! No other act of worship received this special treatment.</div></li>
</div>

<div class="study-note remember"><span class="study-note-label">⭐ The Miʿrāj moment — unique in history!</span><div class="study-note-body">Every other ruling in Islam (fasting, zakāh, ḥajj, etc.) was revealed through Jibrīl (Gabriel) coming DOWN to the Prophet ﷺ. But <strong>ṣalāh is different</strong>: the Prophet ﷺ was taken UP — through the 7 heavens to meet Allah directly — and received the command for 5 daily prayers <em>from Allah Himself</em>!<br><br>
Think about what this means: Allah didn\u2019t just send an angel with the prayer command. He <em>brought the Prophet up to His presence</em> to give it. That\u2019s how much Allah honors ṣalāh. Every time you pray, remember: this act came directly from that great night!</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word of the day</span><div class="study-note-title">عَمُودُ الْإِسْلَام · ʿamūdu l-islām</div><div class="study-note-body"><strong>ʿAmūd</strong> = pillar, column (the kind that holds up a tent or a building). The Prophet ﷺ called ṣalāh the <em>ʿamūd</em> of Islam — without the central pillar, the whole tent collapses!<br><br>
So someone who abandons ṣalāh isn\u2019t just "missing one thing" — they\u2019re knocking down the very pillar that holds up their faith. Very serious imagery!</div></div>

3. <strong>It is the pillar (ʿamūd) of Islam</strong> — the 2nd rukn of Islam after shahādatayn.<br>
4. <strong>It was prescribed on Laylat al-Miʿrāj</strong> — uniquely, above the 7 heavens, directly from Allah.</div></div>
</div>

<div class="sec"><div class="sec-ar">فَضْلُهَا</div><div class="sec-translit">Faḍluhā</div><div class="sec-en">Its Virtues / Rewards</div></div>

<p style="margin-bottom:12px">Ṣalāh has <strong>enormous rewards</strong>. Here are 4 from the Qur\u2019an and hadith:</p>

<div class="hadith"><div class="hadith-label">Virtue 1 — Ṣalāh is a LIGHT</div><div class="h-ar">«الصَّلَاةُ نُورٌ»</div><div class="h-translit">Aṣ-ṣalātu nūr.</div><div class="h-en"><strong>"Ṣalāh is light."</strong></div><div class="h-source">Narrated by Muslim no. 223</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Light for TWO worlds!</span><div class="study-note-body">Ṣalāh is <strong>light for its performer in this world AND in the Hereafter</strong>:<br><br>
• <strong>In this world</strong>: It lights up your face (you\u2019ve probably noticed praying people have a special glow — this is real!), lights your heart with peace and guidance, and guides you through decisions.<br><br>
• <strong>In the Hereafter</strong>: It lights up the darkness of the grave, and shines bright on the terrifying Day of Judgement, guiding you across the Ṣirāṭ (the bridge over Hell).<br><br>
Who doesn\u2019t want their face and grave lit up with nūr from Allah?!</div></div>

<div class="hadith"><div class="hadith-label">Virtue 2 — Ṣalāh erases sins</div><div class="h-ar">«أَرَأَيْتُمْ لَوْ أَنَّ نَهْرًا بِبَابِ أَحَدِكُمْ يَغْتَسِلُ مِنْهُ كُلَّ يَوْمٍ خَمْسَ مَرَّاتٍ، هَلْ يَبْقَى مِنْ دَرَنِهِ شَيْءٌ؟» قَالُوا: لَا يَبْقَى مِنْ دَرَنِهِ شَيْءٌ. قَالَ: «فَذَلِكَ مِثْلُ الصَّلَوَاتِ الْخَمْسِ، يَمْحُو اللَّهُ بِهِنَّ الْخَطَايَا»</div><div class="h-translit">A-raʾaytum law anna nahran bi-bābi aḥadikum yaghtasilu minhu kulla yawmin khamsa marrāt, hal yabqā min daranihi shayʾ? Qālū: lā yabqā min daranihi shayʾ. Qāla: fa-dhālika mithlu ṣ-ṣalawāti l-khams, yamḥū-llāhu bihinna l-khaṭāyā.</div><div class="h-en">"Tell me: if there were a river at one of your doors, and he bathed in it <strong>5 times a day</strong>, would any dirt remain on him?" They said: "No dirt would remain." He said: <strong>"That is like the 5 prayers — Allah erases sins by them."</strong></div><div class="h-source">Narrated by al-Bukhārī no. 528</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 A beautiful analogy!</span><div class="study-note-body">Imagine a beautiful, clean river flowing right in front of your home. You bathe in it <strong>5 times every single day</strong>. After bathing 5 times, could any dirt still be on you? <strong>No way</strong>!<br><br>
That\u2019s exactly what the 5 prayers do — they wash away your small sins between them. Morning to noon: some mistakes happen. Fajr → Ẓuhr: washed! Small sins pile up again. Ẓuhr → ʿAṣr: washed again! And so on. By Fajr the next day, the cycle restarts.<br><br>
Just imagine trying NOT to take these 5 baths when they\u2019re right there, free, and cleaning you completely. That would be foolish — yet that\u2019s what a person who skips prayers does to their soul.</div></div>

<div class="verse"><div class="v-ar">﴿وَأَقِمِ الصَّلَاةَ طَرَفَيِ النَّهَارِ وَزُلَفًا مِّنَ اللَّيْلِ ۚ إِنَّ الْحَسَنَاتِ يُذْهِبْنَ السَّيِّئَاتِ﴾</div><div class="v-translit">Wa aqimi ṣ-ṣalāta ṭarafayi n-nahāri wa zulafan mina l-layl, inna l-ḥasanāti yudhhibna s-sayyiʾāt.</div><div class="v-en">"Establish the prayer at the two ends of the day and the approaching parts of the night. Indeed, <strong>good deeds drive away bad deeds</strong>."</div><div class="v-ref">Sūrat Hūd 11:114</div></div>

<div class="hadith"><div class="hadith-label">Virtue 3 — Close friend of the Prophet ﷺ in Jannah</div><div class="h-ar">قَالَ النَّبِيُّ ﷺ لِرَبِيعَةَ بْنِ كَعْبٍ ﷺ لَمَّا سَأَلَهُ الْمُرَافَقَةَ فِي الْجَنَّةِ: «فَأَعِنِّي عَلَى نَفْسِكَ بِكَثْرَةِ السُّجُودِ»</div><div class="h-translit">Qāla n-nabiyyu ﷺ li-Rabīʿata bni Kaʿbin ﷺ lammā saʾalahu l-murāfaqata fī l-jannah: "Fa-aʿinnī ʿalā nafsika bi-kathrati s-sujūd."</div><div class="h-en">Rabīʿah ibn Kaʿb asked the Prophet ﷺ for his company in Paradise. The Prophet ﷺ said: <strong>"Then help me by making many prostrations (sujūd)."</strong></div><div class="h-source">Narrated by Muslim no. 489</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Want to be with the Prophet ﷺ forever?</span><div class="study-note-body">Rabīʿah asked for <strong>the greatest gift imaginable</strong> — to be the Prophet\u2019s ﷺ close companion in Paradise. And the price? <strong>"Make many sujūd."</strong><br><br>
Every extra sunnah prayer you pray = more sujūd. Every minute you spend in sajdah = you\u2019re closer to this dream. Love the Prophet ﷺ? Want to be next to him forever? Pray more prayers!</div></div>

<div class="hadith"><div class="hadith-label">Virtue 4 — Most beloved deed when prayed on time</div><div class="h-ar">سَأَلْتُ رَسُولَ اللَّهِ ﷺ: أَيُّ الْعَمَلِ أَحَبُّ إِلَى اللَّهِ تَعَالَى؟ قَالَ: «الصَّلَاةُ عَلَى وَقْتِهَا»</div><div class="h-translit">Saʾaltu rasūla-llāhi ﷺ: ayyu l-ʿamali aḥabbu ilā-llāhi taʿālā? Qāla: Aṣ-ṣalātu ʿalā waqtihā.</div><div class="h-en">ʿAbdullāh ibn Masʿūd asked: <em>"Which deed is most beloved to Allah?"</em> The Prophet ﷺ said: <strong>"Ṣalāh at its proper time."</strong></div><div class="h-source">Narrated by al-Bukhārī no. 527</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Timing matters!</span><div class="study-note-body">The hadith didn\u2019t just say "ṣalāh" — it said "<strong>ṣalāh at its proper time</strong>." This is important!<br><br>
Among all actions a Muslim can do, the <em>most beloved</em> to Allah is <strong>praying on time</strong>. Not praying late. Not praying rushed at the end. <em>On time.</em><br><br>
So the moment you hear the adhān, drop what you\u2019re doing and head to prayer. You\u2019re about to do the thing Allah loves most from His servants!</div></div>

<div class="sec"><div class="sec-ar">حُكْمُ الصَّلَوَاتِ الْخَمْس</div><div class="sec-translit">Ḥukmu ṣ-ṣalawāti l-khams</div><div class="sec-en">The Ruling on the Five Prayers</div></div>

<div class="callout rust"><div class="callout-label">Ruling</div><div class="callout-en">The 5 daily prayers are <strong>OBLIGATORY (wājib)</strong> on every Muslim who is <em>bāligh (past puberty), ʿāqil (of sound mind)</em> — male or female. They are the 2nd pillar of Islam.</div></div>

<div class="verse"><div class="v-ar">﴿وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ وَارْكَعُوا مَعَ الرَّاكِعِينَ﴾</div><div class="v-translit">Wa aqīmū ṣ-ṣalāta wa ātū z-zakāta wa-rkaʿū maʿa r-rākiʿīn.</div><div class="v-en">"And <strong>establish prayer</strong> and give zakāh and bow with those who bow."</div><div class="v-ref">Sūrat al-Baqarah 2:43</div></div>

<div class="hadith"><div class="hadith-label">5 pillars of Islam</div><div class="h-ar">«بُنِيَ الْإِسْلَامُ عَلَى خَمْسٍ: شَهَادَةِ أَنْ لَا إِلَهَ إِلَّا اللَّهُ وَأَنَّ مُحَمَّدًا رَسُولُ اللَّهِ، وَإِقَامِ الصَّلَاةِ...»</div><div class="h-translit">Buniya l-islāmu ʿalā khams: shahādati an lā ilāha illā-llāhi wa anna Muḥammadan rasūlu-llāh, wa iqāmi ṣ-ṣalāh…</div><div class="h-en">"Islam is built on 5 (pillars): testifying that none deserves worship except Allah and Muḥammad is Allah\u2019s Messenger, and <strong>establishing the prayer</strong>…"</div><div class="h-source">Narrated by al-Bukhārī no. 8</div></div>

<div class="sec"><div class="sec-ar">تَعْلِيمُ الْأَطْفَالِ الصَّلَاة</div><div class="sec-translit">Taʿlīmu l-aṭfāli ṣ-ṣalāh</div><div class="sec-en">Teaching Children the Prayer</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Start them young!</div><div class="h-ar">«مُرُوا أَوْلَادَكُمْ بِالصَّلَاةِ وَهُمْ أَبْنَاءُ سَبْعِ سِنِينَ»</div><div class="h-translit">Murū awlādakum bi-ṣ-ṣalāti wa hum abnāʾu sabʿi sinīn.</div><div class="h-en"><strong>"Order your children to pray when they reach 7 years old."</strong></div><div class="h-source">Narrated by Aḥmad no. 6756</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why age 7?</span><div class="study-note-body">At age 7, children are developed enough to understand what they\u2019re doing — they can learn the words, movements, and meaning of prayer. They aren\u2019t yet <em>required</em> to pray (that starts at bulūgh/puberty), but we <strong>train them</strong> at this age so it becomes second nature.<br><br>
If you\u2019re between 7 and puberty, you\u2019re in a "practice period" — your prayers are extra reward, and you\u2019re building the habit for when it becomes obligatory. If you\u2019re past puberty, you\u2019re fully responsible and every missed prayer is a sin.</div></div>

<div class="sec"><div class="sec-ar">خَطَرُ تَرْكِ الصَّلَاة</div><div class="sec-translit">Khaṭaru tarki ṣ-ṣalāh</div><div class="sec-en">The Danger of Abandoning Ṣalāh</div></div>

<p style="margin-bottom:10px"><strong>Ṣalāh is the pillar of Islam</strong>. It is NOT permissible for a Muslim to intentionally abandon it. Many evidences:</p>

<div class="hadith"><div class="hadith-label">Ḥadīth 1 — Jābir ibn ʿAbdullāh</div><div class="h-ar">«إِنَّ بَيْنَ الرَّجُلِ وَبَيْنَ الشِّرْكِ وَالْكُفْرِ تَرْكَ الصَّلَاةِ»</div><div class="h-translit">Inna bayna r-rajuli wa bayna sh-shirki wa l-kufri tarka ṣ-ṣalāh.</div><div class="h-en"><strong>"Between a man and between shirk and kufr is abandoning the prayer."</strong></div><div class="h-source">Narrated by Muslim no. 82</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Extremely serious!</span><div class="study-note-body">Look at this hadith carefully. The Prophet ﷺ said the only thing separating a Muslim from SHIRK and KUFR is <strong>performing prayer</strong>. When you pray, you\u2019re on the Muslim side. When you abandon prayer, you\u2019ve crossed to the other side!<br><br>
This is the <em>most serious</em> warning possible. Scholars differ on whether a prayer-abandoner is automatically kāfir or not, but ALL agree that abandoning prayer is one of the gravest sins — and puts a person at extreme danger.</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth 2 — Buraydah</div><div class="h-ar">«الْعَهْدُ الَّذِي بَيْنَنَا وَبَيْنَهُمُ الصَّلَاةُ، فَمَنْ تَرَكَهَا فَقَدْ كَفَرَ»</div><div class="h-translit">Al-ʿahdu lladhī baynanā wa baynahumu ṣ-ṣalāh, fa-man tarakahā fa-qad kafar.</div><div class="h-en"><strong>"The covenant between us and them (disbelievers) is prayer. Whoever abandons it has disbelieved."</strong></div><div class="h-source">Narrated by at-Tirmidhī no. 2621</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth 3 — ʿAbdullāh ibn ʿAmr — Who maintains prayer vs. who doesn\u2019t</div><div class="h-ar">«مَنْ حَافَظَ عَلَيْهَا كَانَتْ لَهُ نُورًا وَبُرْهَانًا وَنَجَاةً يَوْمَ الْقِيَامَةِ، وَمَنْ لَمْ يُحَافِظْ عَلَيْهَا لَمْ يَكُنْ لَهُ بُرْهَانٌ وَلَا نُورٌ وَلَا نَجَاةٌ، وَكَانَ يَوْمَ الْقِيَامَةِ مَعَ قَارُونَ وَهَامَانَ وَفِرْعَوْنَ وَأُبَيِّ بْنِ خَلَفٍ»</div><div class="h-translit">Man ḥāfaẓa ʿalayhā kānat lahu nūran wa burhānan wa najātan yawma l-qiyāmah, wa man lam yuḥāfiẓ ʿalayhā lam yakun lahu burhānun wa lā nūrun wa lā najāh, wa kāna yawma l-qiyāmah maʿa Qārūna wa Hāmāna wa Firʿawna wa Ubayyi bni Khalaf.</div><div class="h-en">"<strong>Whoever maintains the prayer</strong> — it will be a light, proof, and salvation for him on the Day of Judgement. <strong>Whoever doesn\u2019t maintain it</strong> — he will have no light, no proof, no salvation, and will be on the Day of Judgement with Qārūn (Korah), Hāmān, Firʿawn (Pharaoh), and Ubayy ibn Khalaf."</div><div class="h-source">Narrated by Aḥmad no. 6576</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ The WORST company!</span><div class="study-note-body">Who are those 4 people mentioned?<br>
• <strong>Qārūn (Korah)</strong> — the richest man of his time, destroyed by Allah for arrogance<br>
• <strong>Hāmān</strong> — Firʿawn\u2019s top minister, tyrannical<br>
• <strong>Firʿawn (Pharaoh)</strong> — the worst disbeliever in history, claimed to be a god<br>
• <strong>Ubayy ibn Khalaf</strong> — a famous enemy of the Prophet ﷺ<br><br>
These 4 represent the <em>worst</em> types of disbelievers in history! The hadith is saying: if you abandon prayer, you\u2019re raised on the Day of Judgement with THEM. Scary beyond words. Don\u2019t let yourself end up in that group!</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Don\u2019t move closer to the masjid!</span><div class="study-note-body">Once, some companions wanted to move their homes closer to the Prophet\u2019s ﷺ masjid to save walking time. The Prophet ﷺ told them: <em>"Stay in your homes — each step you take is recorded for you."</em><br><br>
So if your masjid is a 15-minute walk away: <strong>don\u2019t complain!</strong> You\u2019re earning more than someone whose masjid is next door. More steps = more reward. Shortcuts are for the lazy — believers walk the long way for the reward.</div></div>
`;}

function L10P1(){return `

<div class="sec"><div class="sec-ar">الْقِيَامُ وَتَكْبِيرَةُ الْإِحْرَام</div><div class="sec-translit">Al-qiyāmu wa takbīratu l-iḥrām</div><div class="sec-en">Standing and the Opening Takbīr</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 This is the big lesson!</span><div class="study-note-body">This lesson teaches you <strong>exactly how to pray</strong> — step by step, position by position. The Prophet ﷺ said: <em>"Pray as you have seen me pray!"</em> (Bukhārī 6008). So everything here comes from how the Prophet ﷺ actually prayed.<br><br>
As you read: try to <strong>visualize each step</strong>. Even better — after reading, go practice by praying! You\u2019ll remember everything much better.</div></div>

<div class="callout" style="background:linear-gradient(135deg,var(--rust-light),var(--gold-light));padding:16px"><div class="callout-label">🎨 Color code to remember</div><div class="callout-en">In the textbook, each action is marked as:<br>
🟢 <strong>Green = Rukn (pillar)</strong> — ESSENTIAL. Miss it → prayer invalid!<br>
🔵 <strong>Blue = Wājib (obligatory)</strong> — Required. Missing it intentionally invalidates; by mistake → do sujūd as-sahw<br>
⚫ <strong>Dark = Sunnah</strong> — Recommended. Skipping it doesn\u2019t hurt the prayer<br><br>
You must know these categories for each part!</div></div>

<p style="margin:14px 0 10px"><strong>Step 1: Stand facing the Qiblah</strong></p>

<div class="num-list">
<li data-n="1"><div class="li-en">Stand <strong>facing the Qiblah</strong> 🟢 (RUKN) — the direction of the Kaʿbah in Makkah.</div></li>
<li data-n="2"><div class="li-en"><strong>Feel yourself standing before Allah</strong> — with khushūʿ (humility). Imagine Allah\u2019s greatness; you are <em>between His hands</em>.</div></li>
<li data-n="3"><div class="li-en"><strong>Make the niyyah (intention)</strong> 🟢 (RUKN) in your heart — e.g., "I intend to pray Ẓuhr." <em>Don\u2019t say it out loud — that\u2019s a bidʿah!</em></div></li>
</div>

<div class="hadith"><div class="hadith-label">Evidence — How to start prayer</div><div class="h-ar">«إِذَا قُمْتَ إِلَى الصَّلَاةِ فَأَسْبِغِ الْوُضُوءَ، ثُمَّ اسْتَقْبِلِ الْقِبْلَةَ فَكَبِّرْ»</div><div class="h-translit">Idhā qumta ilā ṣ-ṣalāti fa-asbighi l-wuḍūʾa, thumma-staqbili l-qiblata fa-kabbir.</div><div class="h-en">"<strong>When you stand for prayer, perfect your wuḍūʾ, then face the Qiblah and say the takbīr.</strong>"</div><div class="h-source">Narrated by al-Bukhārī no. 6251</div></div>

<p style="margin:14px 0 10px"><strong>Step 2: Takbīrat al-Iḥrām (The Opening Takbīr)</strong> 🟢</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Raise your hands</strong> to the level of your <em>shoulders OR ears</em> (both are sunnah).</div></li>
<li data-n="2"><div class="li-en"><strong>Say: "Allāhu akbar"</strong> (اللَّهُ أَكْبَرُ) — Allah is the greatest!</div></li>
</div>

<div class="study-note remember"><span class="study-note-label">⭐ Takbīrat al-Iḥrām — the "entry into the sanctuary"</span><div class="study-note-body">The word <strong>iḥrām</strong> comes from "forbidden." When you say this first "Allāhu akbar," <em>everything that was allowed outside prayer becomes forbidden during prayer</em>: talking, eating, walking around, etc.<br><br>
It\u2019s like closing a door behind you. Outside = world. Inside = you + Allah. Nothing else exists in between.</div></div>

<p style="margin:14px 0 10px"><strong>Step 3: Place right hand over left on the chest</strong></p>

<ul class="impl-list">
<li>Put your <strong>right palm over your left hand/wrist/forearm</strong> — on your chest area.</li>
<li>This is called <em>qabḍ</em> (the hold).</li>
</ul>

<p style="margin:14px 0 10px"><strong>Step 4: Look at the place of sujūd</strong></p>

<ul class="impl-list">
<li>Lower your head slightly, eyes toward <strong>where your forehead will touch the ground</strong>. Don\u2019t look around or up!</li>
</ul>

<p style="margin:14px 0 10px"><strong>Step 5: Recite Duʿāʾ al-Istiftāḥ (Opening Supplication)</strong> — (Sunnah)</p>

<div class="hadith"><div class="hadith-label">Duʿāʾ al-Istiftāḥ — one option</div><div class="h-ar">«سُبْحَانَكَ اللَّهُمَّ وَبِحَمْدِكَ، وَتَبَارَكَ اسْمُكَ، وَتَعَالَى جَدُّكَ، وَلَا إِلَهَ غَيْرُكَ»</div><div class="h-translit">Subḥānaka llāhumma wa bi-ḥamdika, wa tabāraka smuka, wa taʿālā jadduka, wa lā ilāha ghayruk.</div><div class="h-en">"Glory to You, O Allah, and all praise. Blessed is Your name, exalted is Your majesty, there is no god but You."</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why start with praising Allah?</span><div class="study-note-body">Imagine meeting a king — you wouldn\u2019t immediately launch into your requests. You\u2019d first honor them, compliment them, acknowledge their greatness. THEN you make your request.<br><br>
Prayer is the same! Before we even recite anything, we say: "Glory to You! Blessed is Your name! Exalted is Your majesty!" This sets the tone. We\u2019re talking to the King of kings.</div></div>
`;}

function L10P2(){return `

<div class="sec"><div class="sec-ar">قِرَاءَةُ الْفَاتِحَةِ وَالسُّورَة</div><div class="sec-translit">Qirāʾatu l-fātiḥati wa s-sūrah</div><div class="sec-en">Reciting the Fātiḥah and a Sūrah</div></div>

<p style="margin-bottom:10px"><strong>Step 6: Say quietly (to yourself):</strong></p>

<div class="callout"><div class="callout-en">
<strong>1. Isti\u02bfādhah</strong> (seeking protection):<br>
<em>"Aʿūdhu billāhi mina sh-shayṭāni r-rajīm"</em> (أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ)<br>
→ "I seek Allah\u2019s protection from the cursed Shayṭān."<br><br>
<strong>2. Basmalah:</strong><br>
<em>"Bismi-llāhi r-raḥmāni r-raḥīm"</em> (بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ)<br>
→ "In the name of Allah, the Most Gracious, the Most Merciful."
</div></div>

<p style="margin:14px 0 10px"><strong>Step 7: Recite Sūrat al-Fātiḥah</strong> 🟢 (RUKN — reciting it is a PILLAR!)</p>

<div class="verse"><div class="v-ar">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ۝ الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ ۝ الرَّحْمَٰنِ الرَّحِيمِ ۝ مَالِكِ يَوْمِ الدِّينِ ۝ إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ ۝ اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ ۝ صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ</div><div class="v-ref">Sūrat al-Fātiḥah (1:1-7)</div></div>

<p style="margin-bottom:10px"><strong>After finishing:</strong> say <strong>"Āmīn"</strong> (أَمِين) — "Accept it, O Allah!"</p>

<div class="study-note remember"><span class="study-note-label">⭐ Fātiḥah is a PILLAR — no prayer without it!</span><div class="study-note-body">The Prophet ﷺ said: <em>"No prayer for the one who doesn\u2019t recite al-Fātiḥah"</em> (Bukhārī 756).<br><br>
This means: if you skip the Fātiḥah in any rakʿah, that rakʿah is <strong>invalid</strong>. You must recite it in every rakʿah — whether you\u2019re praying alone OR behind an imām.<br><br>
<strong>BIG question:</strong> What about when praying behind the imām during the loud prayers (Fajr, Maghrib, ʿIshāʾ)? Scholars differ — the Shāfiʿī madhhab says you still recite it silently. Other madhabs say the imām\u2019s recitation is enough. Follow your teachers\u2019 preference; both views have evidence.</div></div>

<p style="margin:14px 0 10px"><strong>Step 8: Recite another Sūrah</strong> (or some verses) <strong>after al-Fātiḥah</strong> — <em>only in the first 2 rakʿahs!</em> (Sunnah, not required)</p>

<ul class="impl-list">
<li>In <strong>Fajr, Ẓuhr, ʿAṣr</strong>: recite longer sūrahs</li>
<li>In <strong>Maghrib, ʿIshāʾ</strong>: recite medium sūrahs</li>
<li>After rakʿahs 1-2, just Fātiḥah alone in later rakʿahs</li>
</ul>

<div class="study-note beginner"><span class="study-note-label">💡 If you don\u2019t know many sūrahs yet</span><div class="study-note-body">No problem! Start by memorizing the short sūrahs at the end of the Qur\u2019an:<br>
• Sūrat al-Ikhlāṣ (112) — "Qul huwa-llāhu aḥad..."<br>
• Sūrat al-Falaq (113) — "Qul aʿūdhu bi-rabbi l-falaq..."<br>
• Sūrat an-Nās (114) — "Qul aʿūdhu bi-rabbi n-nās..."<br>
• Sūrat al-Kawthar (108) — shortest in Qur\u2019an!<br>
• Sūrat al-ʿAṣr (103), al-Fīl (105), Quraysh (106), etc.<br><br>
Even if you only know al-Fātiḥah + al-Ikhlāṣ, your prayer is valid! Just keep learning more over time.</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word tip</span><div class="study-note-title">أَمِين · āmīn</div><div class="study-note-body">Not an Arabic word originally — it\u2019s from an older Semitic root meaning "truly, let it be so." Same word crosses into Christianity and Judaism (<em>amen</em>).<br><br>
When said after al-Fātiḥah, you\u2019re essentially saying: "O Allah, accept this duʿāʾ!" The Prophet ﷺ said: <em>"When the imām says āmīn, say āmīn — for whoever\u2019s āmīn coincides with the angels\u2019 āmīn, his past sins are forgiven!"</em> (Bukhārī 780)</div></div>
`;}

function L10P3(){return `

<div class="sec"><div class="sec-ar">الرُّكُوع</div><div class="sec-translit">Ar-Rukūʿ</div><div class="sec-en">Rukūʿ (The Bowing)</div></div>

<p style="margin-bottom:10px"><strong>Step 9: Takbīr and go into rukūʿ</strong></p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Raise your hands</strong> to shoulders/ears (Sunnah).</div></li>
<li data-n="2"><div class="li-en"><strong>Say "Allāhu akbar"</strong> 🔵 (Wājib) and go down into rukūʿ.</div></li>
</div>

<p style="margin:14px 0 10px"><strong>Step 10: Rukūʿ position</strong> 🟢 (RUKN)</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Back STRAIGHT</strong> — parallel to the floor. Head level with the back (not raised up or drooped down).</div></li>
<li data-n="2"><div class="li-en"><strong>Hands on knees</strong>, fingers spread out, grasping the knees firmly.</div></li>
<li data-n="3"><div class="li-en"><strong>Remain still (ṭumaʾnīnah)</strong> 🟢 (RUKN) — don\u2019t rush up!</div></li>
</div>

<p style="margin:10px 0"><strong>Say:</strong></p>
<div class="callout"><div class="callout-ar">سُبْحَانَ رَبِّيَ الْعَظِيمِ</div><div class="callout-translit">Subḥāna rabbiya l-ʿaẓīm</div><div class="callout-en">"Glory to my Lord, the Most Great."<br>(Minimum: 3 times. More is better.)</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Ṭumaʾnīnah — STILLNESS is a pillar!</span><div class="study-note-body">This is where many people fail! They rush through rukūʿ — bow for 1 second, then rush up. <strong>This makes the prayer invalid!</strong><br><br>
The Prophet ﷺ once watched a man pray quickly, then told him <em>3 times</em>: "Go back and pray — for you haven\u2019t prayed." The man kept trying, but kept rushing. Finally, the Prophet ﷺ taught him the proper way: <strong>settle into each position until every bone is at rest</strong>, then move on.<br><br>
So don\u2019t rush! Rukūʿ: wait until your body is fully still, say the dhikr <em>at least</em> 3 times, then move.</div></div>

<p style="margin:14px 0 10px"><strong>Step 11: Rise from rukūʿ</strong></p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Raise your hands</strong> to shoulder/ear level again (Sunnah).</div></li>
<li data-n="2"><div class="li-en"><strong>Say: "Samiʿa-llāhu li-man ḥamidah"</strong> (سَمِعَ اللَّهُ لِمَنْ حَمِدَهُ) — "Allah hears whoever praises Him." 🔵 (Wājib for imām and one praying alone).</div></li>
<li data-n="3"><div class="li-en">Stand <strong>fully upright</strong> 🟢 (RUKN — this standing is called <em>iʿtidāl</em>).</div></li>
<li data-n="4"><div class="li-en"><strong>Say: "Rabbanā wa laka l-ḥamd"</strong> (رَبَّنَا وَلَكَ الْحَمْدُ) — "Our Lord, to You is all praise." 🔵 (Wājib for everyone — imām, follower, and one praying alone).</div></li>
</div>

<div class="callout"><div class="callout-label">Longer version (mustaḥabb)</div><div class="callout-ar">رَبَّنَا وَلَكَ الْحَمْدُ، مِلْءَ السَّمَاوَاتِ وَمِلْءَ الْأَرْضِ، وَمِلْءَ مَا بَيْنَهُمَا، وَمِلْءَ مَا شِئْتَ مِنْ شَيْءٍ بَعْدُ</div><div class="callout-translit">Rabbanā wa laka l-ḥamd, milʾa s-samāwāti wa milʾa l-arḍ, wa milʾa mā baynahumā, wa milʾa mā shiʾta min shayʾin baʿd.</div><div class="callout-en">"Our Lord, to You is all praise — filling the heavens, filling the earth, filling what is between them, and filling whatever else You wish."</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Imagine that scale of praise!</span><div class="study-note-body"><strong>"Filling the heavens, filling the earth..."</strong> — imagine literally filling ALL the sky and all the earth with praise for Allah! Then "whatever else You wish" — Allah\u2019s creation is infinite, so praise infinite too.<br><br>
This is the kind of BIG-HEARTED, ABUNDANT praise Allah deserves. When you say these words in prayer, feel that magnitude! This is not just "thanks Allah" — this is praise as vast as the universe.</div></div>
`;}

function L10P4(){return `

<div class="sec"><div class="sec-ar">السُّجُود</div><div class="sec-translit">As-Sujūd</div><div class="sec-en">Sujūd (Prostration)</div></div>

<p style="margin-bottom:10px"><strong>Step 12: Go down into sujūd</strong> 🟢 (RUKN)</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Say "Allāhu akbar"</strong> 🔵 as you go down (but do NOT raise your hands this time).</div></li>
<li data-n="2"><div class="li-en"><strong>Prostrate on the 7 body parts</strong> 🟢 (RUKN):
<ol style="margin-top:4px;padding-left:20px">
<li>The <strong>forehead AND nose</strong> (both together — count as one of the 7)</li>
<li>Both <strong>palms</strong></li>
<li>Both <strong>knees</strong></li>
<li>The tips of both <strong>feet\u2019s toes</strong></li>
</ol></div></li>
</ul>
</div>

<div class="hadith"><div class="hadith-label">Evidence — 7 bones of sujūd</div><div class="h-ar">«أُمِرْتُ أَنْ أَسْجُدَ عَلَى سَبْعَةِ أَعْظُمٍ: عَلَى الْجَبْهَةِ - وَأَشَارَ بِيَدِهِ إِلَى أَنْفِهِ - وَالْيَدَيْنِ، وَالرُّكْبَتَيْنِ، وَأَطْرَافِ الْقَدَمَيْنِ»</div><div class="h-translit">Umirtu an asjuda ʿalā sabʿati aʿẓum: ʿalā l-jabhah — wa ashāra bi-yadihi ilā anfih — wa l-yadayni, wa r-rukbatayni, wa aṭrāfi l-qadamayn.</div><div class="h-en">"<strong>I have been ordered to prostrate on 7 bones: the forehead</strong> — and he pointed to his nose — <strong>both hands, both knees, and the tips of both feet.</strong>"</div><div class="h-source">Narrated by al-Bukhārī and Muslim</div></div>

<p style="margin:14px 0 10px"><strong>In sujūd position:</strong></p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Palms flat on ground</strong> — near your ears or shoulders. Fingers together, pointing toward Qiblah.</div></li>
<li data-n="2"><div class="li-en"><strong>Arms AWAY from your sides</strong> — your upper arms should NOT touch your ribs. Space between!</div></li>
<li data-n="3"><div class="li-en"><strong>Belly AWAY from your thighs</strong> — don\u2019t collapse flat; keep some space.</div></li>
<li data-n="4"><div class="li-en"><strong>Toes bent</strong>, facing the Qiblah.</div></li>
</div>

<p style="margin:10px 0"><strong>Say:</strong></p>
<div class="callout"><div class="callout-ar">سُبْحَانَ رَبِّيَ الْأَعْلَى</div><div class="callout-translit">Subḥāna rabbiya l-aʿlā</div><div class="callout-en">"Glory to my Lord, the Most High."<br>(Minimum: 3 times. Make lots of duʿāʾ here too!)</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Sujūd = closest point to Allah!</span><div class="study-note-body">The Prophet ﷺ said: <em>"The closest a servant is to his Lord is when he is in prostration — so make much duʿāʾ in it!"</em> (Muslim 482)<br><br>
Think about this: your forehead — your most honored body part — is on the ground. This is <strong>complete humility</strong> before Allah. In return, this is when you\u2019re <strong>closest to Him</strong>.<br><br>
<strong>Use your sujūd!</strong> After "Subḥāna rabbiya l-aʿlā," add your own duʿāʾs in Arabic (or in any language if alone). Ask for anything — parents, health, grades, guidance, forgiveness. Sujūd is a <em>gold mine</em> of accepted duʿāʾ!</div></div>

<p style="margin:14px 0 10px"><strong>Step 13: Rise to sit between the two sajdahs</strong></p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Say "Allāhu akbar"</strong> 🔵 as you rise.</div></li>
<li data-n="2"><div class="li-en"><strong>Sit in iftirāsh position</strong>: fold the LEFT foot under you (sit on it), with the RIGHT foot upright (toes pointing Qiblah).</div></li>
<li data-n="3"><div class="li-en"><strong>Hands flat on thighs or knees</strong>, fingertips pointing to the Qiblah.</div></li>
<li data-n="4"><div class="li-en"><strong>Say:</strong> <em>"Rabbi ghfir lī, rabbi ghfir lī"</em> (رَبِّ اغْفِرْ لِي، رَبِّ اغْفِرْ لِي) — "My Lord, forgive me! My Lord, forgive me!"</div></li>
</div>

<p style="margin:14px 0 10px"><strong>Step 14: Second sajdah</strong> 🟢 (RUKN — same as the first sajdah)</p>

<ul class="impl-list">
<li>"Allāhu akbar" → go down → same position → "Subḥāna rabbiya l-aʿlā" 3+ times → duʿāʾ → rise.</li>
</ul>

<div class="study-note beginner"><span class="study-note-label">💡 Every rakʿah has TWO sujūds!</span><div class="study-note-body">A single rakʿah = <strong>one rukūʿ + TWO sajdahs</strong>. That\u2019s why you bow once but prostrate twice each rakʿah. Make sure to count correctly:<br>
• 2-rakʿah prayer (Fajr) = 4 total sajdahs<br>
• 3-rakʿah prayer (Maghrib) = 6 total sajdahs<br>
• 4-rakʿah prayer (Ẓuhr, ʿAṣr, ʿIshāʾ) = 8 total sajdahs per prayer<br><br>
So in 5 daily prayers, you prostrate <strong>34 times</strong> a day before Allah! That\u2019s why the Prophet ﷺ said: "Help me by making many prostrations" (we learned this in Lesson 8!).</div></div>
`;}

function L10P5(){return `

<div class="sec"><div class="sec-ar">الرَّكْعَةُ الثَّانِيَةُ وَالتَّشَهُّدُ الْأَوَّل</div><div class="sec-translit">Ar-rakʿatu th-thāniyah wa t-tashahhudu l-awwal</div><div class="sec-en">The Second Rakʿah and the First Tashahhud</div></div>

<p style="margin-bottom:10px"><strong>Step 15: Rise for the second rakʿah</strong></p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Say "Allāhu akbar"</strong> and stand up.</div></li>
<li data-n="2"><div class="li-en"><strong>Pray the second rakʿah EXACTLY like the first</strong>, <em>except</em> you skip the Duʿāʾ al-Istiftāḥ (opening supplication) — it\u2019s only said once at the very start.</div></li>
</div>

<p style="margin:14px 0 10px"><strong>Step 16: First Tashahhud</strong> (after rising from the 2nd rakʿah\u2019s 2nd sajdah)</p>

<ul class="impl-list">
<li>Sit in <em>iftirāsh</em> position (same as between the two sajdahs).</li>
<li>Place hands on thighs.</li>
<li><strong>Right hand:</strong> clench the <em>pinky</em> and <em>ring finger</em>, form a circle with <em>middle finger + thumb</em>, and raise the <em>index finger</em> pointing toward the Qiblah (move it slightly during duʿāʾ).</li>
<li><strong>Left hand:</strong> fingers spread flat on left thigh.</li>
</ul>

<p style="margin:10px 0"><strong>Recite the Tashahhud:</strong></p>

<div class="callout" style="background:var(--gold-light)"><div class="callout-ar">التَّحِيَّاتُ لِلَّهِ، وَالصَّلَوَاتُ وَالطَّيِّبَاتُ، السَّلَامُ عَلَيْكَ أَيُّهَا النَّبِيُّ وَرَحْمَةُ اللَّهِ وَبَرَكَاتُهُ، السَّلَامُ عَلَيْنَا وَعَلَى عِبَادِ اللَّهِ الصَّالِحِينَ، أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ، وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ</div><div class="callout-translit">At-taḥiyyātu lillāh, wa ṣ-ṣalawātu wa ṭ-ṭayyibāt, as-salāmu ʿalayka ayyuhā n-nabiyyu wa raḥmatu-llāhi wa barakātuh, as-salāmu ʿalaynā wa ʿalā ʿibādi-llāhi ṣ-ṣāliḥīn, ashhadu an lā ilāha illā-llāh, wa ashhadu anna Muḥammadan ʿabduhu wa rasūluh.</div><div class="callout-en">"All greetings, prayers, and good words belong to Allah. Peace be upon you, O Prophet, and the mercy of Allah and His blessings. Peace be upon us and upon Allah\u2019s righteous servants. I bear witness that there is no god but Allah, and I bear witness that Muḥammad is His servant and messenger."</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ The Miʿrāj moment frozen in your prayer!</span><div class="study-note-body">Did you know these exact words come from the <strong>Night of Miʿrāj</strong>? When the Prophet ﷺ met Allah, he greeted Him saying "at-taḥiyyātu lillāh..." — the first part. Then Allah replied back with the second part ("as-salāmu ʿalayka ayyuhā n-nabiyy..."). Then the angels added "as-salāmu ʿalaynā..."<br><br>
So every time you say the Tashahhud, <strong>you\u2019re re-living that cosmic conversation</strong>! You\u2019re saying what was said in the heavens during the Miʿrāj. Subḥān Allāh — prayer is INCREDIBLE.</div></div>

<p style="margin:14px 0 10px"><strong>What happens next depends on how many rakʿahs the prayer has:</strong></p>

<div class="compare-grid">
<div class="compare-card"><div class="compare-card-head rust">2-rakʿah prayer (Fajr)</div><ul class="compare-card-body"><li>This IS the <em>final</em> tashahhud!</li><li>Continue with the "Allāhumma ṣalli..." and taslīm (see next page).</li></ul></div>
<div class="compare-card"><div class="compare-card-head gold">3 or 4 rakʿah prayer (Maghrib, Ẓuhr, ʿAṣr, ʿIshāʾ)</div><ul class="compare-card-body"><li>Stop the tashahhud after "...ʿabduhu wa rasūluh"</li><li>Say "Allāhu akbar" and <strong>stand up</strong> for rakʿah 3!</li></ul></div>
</div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Important: Only Fātiḥah in rakʿahs 3 & 4!</span><div class="study-note-body">After the first tashahhud, if you stand up for rakʿah 3 (and 4):<br>
✓ Recite <strong>Fātiḥah only</strong><br>
✗ Do NOT recite an additional sūrah<br><br>
The extra sūrah is only for rakʿahs 1 and 2. Everything else (rukūʿ, sujūd, etc.) is identical.</div></div>
`;}

function L10P6(){return `

<div class="sec"><div class="sec-ar">التَّشَهُّدُ الْأَخِيرُ وَالتَّسْلِيم</div><div class="sec-translit">At-tashahhudu l-akhīr wa t-taslīm</div><div class="sec-en">The Final Tashahhud and the Taslīm</div></div>

<p style="margin-bottom:10px"><strong>Step 17: Final Tashahhud (after the last rakʿah)</strong></p>

<div class="num-list">
<li data-n="1"><div class="li-en">For this final tashahhud, sit in a DIFFERENT way called <strong>tawarruk</strong> (only in 3+ rakʿah prayers):
<ul style="margin-top:4px;padding-left:16px;list-style:disc">
<li>Your left foot goes out to the <strong>right</strong> side under your right leg</li>
<li>Sit directly on the <strong>ground</strong> (not on your foot)</li>
<li>Right foot: upright, toes pointing to the Qiblah</li>
</ul>
(In 2-rakʿah prayers like Fajr, stay in <em>iftirāsh</em> — don\u2019t change.)</div></li>

<li data-n="2"><div class="li-en"><strong>Recite the SAME tashahhud as before</strong>, then <strong>add the ṣalāh on the Prophet ﷺ</strong>:</div></li>
</div>

<div class="callout" style="background:var(--gold-light)"><div class="callout-label">Ṣalāh Ibrāhīmiyyah — on the Prophet ﷺ</div><div class="callout-ar">اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ، وَعَلَى آلِ مُحَمَّدٍ، كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ، وَعَلَى آلِ إِبْرَاهِيمَ، إِنَّكَ حَمِيدٌ مَجِيدٌ. وَبَارِكْ عَلَى مُحَمَّدٍ، وَعَلَى آلِ مُحَمَّدٍ، كَمَا بَارَكْتَ عَلَى إِبْرَاهِيمَ، وَعَلَى آلِ إِبْرَاهِيمَ، إِنَّكَ حَمِيدٌ مَجِيدٌ</div><div class="callout-translit">Allāhumma ṣalli ʿalā Muḥammad, wa ʿalā āli Muḥammad, kamā ṣallayta ʿalā Ibrāhīm, wa ʿalā āli Ibrāhīm, innaka ḥamīdun majīd. Wa bārik ʿalā Muḥammad, wa ʿalā āli Muḥammad, kamā bārakta ʿalā Ibrāhīm, wa ʿalā āli Ibrāhīm, innaka ḥamīdun majīd.</div><div class="callout-en">"O Allah, send ṣalāh on Muḥammad and the family of Muḥammad, as You sent ṣalāh on Ibrāhīm and the family of Ibrāhīm — indeed You are Praiseworthy, Most Glorious. And bless Muḥammad and the family of Muḥammad, as You blessed Ibrāhīm and the family of Ibrāhīm — indeed You are Praiseworthy, Most Glorious."</div></div>

<p style="margin:14px 0 10px"><strong>Step 18: Seek refuge (recommended)</strong></p>

<div class="callout"><div class="callout-ar">اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ عَذَابِ جَهَنَّمَ، وَمِنْ عَذَابِ الْقَبْرِ، وَمِنْ فِتْنَةِ الْمَحْيَا وَالْمَمَاتِ، وَمِنْ شَرِّ فِتْنَةِ الْمَسِيحِ الدَّجَّالِ</div><div class="callout-translit">Allāhumma innī aʿūdhu bika min ʿadhābi Jahannam, wa min ʿadhābi l-qabr, wa min fitnati l-maḥyā wa l-mamāt, wa min sharri fitnati l-Masīḥi d-Dajjāl.</div><div class="callout-en">"O Allah, I seek refuge in You from: (1) the punishment of Hell, (2) the punishment of the grave, (3) the trials of life and death, (4) and the evil of the Fitnah of the Masīḥ ad-Dajjāl (the False Messiah)."</div></div>

<p style="margin:10px 0"><strong>Then make any personal duʿāʾ you want</strong> — in Arabic (or in your own language if alone).</p>

<p style="margin:14px 0 10px"><strong>Step 19: Taslīm (ending the prayer)</strong> 🟢 (RUKN)</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Turn your face to the RIGHT</strong> until your right cheek is visible (if someone were behind you), and say: <br><em>"As-salāmu ʿalaykum wa raḥmatu-llāh"</em> (السَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللَّهِ)<br>→ "Peace and Allah\u2019s mercy be upon you."</div></li>
<li data-n="2"><div class="li-en"><strong>Turn your face to the LEFT</strong> similarly, and say the same words.</div></li>
</div>

<div class="study-note remember"><span class="study-note-label">⭐ The prayer is now finished! 🎉</span><div class="study-note-body">You\u2019ve done it! From "Allāhu akbar" (opening takbīr) to "As-salāmu ʿalaykum" (taslīm) — your prayer is complete.<br><br>
The <strong>opening takbīr</strong> and the <strong>final taslīms</strong> are the two "borders" of prayer. Between them = you\u2019re in sacred state. After the second salām = you\u2019re back to normal life.<br><br>
But wait — don\u2019t rush off yet! There are beautiful dhikr/adhkār to say AFTER prayer. See next page!</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why turn to both sides for salām?</span><div class="study-note-body">One reason: you\u2019re greeting the <strong>angels</strong> who are on your right and left shoulders (the ones who record your deeds)! Also greeting the angels and Muslims praying around you.<br><br>
It\u2019s a beautiful way to end: after giving your full attention to Allah, you conclude by greeting those who witnessed your prayer. Islam is full of these meaningful touches!</div></div>
`;}

<div class="sec"><div class="sec-ar">الْأَذْكَارُ الْمَشْرُوعَةُ بَعْدَ الصَّلَاة</div><div class="sec-translit">Al-adhkāru l-mashrūʿatu baʿda ṣ-ṣalāh</div><div class="sec-en">Dhikr Prescribed After the Prayer</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Don\u2019t leave right after salām!</span><div class="study-note-body">When you finish prayer, DON\u2019T just jump up and leave. There are specific <strong>dhikr the Prophet ﷺ taught us to say</strong> after every prayer. These maximize your reward and keep you connected to Allah throughout the day.<br><br>
It takes about 5-10 minutes. <em>Completely</em> worth it!</div></div>

<p style="margin-bottom:10px">Here are the main adhkār in order:</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Istighfār — 3 times:</strong><br><em>"Astaghfiru-llāh, astaghfiru-llāh, astaghfiru-llāh"</em> (أَسْتَغْفِرُ اللَّهَ) — "I seek Allah\u2019s forgiveness."<br><br>
Then: <em>"Allāhumma anta s-salāmu wa minka s-salāmu, tabārakta yā dhā l-jalāli wa l-ikrām."</em> (O Allah, You are Peace, and from You is peace. Blessed are You, O Possessor of Majesty and Honor.)</div></li>

<li data-n="2"><div class="li-en"><strong>A longer declaration of Oneness:</strong><br>
<em>"Lā ilāha illā-llāh, waḥdahu lā sharīka lah, lahu l-mulku wa lahu l-ḥamd, wa huwa ʿalā kulli shayʾin qadīr. Lā ilāha illā-llāh wa lā naʿbudu illā iyyāh, lahu n-niʿmatu wa lahu l-faḍl, wa lahu th-thanāʾu l-ḥasan, lā ilāha illā-llāh mukhliṣīna lahu d-dīna wa law kariha l-kāfirūn."</em></div></li>

<li data-n="3"><div class="li-en"><strong>"Lā ilāha illā-llāh wa lā ḥawla wa lā quwwata illā billāh"</strong> — brief version of the above.</div></li>

<li data-n="4"><div class="li-en"><strong>The 33x dhikr formula:</strong><br>
• <strong>Subḥāna-llāh</strong> (سُبْحَانَ اللَّهِ) — "Glory to Allah" — <strong>33 times</strong><br>
• <strong>Al-ḥamdu lillāh</strong> (الْحَمْدُ لِلَّهِ) — "Praise to Allah" — <strong>33 times</strong><br>
• <strong>Allāhu akbar</strong> (اللَّهُ أَكْبَرُ) — "Allah is the Greatest" — <strong>33 times</strong><br>
• Then to complete 100: <strong>"Lā ilāha illā-llāh, waḥdahu lā sharīka lah, lahu l-mulku wa lahu l-ḥamd, wa huwa ʿalā kulli shayʾin qadīr"</strong> once.</div></li>

<li data-n="5"><div class="li-en"><strong>Āyat al-Kursī</strong> (verse 2:255) — recite it once.</div></li>

<li data-n="6"><div class="li-en"><strong>The three "qul" sūrahs:</strong><br>
• Sūrat al-Ikhlāṣ (112) — "Qul huwa-llāhu aḥad..."<br>
• Sūrat al-Falaq (113) — "Qul aʿūdhu bi-rabbi l-falaq..."<br>
• Sūrat an-Nās (114) — "Qul aʿūdhu bi-rabbi n-nās..."<br>
After Fajr and Maghrib, recite them <strong>3 times</strong> each; after other prayers, <strong>once</strong> each.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — the 33x formula</div><div class="h-ar">«مَنْ سَبَّحَ اللَّهَ دُبُرَ كُلِّ صَلَاةٍ ثَلَاثًا وَثَلَاثِينَ، وَحَمِدَ اللَّهَ ثَلَاثًا وَثَلَاثِينَ، وَكَبَّرَ اللَّهَ ثَلَاثًا وَثَلَاثِينَ، فَتِلْكَ تِسْعَةٌ وَتِسْعُونَ، وَقَالَ تَمَامَ الْمِائَةِ: لَا إِلَهَ إِلَّا اللَّهُ... غُفِرَتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ»</div><div class="h-translit">Man sabbaḥa-llāha dubura kulli ṣalātin thalāthan wa thalāthīn, wa ḥamida-llāha thalāthan wa thalāthīn, wa kabbara-llāha thalāthan wa thalāthīn, fa-tilka tisʿatun wa tisʿūn, wa qāla tamāma l-miʾati: lā ilāha illā-llāh… ghufirat khaṭāyāhu wa in kānat mithla zabadi l-baḥr.</div><div class="h-en">"<strong>Whoever glorifies Allah 33 times, praises Him 33 times, and magnifies Him 33 times after every prayer — that is 99. And completes the 100 with "Lā ilāha illā-llāh..." — his sins are forgiven even if they were like the foam of the sea!</strong>"</div><div class="h-source">Narrated by Muslim no. 597</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Foam of the sea!</span><div class="study-note-body">Imagine trying to count the foam on the ocean — <strong>impossible</strong>! So many little bubbles, spreading over vast waves. Allah is saying: even if your sins were <em>that many</em> — uncountable, massive — just this simple 5-minute dhikr after prayer forgives them!<br><br>
Do the math: 5 prayers × 100 dhikr = 500 dhikr a day = 3,500 a week = 182,500 a year! Huge spiritual wealth for a small investment of time.</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Imām-follower timing</span><div class="study-note-body">If you\u2019re praying behind an imām at the masjid: after the imām\u2019s final salām, you can do your personal dhikr quietly. People around you might be praying sunnah or making duʿāʾ — don\u2019t disturb them with loud recitation. Most adhkār are meant to be said <strong>softly to yourself</strong>, not broadcast.</div></div>
`;}

<div class="sec"><div class="sec-ar">شُرُوطُ صِحَّةِ الصَّلَاةِ سِتَّة</div><div class="sec-translit">Shurūṭu ṣiḥḥati ṣ-ṣalāti sittah</div><div class="sec-en">The 6 Conditions for the Validity of Ṣalāh</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What is a "condition" (sharṭ)?</span><div class="study-note-body">A <strong>condition (sharṭ)</strong> is something that must be in place <em>BEFORE</em> prayer starts. Without these, the prayer isn\u2019t valid at all!<br><br>
Think of it like <strong>getting into a car</strong>. Before you drive, you need: (1) keys, (2) gas, (3) a working engine, (4) seatbelt on, etc. If any of these are missing, you can\u2019t drive. Same with prayer — these 6 things must be in place, or your "prayer-car" doesn\u2019t start!<br><br>
Conditions are <strong>before</strong> prayer. Pillars (arkān) are <strong>during</strong> prayer. This lesson is all about both!</div></div>

<p style="margin-bottom:10px">There are <strong>6 conditions</strong>, each with clear Qur\u2019anic or Prophetic evidence:</p>
