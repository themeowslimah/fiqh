<tr><td><strong>2. Avoiding najāsah</strong><br><span style="font-family:'Cormorant Garamond',serif;color:var(--rust)">اجْتِنَابُ النَّجَاسَة</span></td><td><em>Muddaththir 74:4</em>: <strong>"And purify your garments!"</strong> (وَثِيَابَكَ فَطَهِّرْ)</td></tr>
<tr><td><strong>3. Entering prayer time</strong><br><span style="font-family:'Cormorant Garamond',serif;color:var(--rust)">دُخُولُ الْوَقْت</span></td><td><em>Nisāʾ 4:103</em>: <strong>"Indeed prayer has been decreed upon the believers at specified times"</strong> (كِتَابًا مَّوْقُوتًا)</td></tr>
<tr><td><strong>4. Covering the ʿawrah</strong><br><span style="font-family:'Cormorant Garamond',serif;color:var(--rust)">سَتْرُ الْعَوْرَة</span></td><td><em>Aʿrāf 7:31</em>: <strong>"O children of Adam, take your adornment (by dressing) at every masjid"</strong></td></tr>
<tr><td><strong>5. Facing the Qiblah</strong><br><span style="font-family:'Cormorant Garamond',serif;color:var(--rust)">اسْتِقْبَالُ الْقِبْلَة</span></td><td><em>Baqarah 2:144</em>: <strong>"Turn your face toward the Sacred Masjid"</strong></td></tr>
<tr><td><strong>6. Intention (niyyah)</strong><br><span style="font-family:'Cormorant Garamond',serif;color:var(--rust)">النِّيَّة</span></td><td>Prophet ﷺ: <strong>"Actions are only by intentions"</strong> (إنما الأعمال بالنيات) (Bukhārī)</td></tr>
</tbody>
</table>

<div class="study-note remember"><span class="study-note-label">⭐ Memory trick: "T-N-T Q-N" + Time</span><div class="study-note-body">Here\u2019s a silly way to remember all 6 conditions in order:<br><br>
<strong>Ṭ</strong>ahārah → <strong>N</strong>ajāsah-free → <strong>T</strong>ime enters → <strong>ʿAwrah</strong> covered → <strong>Q</strong>iblah faced → <strong>N</strong>iyyah<br><br>
Or think sequentially: "Before I pray, I: (1) make wuḍūʾ, (2) check my clothes, (3) check the clock, (4) make sure I\u2019m covered, (5) face Makkah, (6) intend in my heart." Done!</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Two key words</span><div class="study-note-title">شَرْط vs رُكْن · sharṭ vs rukn</div><div class="study-note-body"><strong>Sharṭ (شرط)</strong> = condition — comes from the root meaning "stipulation." It must be in place <em>before</em> the act.<br><br>
<strong>Rukn (ركن)</strong> = pillar — comes from the root meaning "corner, support." It\u2019s part of the act itself.<br><br>
Example: For a car to start (the "act"), having a key is a <em>sharṭ</em> (condition — must be there before). Having wheels that turn is a <em>rukn</em> (pillar — essential part of driving). Miss either and it won\u2019t work!</div></div>
`;}

function L11P2(){return `

<div class="sec"><div class="sec-ar">الْأَحْكَامُ الْمُتَعَلِّقَةُ بِالشَّرْطِ الْأَوَّل (الطَّهَارَةُ مِنَ الْحَدَث)</div><div class="sec-translit">Al-aḥkāmu l-mutaʿalliqatu bi-sh-sharṭi l-awwal (aṭ-ṭahāratu mina l-ḥadath)</div><div class="sec-en">Rulings on Condition 1 — Purification from Ḥadath</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Remember ḥadath?</span><div class="study-note-body">From Lesson 1: <strong>ḥadath</strong> is the <em>invisible</em> state of ritual impurity you enter after things like:<br>
• Using the bathroom<br>
• Passing gas<br>
• Deep sleep<br>
• Touching private parts<br>
• Eating camel meat<br><br>
You remove ḥadath with <strong>wuḍūʾ</strong> (for minor ḥadath) or <strong>ghusl</strong> (for major ḥadath like janābah).</div></div>

<p style="margin-bottom:12px">Based on the Prophet\u2019s ﷺ statement <em>"Allah does not accept the prayer of one who has ḥadath until he makes wuḍūʾ"</em>, we can answer these situations:</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>I prayed while having ḥadath (forgetting), then remembered AFTER the prayer ended:</strong><br>→ <strong>You must REDO the prayer.</strong> The prayer was not valid because a condition was missing.</div></li>

<li data-n="2"><div class="li-en"><strong>I entered prayer thinking I had wuḍūʾ, then remembered DURING the prayer that I had ḥadath:</strong><br>→ <strong>Break off the prayer immediately.</strong> Go make wuḍūʾ, then start the prayer over from the beginning.</div></li>
</div>

<div class="sec"><div class="sec-ar">الْأَحْكَامُ الْمُتَعَلِّقَةُ بِالشَّرْطِ الثَّانِي (اجْتِنَابُ النَّجَاسَة)</div><div class="sec-translit">Al-aḥkāmu l-mutaʿalliqatu bi-sh-sharṭi th-thānī (ijtinābu n-najāsah)</div><div class="sec-en">Rulings on Condition 2 — Avoiding Najāsah</div></div>

<p style="margin-bottom:10px">You must avoid najāsah in <strong>3 places</strong>:</p>

<div class="compare-grid">
<div class="compare-card"><div class="compare-card-head rust"><span class="ch-ar">بَدَنِي</span><span class="ch-translit">Badanī</span><br>1. My body</div><ul class="compare-card-body"><li>Skin, hair, nails must be clean from najāsah (blood, urine, etc.)</li></ul></div>
<div class="compare-card"><div class="compare-card-head gold"><span class="ch-ar">مَلَابِسِي</span><span class="ch-translit">Malābisī</span><br>2. My clothes</div><ul class="compare-card-body"><li>What I\u2019m wearing must be clean</li></ul></div>
<div class="compare-card" style="grid-column:1/-1"><div class="compare-card-head rust"><span class="ch-ar">مَوْضِعُ صَلَاتِي</span><span class="ch-translit">Mawḍiʿu ṣalātī</span><br>3. The place where I\u2019m praying</div><ul class="compare-card-body"><li>The ground, carpet, prayer mat must be clean</li></ul></div>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — The earth is generally pure</div><div class="h-ar">«وَجُعِلَتْ لِي الْأَرْضُ مَسْجِدًا وَطَهُورًا، فَأَيُّمَا رَجُلٍ مِنْ أُمَّتِي أَدْرَكَتْهُ الصَّلَاةُ فَلْيُصَلِّ»</div><div class="h-translit">Wa juʿilat liya l-arḍu masjidan wa ṭahūran, fa-ayyumā rajulin min ummatī adrakathu ṣ-ṣalātu fa-l-yuṣall.</div><div class="h-en">"<strong>The earth has been made a place of prostration and purifier for me — so whenever prayer time catches any man of my ummah, let him pray!</strong>"</div><div class="h-source">Narrated by Muslim no. 335</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Places where you CANNOT pray</span><div class="study-note-body">Normally, you can pray anywhere (the earth is pure). But there are <strong>3 exceptions</strong> where prayer is NOT valid:<br><br>
❌ <strong>Bathrooms</strong> (<em>mawāḍiʿ qaḍāʾ al-ḥājah</em>) — impure<br>
❌ <strong>Graveyards</strong> (<em>al-maqbarah</em>) — except funeral prayer<br>
❌ <strong>Camel resting areas</strong> (<em>marābiḍ al-ibil</em>) — a specific Prophetic prohibition<br><br>
Everywhere else is fair game — your bedroom, the park, airports, cars (if necessary), etc.!</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Even the Prophet ﷺ removed najāsah mid-prayer!</div><div class="h-ar">«إِنَّ جِبْرِيلَ أَتَانِي فَأَخْبَرَنِي أَنَّ فِيهِمَا قَذَرًا أَوْ قَالَ أَذًى، فَإِذَا جَاءَ أَحَدُكُمْ إِلَى الْمَسْجِدِ فَلْيَنْظُرْ فِي نَعْلَيْهِ، فَإِنْ رَأَى فِيهِمَا قَذَرًا أَوْ قَالَ أَذًى فَلْيَمْسَحْهُمَا، وَلْيُصَلِّ فِيهِمَا»</div><div class="h-translit">Inna Jibrīla atānī fa-akhbaranī anna fīhimā qadharan aw qāla adhan, fa-idhā jāʾa aḥadukum ilā l-masjid fa-l-yanẓur fī naʿlayh, fa-in raʾā fīhimā qadharan aw qāla adhan fa-l-yamsaḥhumā, wa l-yuṣalli fīhimā.</div><div class="h-en">Once, during prayer, the Prophet ﷺ took off his sandals, because <strong>"Jibrīl came and told me there was impurity on them. So when any of you comes to the masjid, let him check his sandals — if he finds impurity, let him wipe them (clean them) and pray in them."</strong></div><div class="h-source">Narrated by Aḥmad no. 11895</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Najāsah scenarios in prayer</span><div class="study-note-body"><strong>a) I prayed, and AFTER finishing saw najāsah on my clothes I didn\u2019t know about:</strong><br>→ <strong>Prayer is still valid!</strong> You didn\u2019t know. Allah doesn\u2019t punish for unknown things.<br><br>
<strong>b) I was praying, and mid-prayer I noticed najāsah (or remembered it):</strong><br>→ If you can <strong>remove it easily</strong> (like taking off a sock or wiping it off), do so and continue. If not, <strong>break off the prayer</strong>, clean yourself, and restart.</div></div>
`;}

function L11P3(){return `

<div class="sec"><div class="sec-ar">الْأَحْكَامُ الْمُتَعَلِّقَةُ بِالشَّرْطِ الثَّالِث (دُخُولُ الْوَقْت)</div><div class="sec-translit">Al-aḥkāmu l-mutaʿalliqatu bi-sh-sharṭi th-thālith (dukhūlu l-waqt)</div><div class="sec-en">Rulings on Condition 3 — Entering the Prayer Time</div></div>

<p style="margin-bottom:10px">Prayer time being a condition means: <strong>prayer is NOT valid BEFORE its time enters</strong>, and <strong>it is NOT permissible to delay it after its time ends</strong>.</p>

<div class="verse"><div class="v-ar">﴿فَوَيْلٌ لِّلْمُصَلِّينَ ۝ الَّذِينَ هُمْ عَن صَلَاتِهِمْ سَاهُونَ﴾</div><div class="v-translit">Fa-waylun li-l-muṣallīn, alladhīna hum ʿan ṣalātihim sāhūn.</div><div class="v-en">"<strong>So woe to those who pray — those who are heedless about their prayer!</strong>"</div><div class="v-ref">Sūrat al-Māʿūn 107:4-5</div></div>

<p style="margin:10px 0"><em>Sāhūn (heedless)</em> here means: <strong>those who delay prayer beyond its proper time!</strong></p>

<div class="sec"><div class="sec-ar">مَوَاقِيتُ الصَّلَاة</div><div class="sec-translit">Mawāqītu ṣ-ṣalāh</div><div class="sec-en">The Prayer Times Chart</div></div>

<table class="styled-table">
<thead><tr><th>Prayer</th><th>Starts at</th><th>Ends at</th></tr></thead>
<tbody>
<tr><td><strong>Fajr</strong><br>الفجر</td><td>Appearance of the <strong>true dawn</strong> (al-fajr aṣ-ṣādiq)</td><td>Sunrise (ṭulūʿ ash-shams)</td></tr>
<tr><td><strong>Ẓuhr</strong><br>الظهر</td><td>Sun passing the zenith (zawāl)</td><td>When an object\u2019s shadow = its own length</td></tr>
<tr><td><strong>ʿAṣr</strong><br>العصر</td><td>End of Ẓuhr time</td><td>Sun turns yellow before setting (iṣfirār ash-shams)</td></tr>
<tr><td><strong>Maghrib</strong><br>المغرب</td><td>Sunset (ghurūb ash-shams)</td><td>Disappearance of the red twilight (mughīb ash-shafaq al-aḥmar)</td></tr>
<tr><td><strong>ʿIshāʾ</strong><br>العشاء</td><td>End of Maghrib time</td><td>Midnight (niṣf al-layl al-awsaṭ)</td></tr>
</tbody>
</table>

<div class="hadith"><div class="hadith-label">Evidence — ʿAbdullāh ibn ʿAmr (muttafaq ʿalayh)</div><div class="h-ar">«وَقْتُ الظُّهْرِ إِذَا زَالَتِ الشَّمْسُ، وَكَانَ ظِلُّ الرَّجُلِ كَطُولِهِ مَا لَمْ يَحْضُرِ الْعَصْرُ، وَوَقْتُ الْعَصْرِ مَا لَمْ تَصْفَرَّ الشَّمْسُ، وَوَقْتُ صَلَاةِ الْمَغْرِبِ مَا لَمْ يَغِبِ الشَّفَقُ، وَوَقْتُ صَلَاةِ الْعِشَاءِ إِلَى نِصْفِ اللَّيْلِ الْأَوْسَطِ، وَوَقْتُ صَلَاةِ الصُّبْحِ مِنْ طُلُوعِ الْفَجْرِ مَا لَمْ تَطْلُعِ الشَّمْسُ»</div><div class="h-translit">Waqtu ẓ-ẓuhri idhā zālati sh-shams, wa kāna ẓillu r-rajuli ka-ṭūlih mā lam yaḥḍuri l-ʿaṣr, wa waqtu l-ʿaṣri mā lam taṣfarri sh-shams, wa waqtu ṣ-ṣalāti l-maghribi mā lam yaghibi sh-shafaq, wa waqtu ṣalāti l-ʿishāʾi ilā niṣfi l-layli l-awsaṭ, wa waqtu ṣalāti ṣ-ṣubḥi min ṭulūʿi l-fajri mā lam taṭluʿi sh-shams.</div><div class="h-en">The Prophet ﷺ detailed all 5 prayer times in one hadith — with the exact start and end of each.</div><div class="h-source">Narrated by Muslim no. 612</div></div>

<div class="sec"><div class="sec-ar">مَا يُدْرَكُ بِهِ الْوَقْت</div><div class="sec-translit">Mā yudraku bihi l-waqt</div><div class="sec-en">How Prayer Time is "Caught"</div></div>

<p style="margin-bottom:10px"><strong>Rule:</strong> If you catch <strong>ONE rakʿah</strong> before prayer time ends, you\u2019ve "caught" the whole prayer!</p>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Hurayrah</div><div class="h-ar">«مَنْ أَدْرَكَ مِنَ الصُّبْحِ رَكْعَةً قَبْلَ أَنْ تَطْلُعَ الشَّمْسُ فَقَدْ أَدْرَكَ الصُّبْحَ، وَمَنْ أَدْرَكَ مِنَ الْعَصْرِ رَكْعَةً قَبْلَ أَنْ تَغْرُبَ الشَّمْسُ فَقَدْ أَدْرَكَ الْعَصْرَ»</div><div class="h-translit">Man adraka mina ṣ-ṣubḥi rakʿatan qabla an taṭluʿa sh-shams, fa-qad adraka ṣ-ṣubḥ, wa man adraka mina l-ʿaṣri rakʿatan qabla an taghruba sh-shams fa-qad adraka l-ʿaṣr.</div><div class="h-en">"<strong>Whoever catches one rakʿah of Fajr before sunrise has caught Fajr. Whoever catches one rakʿah of ʿAṣr before sunset has caught ʿAṣr.</strong>"</div><div class="h-source">Narrated by al-Bukhārī no. 554</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — If you forget or oversleep</div><div class="h-ar">«مَنْ نَسِيَ صَلَاةً أَوْ نَامَ عَنْهَا فَكَفَّارَتُهَا أَنْ يُصَلِّيَهَا إِذَا ذَكَرَهَا»</div><div class="h-translit">Man nasiya ṣalātan aw nāma ʿanhā fa-kaffāratuhā an yuṣalliyahā idhā dhakarahā.</div><div class="h-en">"<strong>Whoever forgets a prayer or sleeps through it — its expiation is to pray it when he remembers it.</strong>"</div><div class="h-source">Narrated by al-Bukhārī no. 572</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Scenarios</span><div class="study-note-body"><strong>a) I forgot a prayer or slept through it — what do I do?</strong><br>→ As soon as you remember, pray it immediately! Allah accepts it — no sin (since it was unintentional).<br><br>
<strong>b) I\u2019m traveling by plane and won\u2019t land until AFTER the prayer time ends:</strong><br>→ <strong>Pray on the plane!</strong> Even if just sitting and facing the direction of travel. Or if possible, combine with next prayer (travelers can combine Ẓuhr+ʿAṣr or Maghrib+ʿIshāʾ).</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Delaying prayer is a MAJOR sin!</span><div class="study-note-body">Some people pray, but always at the LAST MINUTE — or even after the time is gone. The Qur\u2019an calls this "heedlessness" (sahw) and threatens them with "woe" (waylun) — a terrible word that signifies destruction!<br><br>
The solution: <strong>pray on time</strong>. Not just any time — right when the adhān is called. This is what Allah loves most (hadith: "the most beloved deed is prayer on time").</div></div>
`;}

function L11P4(){return `

<div class="sec"><div class="sec-ar">الْأَحْكَامُ الْمُتَعَلِّقَةُ بِالشَّرْطِ الرَّابِع (سَتْرُ الْعَوْرَة)</div><div class="sec-translit">Al-aḥkāmu l-mutaʿalliqatu bi-sh-sharṭi r-rābiʿ (satru l-ʿawrah)</div><div class="sec-en">Rulings on Condition 4 — Covering the ʿAwrah</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What is ʿawrah?</span><div class="study-note-body"><strong>ʿAwrah</strong> is the part of the body Islam requires you to cover — it varies by gender and situation. In prayer, there are specific rules for men and women.<br><br>
The concept: when you stand before Allah, you should be <strong>modestly dressed</strong>, just as you\u2019d dress formally when meeting an important person. This is respect for the act of prayer itself!</div></div>

<h4 style="font-size:.92rem;font-weight:700;color:var(--rust);margin:16px 0 6px">First: For men (الرجل)</h4>

<ul class="impl-list">
<li><strong>Obligatory to cover:</strong> from the navel (<em>as-surrah</em>) to the knees (<em>ar-rukbah</em>).</li>
<li><strong>Also required:</strong> cover the shoulders — at least ONE shoulder must be covered.</li>
<li><strong>Best/preferred:</strong> wear your nicest/most adorned clothes for prayer.</li>
</ul>

<div class="hadith"><div class="hadith-label">Ḥadīth — Shoulders covered</div><div class="h-ar">«لَا يُصَلِّي أَحَدُكُمْ فِي الثَّوْبِ الْوَاحِدِ لَيْسَ عَلَى عَاتِقَيْهِ مِنْهُ شَيْءٌ»</div><div class="h-translit">Lā yuṣallī aḥadukum fī th-thawbi l-wāḥidi laysa ʿalā ʿātiqayhi minhu shayʾ.</div><div class="h-en">"<strong>None of you should pray in a single garment without something covering his shoulders.</strong>"</div><div class="h-source">Narrated by Muslim no. 516</div></div>

<div class="verse"><div class="v-ar">﴿يَا بَنِي آدَمَ خُذُوا زِينَتَكُمْ عِندَ كُلِّ مَسْجِدٍ﴾</div><div class="v-translit">Yā banī Ādama khudhū zīnatakum ʿinda kulli masjid.</div><div class="v-en">"O children of Adam, take your adornment at every masjid."</div><div class="v-ref">Sūrat al-Aʿrāf 7:31</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Common modern mistakes</span><div class="study-note-body"><strong>1. Praying in clothes so thin they show skin color underneath</strong> — NOT valid! ʿAwrah isn\u2019t covered if it\u2019s "visible through" the cloth. Wear thicker clothes, or wear a proper undergarment covering navel-to-knee.<br><br>
<strong>2. Young men praying in short athletic shorts that expose the thighs</strong> — especially in rukūʿ and sujūd! This has 2 problems:<br>
❌ <strong>Exposing the ʿawrah in prayer</strong><br>
❌ <strong>Not taking adornment (zīnah) when going to the masjid</strong> — the verse above commands taking your nicest attire<br><br>
Pray in proper clothing: a long thawb, or pants + shirt that stay modest during rukūʿ and sujūd.</div></div>

<h4 style="font-size:.92rem;font-weight:700;color:var(--rust);margin:16px 0 6px">Second: For women (المرأة)</h4>

<ul class="impl-list">
<li><strong>Obligatory to cover:</strong> ALL of the body — <em>except the face and hands</em>.</li>
<li><strong>EXCEPT</strong> if praying in the presence of non-maḥram men — then the <strong>face AND hands must also be covered</strong>.</li>
</ul>

<div class="study-note remember"><span class="study-note-label">⭐ Women\u2019s prayer attire checklist</span><div class="study-note-body">For a woman praying (even alone at home), she must cover:<br>
✓ Hair (including neck)<br>
✓ Arms (down to wrists)<br>
✓ Legs (down to ankles, including tops of feet in strongest view)<br>
✓ Body fully covered — clothing not tight enough to show shape<br><br>
Only <strong>face</strong> and <strong>hands</strong> (up to wrist) can be uncovered when alone or with women/maḥrams. In front of non-maḥram men, everything is covered.<br><br>
Many women keep a special "prayer dress" or abāyah that makes this easy — one piece covers everything properly.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why different rules for men and women?</span><div class="study-note-body">Islam acknowledges the biological and social differences between men and women. Men\u2019s ʿawrah rules are simpler because men\u2019s bodies are less of a source of fitnah in society. Women\u2019s ʿawrah rules are more comprehensive because Islam honors women\u2019s dignity and modesty, protecting them from unwanted attention.<br><br>
These rules aren\u2019t "restrictions" — they\u2019re <strong>honoring women</strong>. A modestly dressed woman is recognized for her mind, character, and faith — not objectified for her body.</div></div>
`;}

function L11P5(){return `

<div class="sec"><div class="sec-ar">الْأَحْكَامُ الْمُتَعَلِّقَةُ بِالشَّرْطِ الْخَامِس (اسْتِقْبَالُ الْقِبْلَة)</div><div class="sec-translit">Al-aḥkāmu l-mutaʿalliqatu bi-sh-sharṭi l-khāmis (istiqbālu l-qiblah)</div><div class="sec-en">Rulings on Condition 5 — Facing the Qiblah</div></div>

<p style="margin-bottom:10px">Here are the <strong>4 most important rulings</strong> about the qiblah:</p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Whoever prays inside Masjid al-Ḥarām in Makkah MUST face the Kaʿbah directly</strong> (ʿayn al-Kaʿbah) — the actual physical building, because they can see it.</div></li>

<li data-n="2"><div class="li-en"><strong>Whoever is far from the Kaʿbah</strong> must only face <strong>in its direction</strong> (jihatuhā) — slight deviation doesn\u2019t matter.</div></li>
</div>

<div class="hadith"><div class="hadith-label">Ḥadīth — Abū Hurayrah (to people of Madīnah)</div><div class="h-ar">«مَا بَيْنَ الْمَشْرِقِ وَالْمَغْرِبِ قِبْلَةٌ»</div><div class="h-translit">Mā bayna l-mashriqi wa l-maghribi qiblah.</div><div class="h-en">"<strong>What is between the East and the West is qiblah</strong>" (for people of Madīnah, facing south toward Makkah).</div><div class="h-source">Narrated by at-Tirmidhī no. 342</div></div>

<div class="num-list">
<li data-n="3"><div class="li-en"><strong>A traveler on a vehicle</strong> (car, plane, ship, bus) can pray <strong>NAWĀFIL</strong> (voluntary prayers) facing <em>whichever direction the vehicle is going</em> — even if not toward the Kaʿbah.</div></li>

<li data-n="4"><div class="li-en"><strong>Qiblah drops</strong> (no longer required) in two cases:
<ul style="margin-top:4px;padding-left:16px;list-style:disc">
<li><strong>State of fear</strong> (<em>ḥāl al-khawf</em>) — during battle, danger, etc.</li>
<li><strong>Inability</strong> (<em>ʿadam al-qudrah</em>) — like a bedridden sick person who can\u2019t turn to face Makkah.</li>
</ul>
They pray however they can!</div></li>
</div>

<div class="study-note beginner"><span class="study-note-label">💡 Traveling on a plane?</span><div class="study-note-body">Planes move fast and change direction. So for <strong>obligatory prayers</strong> on a plane:<br>
• <strong>Try to face qiblah</strong> when starting the takbīr (use plane\u2019s screen or a compass).<br>
• If the plane turns, you don\u2019t need to turn with it (for farḍ prayers).<br>
• Sit facing your seat if the aisle is blocked.<br><br>
For <strong>sunnah/voluntary</strong> prayers: you can pray facing wherever your seat points. More flexibility!</div></div>

<div class="sec"><div class="sec-ar">الْأَحْكَامُ الْمُتَعَلِّقَةُ بِالشَّرْطِ السَّادِس (النِّيَّة)</div><div class="sec-translit">Al-aḥkāmu l-mutaʿalliqatu bi-sh-sharṭi s-sādis (an-niyyah)</div><div class="sec-en">Rulings on Condition 6 — Intention</div></div>

<div class="hadith"><div class="hadith-label">Ḥadīth — ʿUmar ibn al-Khaṭṭāb</div><div class="h-ar">«إِنَّمَا الْأَعْمَالُ بِالنِّيَّاتِ، وَإِنَّمَا لِكُلِّ امْرِئٍ مَا نَوَى»</div><div class="h-translit">Innamā l-aʿmālu bi-n-niyyāt, wa innamā li-kulli mriʾin mā nawā.</div><div class="h-en">"<strong>Actions are only by intentions, and every person gets only what they intended.</strong>"</div><div class="h-source">Narrated by al-Bukhārī no. 1 (the most famous hadith!)</div></div>

<p style="margin:12px 0"><strong>Two important rules about niyyah:</strong></p>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>The place of niyyah is THE HEART</strong> (maḥalluhā l-qalb).</div></li>
<li data-n="2"><div class="li-en"><strong>Verbalizing it (saying it aloud) is a bidʿah (innovation)</strong> — NOT from the Prophet\u2019s ﷺ sunnah!</div></li>
</div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Common bidʿah warning!</span><div class="study-note-body">Many people (especially in some cultures) whisper before prayer: "nawaytu an uṣalliya farḍa ẓ-ẓuhri rakaʿātin arbaʿan..." ("I intend to pray Ẓuhr four rakʿahs...").<br><br>
<strong>This is NOT from the Sunnah.</strong> The Prophet ﷺ and his Companions never said this out loud. They just <em>thought</em> it in their hearts before the takbīr. That\u2019s enough!<br><br>
The niyyah happens the moment you <em>decide to pray</em>. If you walked to the masjid thinking "I\u2019m going to pray Ẓuhr" — congratulations, you already made niyyah! No words needed.</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Niyyah is WHAT makes something worship!</span><div class="study-note-body">The famous hadith "Actions are by intentions" means: <strong>the SAME action can be worship or not, depending on niyyah</strong>.<br><br>
Examples:<br>
• Drinking water + intention "to have strength for worship" = rewarded ✓<br>
• Drinking water with no thought = neutral<br><br>
• Studying + intention "to benefit ummah" = rewarded ✓<br>
• Studying with intention to show off = punished ✗<br><br>
So niyyah is HUGE! It transforms ordinary acts into worship. For prayer specifically, niyyah means you <em>specifically intend this act as prayer for Allah</em>.</div></div>
`;}

function L11P6(){return `

<div class="sec"><div class="sec-ar">أَرْكَانُ الصَّلَاة</div><div class="sec-translit">Arkānu ṣ-ṣalāh</div><div class="sec-en">The Pillars of Ṣalāh (14 Pillars)</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Pillar = cannot skip!</span><div class="study-note-body">A <strong>rukn (pillar)</strong> is a part of prayer itself that CANNOT be skipped — not intentionally, not by mistake. If you miss a rukn:<br>
• <strong>Intentionally:</strong> prayer is invalid, full stop.<br>
• <strong>By mistake:</strong> you must go back and redo that rakʿah (or that part).<br><br>
In contrast, a <em>wājib</em> (obligation) is a step below: missing by mistake can be fixed with <em>sujūd as-sahw</em> (prostration of forgetfulness) — without redoing the prayer.</div></div>

<p style="margin-bottom:10px">The prayer has <strong>14 pillars</strong>:</p>

<table class="styled-table">
<thead><tr><th style="width:8%">#</th><th style="width:40%">Pillar</th><th>Evidence</th></tr></thead>
<tbody>
<tr><td><strong>1</strong></td><td><strong>Standing (qiyām) in obligatory prayer, if able</strong><br>الْقِيَامُ فِي صَلَاةِ الْفَرْضِ مَعَ الْقُدْرَة</td><td>ʿImrān ibn Ḥuṣayn: "<strong>Pray standing. If you cannot, then sitting...</strong>" (Bukhārī 1117)</td></tr>
<tr><td><strong>2</strong></td><td><strong>Takbīrat al-Iḥrām</strong> (opening takbīr)<br>تَكْبِيرَةُ الْإِحْرَام</td><td>ʿAlī: "<strong>Its sanctity is the takbīr</strong>" (Aḥmad 1/123)</td></tr>
<tr><td><strong>3</strong></td><td><strong>Reciting al-Fātiḥah</strong><br>قِرَاءَةُ الْفَاتِحَة</td><td>ʿUbādah ibn aṣ-Ṣāmit: "<strong>No prayer for the one who doesn\u2019t recite al-Fātiḥah</strong>" (Bukhārī 756)</td></tr>
<tr><td><strong>4</strong></td><td><strong>Rukūʿ (bowing)</strong><br>الرُّكُوع</td><td>Qur\u2019an (Ḥajj 22:77): "<strong>O you who believe, bow down and prostrate</strong>" + Prophet ﷺ to one praying wrong: "<strong>Then bow until you are still in rukūʿ</strong>" (Bukhārī 793)</td></tr>
<tr><td><strong>5</strong></td><td><strong>Rising from rukūʿ</strong><br>الرَّفْعُ مِنَ الرُّكُوع</td><td>Prophet ﷺ: "<strong>Then rise until you are standing straight</strong>" (Bukhārī — same hadith)</td></tr>
<tr><td><strong>6</strong></td><td><strong>Iʿtidāl (standing upright after rukūʿ)</strong><br>الِاعْتِدَالُ بَعْدَ الرَّفْعِ مِنَ الرُّكُوع</td><td>Same hadith as above.</td></tr>
<tr><td><strong>7</strong></td><td><strong>Sujūd on 7 body parts</strong><br>السُّجُودُ عَلَى الْأَعْضَاءِ السَّبْعَة</td><td>Ibn ʿAbbās: "<strong>I have been ordered to prostrate on 7 bones: the forehead (and he pointed to his nose), both hands, both knees, tips of both feet</strong>" (Bukhārī 812)</td></tr>
<tr><td><strong>8</strong></td><td><strong>Rising from sujūd</strong><br>الِاعْتِدَالُ مِنَ السُّجُود</td><td>Prophet ﷺ: "<strong>Then rise until you are still, sitting</strong>" (Bukhārī 793)</td></tr>
<tr><td><strong>9</strong></td><td><strong>Sitting between the two sajdahs</strong><br>الْجِلْسَةُ بَيْنَ السَّجْدَتَيْن</td><td>Same hadith.</td></tr>
<tr><td><strong>10</strong></td><td><strong>Sitting for the final tashahhud</strong><br>الْجُلُوسُ لِلتَّشَهُّدِ الْأَخِير</td><td>Ibn Masʿūd hadith on tashahhud (Bukhārī 797)</td></tr>
<tr><td><strong>11</strong></td><td><strong>Reciting the final tashahhud</strong><br>قِرَاءَةُ التَّشَهُّدِ الْأَخِير</td><td>Same hadith — "When one of you prays, let him say: At-taḥiyyātu lillāh..."</td></tr>
<tr><td><strong>12</strong></td><td><strong>Taslīm (saying salām to end prayer)</strong><br>التَّسْلِيم</td><td>ʿAlī: "<strong>Its ending is the taslīm</strong>" (Aḥmad 1/123)</td></tr>
<tr><td><strong>13</strong></td><td><strong>Ṭumaʾnīnah (stillness) in every pillar</strong><br>الطُّمَأْنِينَةُ فِي جَمِيعِ الْأَرْكَان</td><td>Prophet ﷺ to the bad pray-er: "<strong>...until you are still</strong>" — repeated for every action! (Bukhārī 724)</td></tr>
<tr><td><strong>14</strong></td><td><strong>Tartīb (order) between the pillars</strong><br>التَّرْتِيبُ بَيْنَ الْأَرْكَان</td><td>Prophet ﷺ: "<strong>Pray as you have seen me pray</strong>" (Bukhārī 605) — and he always did them in a fixed order.</td></tr>
</tbody>
</table>

<div class="study-note remember"><span class="study-note-label">⭐ Ṭumaʾnīnah (stillness) is RULE #13 — don\u2019t forget!</span><div class="study-note-body">Look at pillar #13: <strong>being STILL in every position is a pillar</strong>. This is where many people fail!<br><br>
The Prophet ﷺ saw a man praying too fast (he described it as <em>"like a bird pecking"</em>). He told the man his prayer was invalid and kept sending him back — THREE TIMES — until he learned to be still.<br><br>
Practical test: in rukūʿ, sujūd, iʿtidāl — <em>are all your bones at rest for even 1 second?</em> If yes, you have ṭumaʾnīnah. If you\u2019re bouncing up and down, you\u2019re invalidating your prayer!</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Tartīb (order) — why it matters</span><div class="study-note-body">Pillar #14 is <strong>keeping the correct order</strong>. You can\u2019t do sujūd before rukūʿ. You can\u2019t do iʿtidāl before starting. The Prophet ﷺ set a fixed sequence — follow it.<br><br>
Also important: you can\u2019t <em>skip</em> any pillar. Every rakʿah includes: qiyām → Fātiḥah → rukūʿ → iʿtidāl → sujūd → sitting → sujūd (again). Missing even one in any rakʿah = invalid rakʿah.</div></div>
`;}

<p style="margin-bottom:10px">There are <strong>8 obligations</strong> (wājibāt). Missing them intentionally invalidates the prayer. Missing by mistake can be fixed with <em>sujūd as-sahw</em>:</p>

<div class="study-note remember"><span class="study-note-label">⭐ Pay attention to WHICH takbīrs are obligatory</span><div class="study-note-body">The VERY FIRST takbīr ("Allāhu akbar" at the start) = <strong>RUKN</strong> (pillar #2). You CANNOT miss it.<br><br>

• EVERYONE says this — imām, follower, and individual!<br><br>

function L11P8(){return `

<div class="sec"><div class="sec-ar">الْفَرْقُ بَيْنَ أَرْكَانِ الصَّلَاةِ وَوَاجِبَاتِهَا</div><div class="sec-translit">Al-farqu bayna arkāni ṣ-ṣalāti wa wājibātihā</div><div class="sec-en">The Difference Between Pillars (Arkān) and Obligations (Wājibāt)</div></div>

<p style="margin-bottom:12px">This is super important! Both are required — but missing them is treated <strong>differently</strong>:</p>

<div class="callout rust"><div class="callout-label">What they have in COMMON</div><div class="callout-en">Both pillars AND obligations <strong>cannot be left intentionally</strong>. Leaving either one on purpose → <strong>prayer is invalid</strong>.</div></div>

<p style="margin:14px 0 10px"><strong>How they DIFFER (when left by MISTAKE):</strong></p>

<div class="compare-grid">
<div class="compare-card"><div class="compare-card-head rust"><span class="ch-ar">الرُّكْن</span><span class="ch-translit">Ar-rukn</span><br>PILLAR</div><ul class="compare-card-body"><li>If you <strong>remember BEFORE reaching its place in the next rakʿah</strong>: GO BACK and do it, then continue. Do sujūd as-sahw at the end.</li><li>If you have <strong>already reached its place in the next rakʿah</strong>: the previous rakʿah is <strong>VOID</strong>. The current rakʿah now takes its place. Then do sujūd as-sahw.</li></ul></div>
<div class="compare-card"><div class="compare-card-head gold"><span class="ch-ar">الْوَاجِب</span><span class="ch-translit">Al-wājib</span><br>OBLIGATION</div><ul class="compare-card-body"><li>Do NOT go back!</li><li>Just continue the prayer normally.</li><li>Do <strong>sujūd as-sahw at the end</strong> of the prayer to "patch" the mistake.</li></ul></div>
</div>

<div class="study-note beginner"><span class="study-note-label">💡 Example — missed RUKN (pillar)</span><div class="study-note-body"><strong>Scenario:</strong> In rakʿah 1, after one sajdah, you stand up for rakʿah 2, forgetting the second sajdah. You recite al-Fātiḥah in rakʿah 2, then realize!<br><br>
<strong>Diagnosis:</strong> You skipped a pillar (sujūd). You haven\u2019t yet reached the "same place" in rakʿah 2 (the sujūd of rakʿah 2). So...<br>
<strong>Action:</strong> Sit down, complete the missed sajdah, then stand up again and restart rakʿah 2 from Fātiḥah. At the end: do sujūd as-sahw (2 extra sajdahs before salām).<br><br>
If instead you realized only AFTER you\u2019ve done sujūd of rakʿah 2: then rakʿah 1 is gone — rakʿah 2 now counts as your rakʿah 1. You must make up for the lost rakʿah by adding one more at the end + sujūd as-sahw.</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Example — missed WĀJIB (obligation)</span><div class="study-note-body"><strong>Scenario:</strong> You forget to say "Subḥāna rabbiya l-ʿaẓīm" in rukūʿ. Or you stand up for rakʿah 3 forgetting the first tashahhud.<br><br>
<strong>Action:</strong> DON\u2019T go back! Just continue your prayer normally. At the end: <strong>sujūd as-sahw</strong> (2 prostrations before or after the final salām) covers the mistake.<br><br>
See the difference? For pillars you MUST redo. For obligations you just <em>patch</em>. That\u2019s the key distinction!</div></div>

<div class="sec"><div class="sec-ar">تَنْبِيهَات</div><div class="sec-translit">Tanbīhāt</div><div class="sec-en">Important Cautions (3 Warnings)</div></div>

<div class="num-list">
<li data-n="1"><div class="li-en"><strong>Rising from rukūʿ or sujūd and going DIRECTLY into the next sajdah without straightening your back first</strong> = leaving a PILLAR (specifically, ṭumaʾnīnah in iʿtidāl). Prayer is invalid!</div></li>

<li data-n="2"><div class="li-en"><strong>Lifting both feet during sujūd, or placing one foot over the other</strong> = leaving a PILLAR (sujūd on the 7 body parts). The toes must stay planted.</div></li>

<li data-n="3"><div class="li-en"><strong>Saying the required dhikr only in your heart</strong> (without moving your lips or tongue) = NOT sufficient! You must actually <strong>move your lips and tongue</strong> to form the words. Silent-mental recitation isn\u2019t enough for things like Fātiḥah, tasbīḥ in rukūʿ/sujūd, etc.</div></li>
</div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Warning #3 is a common mistake!</span><div class="study-note-body">Many people "read" al-Fātiḥah in their minds without moving their mouths. <strong>This is NOT valid.</strong> Reciting means: lips + tongue actually moving to form the sounds (even if very quietly, inaudibly).<br><br>
Test yourself: in your silent prayer (Ẓuhr, ʿAṣr), are you actually MOVING your lips when you recite? If not, you\u2019re skipping an obligation. Fix this habit!</div></div>
`;}

function L11P9(){return `

<p class="assessment-intro" style="margin-top:8px">This is the FINAL assessment of the Fiqh guide. Try each before revealing.</p>

<div class="q-item"><span class="q-num">1</span><div class="q-en">Mark as ✓ or ✗ and correct if wrong:</div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">a) "Whoever forgot a pillar of prayer — sujūd as-sahw fixes it."</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>✗ Wrong.</strong> Correction: Sujūd as-sahw does NOT fix a missed pillar (rukn). For a missed <strong>pillar</strong>, you must go back and DO the pillar, then complete the prayer, then do sujūd as-sahw at the end. Sujūd as-sahw <em>alone</em> only fixes a missed <strong>obligation (wājib)</strong>, not a pillar.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">b) "Whoever intentionally leaves one of the prayer\u2019s obligations — his prayer is invalid."</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>✓ Correct.</strong> This is a key point. Intentionally leaving EITHER a pillar OR an obligation invalidates the prayer. The difference (pillar vs obligation) only matters when the omission is by <em>mistake</em>, not intention.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">c) "Ẓuhr time is from sun passing the zenith until the object\u2019s shadow equals its own length."</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>✓ Correct.</strong> Ẓuhr starts at zawāl (sun just past the highest point in sky) and ends when an object\u2019s shadow = object\u2019s length (<em>not</em> counting the shadow at zawāl itself).</div></div>
</div>

<div class="q-item"><span class="q-num">2</span><div class="q-en">Derive a fiqh ruling from each of these evidences:</div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">a) <em>"Indeed prayer has been decreed upon the believers at specified times"</em> (Nisāʾ 4:103)</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Ruling:</strong> The <strong>time condition</strong> — prayer is not valid before its time, and not permissible to delay past its time. Each of the 5 prayers has <em>specific, fixed times</em>.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">b) <em>"O children of Adam, take your adornment at every masjid"</em> (Aʿrāf 7:31)</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Ruling:</strong> <strong>Covering the ʿawrah is a condition</strong> of prayer. Also: it\u2019s recommended to wear your <em>best</em> clothes for prayer, since "adornment" (zīnah) means more than just minimum coverage — it means nice attire.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">c) <em>"Pray standing. If you cannot, then sitting..."</em> (Bukhārī 1117)</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Ruling:</strong> <strong>Standing (qiyām) is a pillar</strong> of obligatory prayer FOR THOSE WHO ARE ABLE. Only if you genuinely cannot stand (due to illness, disability, etc.) may you sit. The default is standing.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">d) <em>"Allah does not accept the prayer of one who has ḥadath until he makes wuḍūʾ"</em></div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Ruling:</strong> <strong>Ṭahārah from ḥadath (by wuḍūʾ or ghusl) is a CONDITION</strong> of prayer. Without it, prayer is not accepted at all.</div></div>
</div>

<div class="q-item"><span class="q-num">3</span><div class="q-en">What would you do in this scenario?</div><div class="q-ar" style="margin-top:6px;font-size:.85rem">You prayed sunnah of Maghrib at home. After the first sajdah of rakʿah 1, you stood up for rakʿah 2. After finishing Fātiḥah in rakʿah 2, you remembered you didn\u2019t do the second sajdah of rakʿah 1!</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>This is a pillar (sujūd) missed by mistake.</strong><br><br>
<strong>Key question:</strong> Have you reached the "place" of the missed pillar in the next rakʿah? In rakʿah 2, the second sajdah hasn\u2019t happened yet — so you haven\u2019t reached it.<br><br>
<strong>Action:</strong><br>
1. <strong>Sit down right away</strong> (cancel standing for rakʿah 2 mentally)<br>
2. <strong>Complete the missed second sajdah</strong> of rakʿah 1<br>
3. <strong>Stand up and restart rakʿah 2</strong> from Fātiḥah<br>
4. <strong>Continue normally</strong> to finish the prayer<br>
5. <strong>Do sujūd as-sahw</strong> (2 extra sajdahs before or after taslīm)<br><br>
Your prayer is now valid!</div></div>

<div class="q-item"><span class="q-num">4</span><div class="q-en">Provide one evidence for each:</div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">a) Reciting al-Fātiḥah is a PILLAR of prayer.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Evidence:</strong> The Prophet ﷺ said: <strong>"No prayer for the one who does not recite al-Fātiḥah"</strong> — narrated by ʿUbādah ibn aṣ-Ṣāmit (Bukhārī 756). "No prayer" means it\u2019s invalid — proving Fātiḥah is essential.</div></div>

<div style="margin-top:10px"><div style="font-weight:600;font-size:.88rem;color:var(--ink);margin:8px 0 4px">b) The first tashahhud is an OBLIGATION of prayer.</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Evidence:</strong> ʿĀʾishah reported: <strong>"The Prophet ﷺ would say in every 2 rakʿahs: at-taḥiyyah..."</strong> (Muslim 498). Also — when he forgot it once, he did <strong>sujūd as-sahw</strong> to fix it (instead of redoing the rakʿah) — which proves it\u2019s a wājib (not a pillar)!</div></div>
</div>

<div class="q-item"><span class="q-num">5</span><div class="q-en">Khālid had eye surgery. The doctor told him not to prostrate or bow for a while. So he placed a chair and sat on it to pray. What\u2019s wrong with what he did?</div>
<button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>What\u2019s wrong:</strong> Khālid skipped <strong>qiyām (standing)</strong> — which is pillar #1 of the prayer.<br><br>
<strong>Correct approach:</strong><br>
• <strong>Qiyām (standing)</strong>: he MUST stand if he can. Unable to bow/prostrate ≠ unable to stand!<br>
• <strong>Rukūʿ and sujūd</strong>: since the doctor said to avoid these, he can <strong>gesture</strong> by bending slightly while standing (for rukūʿ), then sit down and bend slightly more (for sujūd).<br><br>
<strong>Principle:</strong> Do what you CAN; only skip what you CAN\u2019T. Khālid could stand, so he must. Jumping to a chair for convenience = skipping a pillar = invalid prayer.</div></div>

</div>

<div class="defbox"><div class="defbox-tag">📌 Definition</div><div class="defbox-body"><div class="defbox-ar">الْفِقْهُ: مَعْرِفَةُ الْأَحْكَامِ الشَّرْعِيَّةِ الْعَمَلِيَّةِ.</div><div class="defbox-translit">Al-fiqh: maʿrifatu l-aḥkāmi sh-sharʿiyyati l-ʿamaliyyah.</div><div class="defbox-en"><strong>Fiqh</strong> is knowing the <strong>practical Islamic rulings</strong> — the "how-to" of religion: how to pray, how to purify yourself, what's allowed and what isn't.</div></div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What is fiqh in simple words?</span><div class="study-note-body">If <em>tawhid</em> teaches you <strong>what you believe</strong> (the theory), <em>fiqh</em> teaches you <strong>what you do</strong> (the practice). Think of tawhid as knowing who your Creator is, and fiqh as knowing how to live in a way that pleases Him.<br><br>Example: <em>Tawhid</em> tells you "Allah deserves to be worshipped." <em>Fiqh</em> tells you "Here's exactly how to pray, wash, and behave." You need both!</div></div>

`;}

<div class="sec"><div class="sec-ar">الْأَحْكَامُ الشَّرْعِيَّةُ الْخَمْسَةُ</div><div class="sec-translit">Al-aḥkāmu sh-sharʿiyyatu l-khamsah</div><div class="sec-en">The Five Islamic Rulings</div></div>

<p style="margin-bottom:12px">Every action you can possibly do falls into one of these five categories:</p>

<div class="ruling-chart">
  <div class="ruling-card wajib"><div class="rc-num">1</div><div class="rc-ar">الْوَاجِب</div><div class="rc-translit">al-wājib</div><div class="rc-def">The doer is <strong>rewarded</strong>; the one who leaves it is <strong>punished</strong>.</div><div class="rc-ex">Example: Ṣalāh (prayer)</div></div>

  <div class="ruling-card mustahabb"><div class="rc-num">2</div><div class="rc-ar">الْمُسْتَحَبّ</div><div class="rc-translit">al-mustaḥabb</div><div class="rc-def">The doer is <strong>rewarded</strong>; the one who leaves it is <strong>not punished</strong>.</div><div class="rc-ex">Example: Sunan rawātib (sunnah prayers)</div></div>

  <div class="ruling-card mubah"><div class="rc-num">3</div><div class="rc-ar">الْمُبَاح</div><div class="rc-translit">al-mubāḥ</div><div class="rc-def">The doer is <strong>not rewarded</strong>, nor is the one who leaves it <strong>punished</strong>.</div><div class="rc-ex">Example: Drinking juice</div></div>

  <div class="ruling-card makruh"><div class="rc-num">4</div><div class="rc-ar">الْمَكْرُوه</div><div class="rc-translit">al-makrūh</div><div class="rc-def">The doer is <strong>not punished</strong>; the one who leaves it is <strong>rewarded</strong>.</div><div class="rc-ex">Example: Looking around during prayer</div></div>

  <div class="ruling-card haram"><div class="rc-num">5</div><div class="rc-ar">الْمُحَرَّم</div><div class="rc-translit">al-muḥarram</div><div class="rc-def">The one who leaves it is <strong>rewarded</strong>; the doer is <strong>punished</strong>.</div><div class="rc-ex">Example: Disobeying parents</div></div>
</div>

<div class="study-note beginner"><span class="study-note-label">💡 Think of it like a traffic light (but with 5 colors!)</span><div class="study-note-body">Imagine Allah has set up 5 signs for every possible action in your life:<br>
🟢 <strong>Must do</strong> (wājib) — prayer, fasting Ramadan, respecting parents<br>
💚 <strong>Bonus points for doing</strong> (mustaḥabb) — extra sunnah prayers<br>
⚪ <strong>Your choice</strong> (mubāḥ) — choosing apple or orange juice<br>
🟡 <strong>Better not</strong> (makrūh) — fidgeting in prayer<br>
🔴 <strong>Must NOT do</strong> (muḥarram) — lying, stealing, disrespecting parents<br><br>
Every single thing you can think of fits into one of these 5. Once you learn fiqh, you start to see the "sign" for every action!</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Memorize this pattern</span><div class="study-note-body">A classic trick to remember them in order of "strictness":<br>
<strong>Wājib → Mustaḥabb → Mubāḥ → Makrūh → Muḥarram</strong><br>
(must-do → recommended → neutral → disliked → forbidden)<br><br>
Notice how they go from <em>most obligatory</em> to <em>most forbidden</em>, with "neutral" right in the middle. The first two = good things to do. The last two = things to avoid. Mubāḥ = completely up to you!</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Common mistake</span><div class="study-note-body">People often confuse <strong>mustaḥabb</strong> (recommended) with <strong>wājib</strong> (obligatory). Missing a <em>mustaḥabb</em> act is not a sin — you just miss out on extra reward. But missing a <em>wājib</em> (like a daily prayer) <em>is</em> a sin. Make sure you know which is which for every act!</div></div>
`;}

<div class="sec"><div class="sec-ar">مَا الطَّهَارَة؟</div><div class="sec-translit">Mā aṭ-ṭahārah?</div><div class="sec-en">What is Ṭahārah?</div></div>

<div class="defbox"><div class="defbox-tag">📌 Definition</div><div class="defbox-body"><div class="defbox-ar">هِيَ: رَفْعُ الْحَدَثِ، وَإِزَالَةُ النَّجَاسَةِ.</div><div class="defbox-translit">Hiya: rafʿu l-ḥadathi, wa izālatu n-najāsah.</div><div class="defbox-en"><strong>Ṭahārah (purification)</strong> is: <strong>(1) removing ḥadath</strong> and <strong>(2) removing najāsah</strong>.</div></div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Two kinds of "dirty" in Islam</span><div class="study-note-body">In Islam, there are <strong>two different kinds of being unclean</strong>, and it's really important to tell them apart!<br><br>
<strong>1. Ḥadath (حَدَث)</strong> — an <em>invisible</em> state of being ritually unclean. You can\u2019t see it, but you have it after using the bathroom, sleeping, etc. You fix it with <em>wuḍūʾ</em> or <em>ghusl</em>.<br><br>

<tr><td style="font-weight:700;color:var(--rust);background:var(--rust-light)">Definition<br><span style="font-family:'Cormorant Garamond',serif;font-size:.95rem">التَّعْرِيف</span></td><td>Water that remains on its <strong>original created state</strong>, with nothing changing it.<br><br><em>Examples:</em><br>• Sea water (مياه البحار)<br>• River water (مياه الأنهار)<br>• Rain water (مياه الأمطار)<br>• Well water, spring water</td><td>Water whose <strong>color, taste, or smell</strong> has been <strong>changed by impurity</strong>.<br><br><em>Examples:</em><br>• Water mixed with urine or blood<br>• Sewage water (مياه المجاري)<br>• Water with a dead animal in it (causing smell change)</td></tr>
<tr><td style="font-weight:700;color:var(--rust);background:var(--rust-light)">Ruling<br><span style="font-family:'Cormorant Garamond',serif;font-size:.95rem">الحُكْم</span></td><td><strong>Can be used</strong> for wuḍūʾ, ghusl, eating, drinking.</td><td><strong>Cannot be used</strong> for purification — and cannot be drunk or eaten with.</td></tr>
<tr><td style="font-weight:700;color:var(--rust);background:var(--rust-light)">Note<br><span style="font-family:'Cormorant Garamond',serif;font-size:.95rem">تَنْبِيه</span></td colspan="2"><td colspan="2"><div style="font-family:'Cormorant Garamond',serif;direction:rtl;text-align:right;font-size:.98rem;line-height:1.8;color:var(--ink);margin-bottom:6px">إِذَا تَغَيَّرَ الْمَاءُ بِشَيْءٍ يَسِيرٍ طَاهِرٍ - مِثْلَ: أَنْ يَقَعَ فِيهِ قَلِيلٌ مِنَ التُّرَابِ، أَوِ الصَّدَأِ - فَهَذَا بَاقٍ عَلَى طَهُورِيَّتِهِ وَيَجُوزُ اسْتِعْمَالُهُ.</div><div style="font-style:italic;color:var(--muted);font-size:.8rem;margin-bottom:6px">Idhā taghayyara l-māʾu bi-shayʾin yasīrin ṭāhir — mithla: an yaqaʿa fīhi qalīlun mina t-turāb, awi ṣ-ṣadaʾ — fa-hādhā bāqin ʿalā ṭahūriyyatihi wa yajūzu stiʿmāluh.</div>If water changes due to a <strong>small amount of pure substance</strong> (like a bit of dust falling in, or rust from the pipes) — it <strong>stays pure and can still be used</strong>.</td></tr>
</tbody>
</table>

<div class="study-note beginner"><span class="study-note-label">💡 Simple way to remember</span><div class="study-note-body">Ask yourself two questions about any water:<br>
<strong>1. Has it been changed by something <em>impure</em>?</strong> (urine, blood, filth) → If YES, it\u2019s najis (impure). Don\u2019t use it!<br>
<strong>2. Has it only been changed by something <em>pure</em>?</strong> (dust, rust, leaves falling in) → Still pure! Still usable!<br><br>
So the question isn\u2019t "did the water change?" — the question is "did it change because of <em>impurity</em>?" Big difference!</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Subtle but important</span><div class="study-note-body">The test for impure water is whether <strong>one of three things</strong> changed:<br>
🎨 <strong>Color</strong> (لَوْن / lawn)<br>
👅 <strong>Taste</strong> (طَعْم / ṭaʿm)<br>
👃 <strong>Smell</strong> (رِيح / rīḥ)<br><br>
If impurity fell in but <em>none</em> of these changed (e.g., the water is so much that it stays clear), most scholars say the water is still pure! But if even one changes → impure.</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word tip</span><div class="study-note-title">طَهُور · ṭahūr vs طَاهِر · ṭāhir</div><div class="study-note-body">Both come from root ط-ه-ر (pure). But there\u2019s a subtle difference:<br>
<strong>Ṭāhir</strong> = pure (in itself, clean)<br>
<strong>Ṭahūr</strong> = pure AND capable of purifying others<br><br>
All ṭahūr water is ṭāhir, but not all ṭāhir is ṭahūr. Example: tea is ṭāhir (clean, drinkable) but not ṭahūr (can\u2019t make wuḍūʾ with it). Sea water is <strong>both</strong> — you can drink from it (in emergencies) AND purify with it!</div></div>
`;}

<div class="study-note remember"><span class="study-note-label">⭐ What does "them" mean?</span><div class="study-note-body">Who are the "them" in "for <em>them</em> in this world"? The Prophet ﷺ is referring to the <strong>disbelievers</strong>. The meaning: disbelievers may enjoy these luxuries in this short worldly life, but believers — even if we live simply now — will have something <strong>far better</strong> in Paradise. Gold and silver vessels there are just the beginning!<br><br>So it\u2019s not that gold and silver are "bad" — it\u2019s that we\u2019re reserving them for the much better, eternal enjoyment of Paradise.</div></div>

function L2P1(){return `

<div class="sec"><div class="sec-ar">تَعْرِيفُ النَّجَاسَة</div><div class="sec-translit">Taʿrīfu n-najāsah</div><div class="sec-en">Definition of Najāsah</div></div>

<div class="defbox"><div class="defbox-tag">📌 Definition</div><div class="defbox-body"><div class="defbox-ar">أَشْيَاءُ مُسْتَقْذَرَةٌ شَرْعًا، تَمْنَعُ مِنْ صِحَّةِ الصَّلَاةِ وَنَحْوِهَا.</div><div class="defbox-translit">Ashyāʾu mustaqdharatun sharʿan, tamnaʿu min ṣiḥḥati ṣ-ṣalāti wa naḥwihā.</div><div class="defbox-en"><strong>Najāsah</strong> is: <strong>filthy things according to Islamic law</strong>, which <strong>prevent prayer from being valid</strong> (and similar acts of worship).</div></div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why the word "sharʿan" matters</span><div class="study-note-body">Notice the word <strong>sharʿan (شَرْعًا)</strong> — "according to Islamic law." Why is this important?<br><br>
Because something might seem "gross" to us (like sweat on a hot day), but Islam doesn\u2019t consider it impure. And something might seem clean to us (like water mixed with urine that we can\u2019t see), but Islam considers it impure.<br><br>
The <strong>rule is: we follow what Islam says is impure</strong>, not just our feelings. This is why the definition specifies "in Islamic law."</div></div>

<div class="sec"><div class="sec-ar">أَقْسَامُ النَّجَاسَة</div><div class="sec-translit">Aqsāmu n-najāsah</div><div class="sec-en">Types of Najāsah</div></div>

<div class="body-text"><div class="bt-ar">النَّجَاسَةُ قِسْمَانِ: ١. نَجَاسَةٌ عَيْنِيَّةٌ  ٢. نَجَاسَةٌ حُكْمِيَّةٌ</div><div class="bt-translit">An-najāsatu qismān: (1) najāsatun ʿayniyyah (2) najāsatun ḥukmiyyah.</div><div class="bt-en">Najāsah is of <strong>two types</strong>: (1) Essential impurity (ʿayniyyah) and (2) Ruling impurity (ḥukmiyyah).</div></div>

<div class="compare-grid">
<div class="compare-card"><div class="compare-card-head rust"><span class="ch-ar">النَّجَاسَة الْعَيْنِيَّة</span><span class="ch-translit">An-najāsah al-ʿayniyyah</span><br>1. Essential Impurity</div><ul class="compare-card-body"><li><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem">وَهِيَ الَّتِي لَا يُمْكِنُ تَطْهِيرُهَا مُطْلَقًا؛ لِأَنَّهَا نَجِسَةٌ فِي ذَاتِهَا.</em><br>Those that <strong>cannot be purified at all</strong>, because they are impure in their very essence.</li><li><strong>Examples:</strong> urine (بَوْل), feces (غَائِط), dog (كَلْب), dead animal (مَيْتَة)</li></ul></div>
<div class="compare-card"><div class="compare-card-head gold"><span class="ch-ar">النَّجَاسَة الْحُكْمِيَّة</span><span class="ch-translit">An-najāsah al-ḥukmiyyah</span><br>2. Ruling Impurity</div><ul class="compare-card-body"><li><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem">وَهِيَ الْأَشْيَاءُ الطَّاهِرَةُ الَّتِي تَغَيَّرَ لَوْنُهَا أَوْ طَعْمُهَا أَوْ رِيحُهَا بِشَيْءٍ نَجِسٍ.</em><br>The <strong>pure things whose color, taste, or smell has been changed by something impure</strong>.</li><li><strong>Examples:</strong> a garment touched by urine, a sandal stepped in feces, water in which an animal died and whose smell changed</li></ul></div>
</div>

<div class="study-note remember"><span class="study-note-label">⭐ The key difference</span><div class="study-note-body">Ask yourself: <strong>"Was this thing <em>ever</em> pure?"</strong><br><br>
<strong>If NO</strong> — it was always impure → <em>ʿayniyyah</em> → can\u2019t be purified.<br>
<strong>If YES</strong> — it was pure before but got impurity on it → <em>ḥukmiyyah</em> → can be cleaned!<br><br>
Example: <strong>Urine</strong> itself is <em>ʿayniyyah</em> — you can\u2019t "clean" urine. But a <strong>shirt that got urine on it</strong> is <em>ḥukmiyyah</em> — you can wash the shirt and it becomes pure again. Same rule, different situations!</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Two words you\u2019ll see often</span><div class="study-note-body"><strong>ʿAyn (عَيْن)</strong> = essence, the thing itself.<br>
<strong>Ḥukm (حُكْم)</strong> = judgement, ruling.<br><br>
So <em>najāsah ʿayniyyah</em> = impurity that\u2019s in the <em>essence</em> of the thing. <em>Najāsah ḥukmiyyah</em> = impurity by <em>ruling</em> (because the pure thing touched impurity, so we rule it impure now).<br><br>
This ʿayn/ḥukm distinction appears throughout fiqh — memorize it!</div></div>
`;}

function L2P3(){return `

<div class="sec"><div class="sec-ar">دَرَجَاتُ النَّجَاسَة</div><div class="sec-translit">Darajātu n-najāsah</div><div class="sec-en">Degrees of Impurity</div></div>

<p style="margin-bottom:10px">Najāsah has <strong>three degrees</strong> — from heaviest to lightest:</p>

<div class="point"><div class="point-num">1</div><div><div class="point-ar">النَّجَاسَة الْمُغَلَّظَة (الْمُشَدَّدَة)</div><div class="point-translit">An-najāsatu l-mughallaẓah (al-mushaddadah)</div><div class="point-en"><strong>1. The Heaviest Impurity</strong> — the most severe degree</div></div></div>

<div class="body-text"><div class="bt-ar"><strong>مِثَال:</strong> نَجَاسَةُ مَا وَلَغَ فِيهِ الْكَلْبُ.<br><strong>وَطَرِيقَةُ تَطْهِيرِهَا:</strong> بِأَنْ تُغْسَلَ سَبْعَ مَرَّاتٍ أُولَاهُنَّ بِالتُّرَابِ.</div><div class="bt-translit"><strong>Mithāl:</strong> najāsatu mā walagha fīhi l-kalb.<br><strong>Wa ṭarīqatu taṭhīrihā:</strong> bi-an tughsala sabʿa marrātin ūlāhunna bi-t-turāb.</div><div class="bt-en"><strong>Example:</strong> the impurity of something a dog has licked into.<br><strong>Method of purification:</strong> wash it <strong>seven times</strong>, the <strong>first time with dust (turāb)</strong>.</div></div>

<div class="hadith"><div class="hadith-label">وَدَلِيلُ ذَلِكَ · Ḥadīth — Abū Hurayrah</div><div class="h-ar">«طَهُورُ إِنَاءِ أَحَدِكُمْ إِذَا وَلَغَ فِيهِ الْكَلْبُ أَنْ يَغْسِلَهُ سَبْعَ مَرَّاتٍ، أُولَاهُنَّ بِالتُّرَابِ»</div><div class="h-translit">Ṭahūru ināʾi aḥadikum idhā walagha fīhi l-kalbu an yaghsilahu sabʿa marrātin, ūlāhunna bi-t-turāb.</div><div class="h-en">"The purification of a vessel of one of you, when a dog licks into it, is to wash it <strong>seven times, the first of them with dust</strong>."</div><div class="h-source">Narrated by Muslim no. 279</div></div>

<div class="body-text"><div class="bt-ar"><strong>وَمَعْنَى وَلَغَ:</strong> شَرِبَ أَوْ أَدْخَلَ لِسَانَهُ فِي الْمَاءِ وَنَحْوِهِ وَحَرَّكَهُ.</div><div class="bt-translit"><strong>Wa maʿnā walagha:</strong> shariba aw adkhala lisānahu fī l-māʾi wa naḥwih, wa ḥarrakah.</div><div class="bt-en"><strong>The meaning of <em>walagha</em>:</strong> he drank, or he <strong>inserted his tongue</strong> into the water or similar liquid <strong>and moved it around</strong>.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 What does "walagha" (وَلَغَ) mean?</span><div class="study-note-body">The word <strong>walagha</strong> specifically means: "to drink from a vessel by <em>dipping the tongue into it and moving it around</em>" — the way dogs drink. It\u2019s not just touching — it\u2019s the tongue going into the water and stirring it.<br><br>
So the rule specifically applies when a dog <em>drinks from</em> your cup or bowl. Modern science tells us dog saliva contains many bacteria and parasites — and amazingly, scientific research has shown that <strong>dust (or soap-like substances) absorbs these more effectively than water alone</strong>! The Prophet ﷺ taught this 1400 years ago.</div></div>

<div class="point"><div class="point-num">2</div><div><div class="point-ar">النَّجَاسَة الْمُتَوَسِّطَة</div><div class="point-translit">An-najāsatu l-mutawassiṭah</div><div class="point-en"><strong>2. The Medium Impurity</strong> — the normal/average degree</div></div></div>

<div class="body-text"><div class="bt-ar"><strong>مِثَال:</strong> بَوْلُ الْآدَمِيِّ وَغَائِطُهُ وَغَالِبُ النَّجَاسَاتِ؛ إِذَا وَقَعَتْ عَلَى الْأَرْضِ أَوِ الْبَدَنِ أَوْ ثَوْبٍ وَنَحْوِهَا.<br><strong>وَطَرِيقَةُ تَطْهِيرِهَا:</strong> بِإِزَالَةِ جِرْمِ النَّجَاسَةِ إِذَا كَانَ لَهَا جِرْمٌ، وَتَنْظِيفُ مَحَلِّهَا بِالْمَاءِ أَوْ غَيْرِهِ مِنْ وَسَائِلِ التَّنْظِيفِ الْحَدِيثَةِ.</div><div class="bt-translit"><strong>Mithāl:</strong> bawlu l-ādamiyyi wa ghāʾiṭuh wa ghālibu n-najāsāt; idhā waqaʿat ʿalā l-arḍi awi l-badani aw thawbin wa naḥwihā.<br><strong>Wa ṭarīqatu taṭhīrihā:</strong> bi-izālati jirmi n-najāsati idhā kāna lahā jirm, wa tanẓīfu maḥallihā bi-l-māʾi aw ghayrihi min wasāʾili t-tanẓīfi l-ḥadīthah.</div><div class="bt-en"><strong>Example:</strong> <strong>human urine, feces, and most impurities</strong> — when they fall on the ground, the body, a garment, or the like.<br><strong>Method of purification:</strong> by <strong>removing the visible substance</strong> (jirm) if it has one, then <strong>cleaning the spot with water</strong> or other modern cleaning agents.</div></div>

<div class="point"><div class="point-num">3</div><div><div class="point-ar">النَّجَاسَة الْمُخَفَّفَة</div><div class="point-translit">An-najāsatu l-mukhaffafah</div><div class="point-en"><strong>3. The Lightest Impurity</strong> — the easiest to clean</div></div></div>

<div class="body-text"><div class="bt-ar"><strong>مِثَال:</strong> بَوْلُ الصَّبِيِّ الرَّضِيعِ الَّذِي لَمْ يَأْكُلِ الطَّعَامَ إِذَا أَصَابَ الثَّوْبَ وَنَحْوَهُ.<br><strong>وَطَرِيقَةُ تَطْهِيرِهَا:</strong> أَنْ يُرَشَّ عَلَيْهَا الْمَاءُ حَتَّى يَغْمُرَهَا، وَلَا يَحْتَاجُ إِلَى فَرْكٍ أَوْ عَصْرٍ.</div><div class="bt-translit"><strong>Mithāl:</strong> bawlu ṣ-ṣabiyyi r-raḍīʿi lladhī lam yaʾkuli ṭ-ṭaʿāma idhā aṣāba th-thawba wa naḥwah.<br><strong>Wa ṭarīqatu taṭhīrihā:</strong> an yurashsha ʿalayhā l-māʾu ḥattā yaghmurahā, wa lā yaḥtāju ilā farkin aw ʿaṣr.</div><div class="bt-en"><strong>Example:</strong> the urine of a <strong>nursing baby boy who has not yet eaten solid food</strong> — when it reaches a garment or similar.<br><strong>Method of purification:</strong> <strong>sprinkle water</strong> over it until it is soaked — <strong>no rubbing (fark) or wringing (ʿaṣr)</strong> is needed!</div></div>

<div class="hadith"><div class="hadith-label">وَدَلِيلُ ذَلِكَ · Ḥadīth — ʿĀʾishah</div><div class="h-ar">«أُتِيَ بِصَبِيٍّ صَغِيرٍ لَمْ يَأْكُلِ الطَّعَامَ، فَبَالَ عَلَى ثَوْبِهِ، فَدَعَا بِمَاءٍ فَنَضَحَهُ عَلَى ثَوْبِهِ، وَلَمْ يَغْسِلْهُ»</div><div class="h-translit">Utiya bi-ṣabiyyin ṣaghīrin lam yaʾkuli ṭ-ṭaʿām, fa-bāla ʿalā thawbihi, fa-daʿā bi-māʾin fa-naḍaḥahu ʿalā thawbihi, wa lam yaghsilhu.</div><div class="h-en">"A little baby who had not yet eaten solid food was brought to the Prophet ﷺ, and he urinated on the Prophet\u2019s garment. The Prophet ﷺ called for water and <strong>sprinkled</strong> it on his garment — he did <strong>not wash</strong> it."</div><div class="h-source">Narrated by al-Bukhārī no. 222</div></div>

<div class="study-note watch-out"><span class="study-note-label">⚠️ Note the specific conditions</span><div class="study-note-body">The light ruling applies only when <strong>all three</strong> conditions are met:<br>
✔ <strong>Baby boy</strong> (not girl — baby girl urine needs regular washing)<br>
✔ <strong>Not yet eating solid food</strong> (breast milk only)<br>
✔ <strong>Only urine</strong> — not feces (feces always needs full washing)<br><br>
If the baby started eating solid food, or if it\u2019s a girl, the regular washing rules apply.</div></div>

<div class="activity" id="al2p3">
<div class="section-badge">نَشَاط · Activity 2</div>
<div class="act-item"><div class="act-prompt"><strong style="color:var(--rust)">اسْتَنْبِطْ: لِمَاذَا سُمِّيَتْ نَجَاسَةُ الْكَلْبِ مُغَلَّظَةً وَنَجَاسَةُ بَوْلِ الصَّبِيِّ مُخَفَّفَةً؟</strong><br><em style="color:var(--muted);font-size:.82rem">Istanbiṭ: limādhā summiyat najāsatu l-kalbi mughallaẓatan wa najāsatu bawli ṣ-ṣabiyyi mukhaffafah?</em><br>Work out the reasoning: <strong>why is the dog\u2019s impurity called "heavy/severe" and the nursing boy\u2019s urine called "light"?</strong></div><button class="btn-answer" onclick="toggleAnswer(this)">👁 Show Answer</button><div class="answer-box gold-box"><strong>Why a dog\u2019s is heaviest:</strong> Dogs can carry dangerous bacteria and parasites in their saliva (rabies, worms, etc.). Allah\u2019s law protects us from real health threats.<br><br>
<strong>Why a nursing baby boy\u2019s is lightest:</strong> (1) People carry babies around all day — it would be extremely hard if every drop required full washing. (2) A breastfeeding baby\u2019s urine is very mild and mostly water/milk-based. (3) Scholars mention boys are carried differently than girls, and boy urine often spreads widely — so Allah made it easier. Islam is practical and merciful!</div></div>
</div>
`;}

function L2P4(){return `

<div class="sec"><div class="sec-ar">طُرُقُ تَطْهِيرِ الْأَشْيَاءِ الْمُتَنَجِّسَة</div><div class="sec-translit">Ṭuruqu taṭhīri l-ashyāʾi l-mutanajjisah</div><div class="sec-en">Methods of Purifying Contaminated Things</div></div>

<p style="margin-bottom:12px">Different contaminated things need different cleaning methods. Here are the <strong>5 main methods</strong>:</p>

<div class="point"><div class="point-num">1</div><div><div class="point-ar">تَطْهِيرُ الْأَرْضِ الْمُتَنَجِّسَة</div><div class="point-translit">Taṭhīru l-arḍi l-mutanajjisah</div><div class="point-en"><strong>Purifying contaminated ground</strong></div></div></div>

<div class="body-text"><div class="bt-ar">إِذَا وَقَعَتِ النَّجَاسَةُ عَلَى الْأَرْضِ فَإِنْ كَانَ لَهَا جِرْمٌ كَالْغَائِطِ مَثَلًا فَإِنَّهُ يُزَالُ أَوَّلًا، ثُمَّ يُصَبُّ عَلَى مَوْضِعِهِ الْمَاءُ حَتَّى لَا يَبْقَى لِلنَّجَاسَةِ أَثَرٌ. وَلَوْ أُزِيلَ التُّرَابُ الَّذِي وَقَعَتْ عَلَيْهِ النَّجَاسَةُ، أَوْ دُفِنَ بِتُرَابٍ طَاهِرٍ فَلَا بَأْسَ. وَإِنْ كَانَ لَيْسَ لَهَا جِرْمٌ كَالْبَوْلِ مَثَلًا فَإِنَّهُ يُصَبُّ عَلَى الْمَوْضِعِ مَاءٌ حَتَّى لَا يَبْقَى لِلنَّجَاسَةِ أَثَرٌ.</div><div class="bt-translit">Idhā waqaʿati n-najāsatu ʿalā l-arḍi fa-in kāna lahā jirmun ka-l-ghāʾiṭi mathalan fa-innahu yuzālu awwalan, thumma yuṣabbu ʿalā mawḍiʿihi l-māʾu ḥattā lā yabqā li-n-najāsati atharun. Wa law uzīla t-turābu lladhī waqaʿat ʿalayhi n-najāsah, aw dufina bi-turābin ṭāhirin fa-lā baʾs. Wa in kāna laysa lahā jirmun ka-l-bawli mathalan fa-innahu yuṣabbu ʿalā l-mawḍiʿi māʾun ḥattā lā yabqā li-n-najāsati atharun.</div><div class="bt-en">If the impurity falls on the ground: (1) If it has a <strong>physical substance</strong> (like feces), it is <strong>removed first</strong>, then <strong>water is poured</strong> on its spot until no trace of the impurity remains. One may also <em>remove the contaminated soil</em>, or <em>bury it under clean soil</em> — that\u2019s also fine. (2) If it has <strong>no physical substance</strong> (like urine), simply <strong>pour water</strong> on the spot until no trace remains.</div></div>

<div class="point"><div class="point-num">2</div><div><div class="point-ar">تَطْهِيرُ الْمَاءِ الْمُتَنَجِّسِ</div><div class="point-translit">Taṭhīru l-māʾi l-mutanajjis</div><div class="point-en"><strong>Purifying contaminated water</strong></div></div></div>

<div class="body-text"><div class="bt-ar">يَطْهُرُ الْمَاءُ الْمُتَنَجِّسُ إِذَا تَمَّتْ تَنْقِيَتُهُ مِنَ النَّجَاسَةِ بِحَيْثُ لَا يَبْقَى لَهَا أَثَرٌ فِي الْمَاءِ، لَا فِي لَوْنٍ وَلَا فِي طَعْمٍ وَلَا فِي رَائِحَةٍ، وَيَتِمُّ ذَلِكَ بِوَسَائِلَ، مِنْهَا: إِضَافَةُ مَاءٍ كَثِيرٍ إِلَيْهِ حَتَّى يَزُولَ أَثَرُ النَّجَاسَةِ، أَوْ بِتَنْقِيَتِهِ بِوَسَائِلِ التَّنْقِيَةِ الْحَدِيثَةِ.</div><div class="bt-translit">Yaṭhuru l-māʾu l-mutanajjisu idhā tammat tanqiyatuhu mina n-najāsati bi-ḥaythu lā yabqā lahā atharun fī l-māʾ, lā fī lawnin wa lā fī ṭaʿmin wa lā fī rāʾiḥah, wa yatimmu dhālika bi-wasāʾila minhā: iḍāfatu māʾin kathīrin ilayhi ḥattā yazūla atharu n-najāsah, aw bi-tanqiyatihi bi-wasāʾili t-tanqiyati l-ḥadīthah.</div><div class="bt-en">Contaminated water becomes pure when its cleansing from the impurity is <strong>complete</strong> — so that no trace remains in the water: <strong>not in color, taste, or smell</strong>. This is accomplished by several means, including: <strong>adding a lot of pure water</strong> to it until the trace of impurity disappears, or <strong>purifying it with modern purification facilities</strong>.</div></div>

<div class="point"><div class="point-num">3</div><div><div class="point-ar">تَطْهِيرُ الثَّوْبِ الْمُتَنَجِّسِ</div><div class="point-translit">Taṭhīru th-thawbi l-mutanajjis</div><div class="point-en"><strong>Purifying a contaminated garment</strong></div></div></div>

<div class="body-text"><div class="bt-ar">يُغْسَلُ بِالْمَاءِ، وَيُفْرَكُ وَيُعْصَرُ حَتَّى تَزُولَ النَّجَاسَةُ.</div><div class="bt-translit">Yughsalu bi-l-māʾ, wa yufraku wa yuʿṣar ḥattā tazūla n-najāsah.</div><div class="bt-en">Wash it with water, <strong>rub it (fark)</strong>, and <strong>wring it out (ʿaṣr)</strong>, until the impurity is gone.</div></div>

<div class="point"><div class="point-num">4</div><div><div class="point-ar">تَطْهِيرُ السَّجَّادِ الْمُتَنَجِّسِ</div><div class="point-translit">Taṭhīru s-sajjādi l-mutanajjis</div><div class="point-en"><strong>Purifying a contaminated carpet</strong></div></div></div>

<div class="body-text"><div class="bt-ar">يُغْسَلُ بِالْمَاءِ أَوِ الْمُنَظِّفَاتِ الْحَدِيثَةِ، وَيُفْرَكُ حَتَّى تَزُولَ النَّجَاسَةُ.</div><div class="bt-translit">Yughsalu bi-l-māʾi awi l-munaẓẓifāti l-ḥadīthah, wa yufraku ḥattā tazūla n-najāsah.</div><div class="bt-en">Wash it with water <strong>or modern cleaning products</strong>, and <strong>rub it</strong>, until the impurity is gone.</div></div>

<div class="point"><div class="point-num">5</div><div><div class="point-ar">تَطْهِيرُ جِلْدِ الْمَيْتَةِ</div><div class="point-translit">Taṭhīru jildi l-maytah</div><div class="point-en"><strong>Purifying the skin of a dead animal</strong></div></div></div>

<div class="body-text"><div class="bt-ar">يَطْهُرُ جِلْدُ الْمَيْتَةِ بِالدَّبْغِ.</div><div class="bt-translit">Yaṭhuru jildu l-maytati bi-d-dabgh.</div><div class="bt-en">The skin of a dead animal is purified by <strong>tanning (ad-dabgh)</strong>.</div></div>

<div class="study-note beginner"><span class="study-note-label">💡 Why modern cleaning products work</span><div class="study-note-body">Notice how the textbook says <strong>"water OR modern detergents"</strong> can be used. This shows how fiqh is flexible and relevant today:<br><br>
The <em>goal</em> of the ruling is <strong>removing the impurity</strong>. The <em>method</em> is whatever works. In the past, water was the main tool. Today we have soap, bleach, detergents, washing machines — all of these <em>accomplish the same goal</em>, so they\u2019re valid for purification!<br><br>
Islam is timeless because it focuses on <em>principles</em>, not just old tools.</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Dabgh — the special case</span><div class="study-note-body"><strong>Tanning (dabgh)</strong> is a unique method only for dead animal skin. It\u2019s the chemical/traditional process that turns raw hide into leather. The Prophet ﷺ said: <em>"When the hide is tanned, it becomes pure."</em><br><br>
This is why <strong>leather shoes and belts are fine to use</strong> even though they come from animals that died! The tanning process transforms the skin.</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word tip</span><div class="study-note-title">مُتَنَجِّس · mutanajjis</div><div class="study-note-body">From نَجَس (najas) — impure. The prefix <em>muta-</em> means "having become" or "affected by." So <strong>mutanajjis</strong> = "something that has <em>become</em> impure" (was originally pure, but got contaminated).<br><br>
Compare with <em>najis</em> = "impure in itself." Remember the ʿayniyyah vs ḥukmiyyah distinction? <em>Najis</em> = ʿayniyyah. <em>Mutanajjis</em> = ḥukmiyyah. Same idea, different word!</div></div>
`;}

function L2P5(){return `

<div class="sec"><div class="sec-ar">خَفَاءُ مَوْضِعِ النَّجَاسَة</div><div class="sec-translit">Khafāʾu mawḍiʿi n-najāsah</div><div class="sec-en">When the Location of Impurity is Hidden</div></div>

<div class="body-text"><div class="bt-label">📖 Textbook Passage</div><div class="bt-ar">إِذَا عَلِمَ الشَّخْصُ بِوُقُوعِ نَجَاسَةٍ عَلَى شَيْءٍ، لَكِنَّهُ نَسِيَ، أَوْ لَمْ يَسْتَطِعْ تَحْدِيدَ مَكَانِ النَّجَاسَةِ؛ فَإِنَّهُ فِي هَذِهِ الْحَالَةِ يَلْزَمُهُ أَنْ يَغْسِلَ مَا يَتَيَقَّنُ بِغَسْلِهِ زَوَالَ النَّجَاسَةِ، وَلِذَلِكَ أَمْثِلَةٌ، مِنْهَا:</div><div class="bt-translit">Idhā ʿalima sh-shakhṣu bi-wuqūʿi najāsatin ʿalā shayʾin, lākinnahu nasiya, aw lam yastaṭiʿ taḥdīda makāni n-najāsah; fa-innahu fī hādhihi l-ḥālati yalzamuhu an yaghsila mā yatayaqqanu bi-ghaslihi zawāla n-najāsah, wa li-dhālika amthilah, minhā:</div><div class="bt-en">If a person <strong>knows</strong> that impurity landed on something, but he <strong>forgot</strong>, or he <strong>cannot specify the exact location</strong> of the impurity — then in this situation, he is <strong>obliged to wash whatever he is certain that washing it will remove the impurity</strong>. There are examples of this, including:</div></div>

<div class="compare-grid">
<div class="compare-card"><div class="compare-card-head rust"><span class="ch-ar">أ</span><br>Case A</div><ul class="compare-card-body"><li><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:6px;line-height:1.8">إِذَا عَلِمَ أَنَّهُ قَدْ وَقَعَ عَلَى كُمِّهِ نَجَاسَةٌ، وَلَكِنَّهُ لَا يَدْرِي مَوْضِعَهَا تَمَامًا، فَإِنَّهُ فِي هَذِهِ الْحَالَةِ يَغْسِلُ كُمَّهُ كُلَّهُ، لِأَنَّهُ بِذَلِكَ يَحْصُلُ لَهُ يَقِينٌ بِغَسْلِ النَّجَاسَةِ.</em><br><strong>Scenario:</strong> He knows impurity landed somewhere on his sleeve, but doesn\u2019t know exactly where.<br><strong>Solution:</strong> Wash the <strong>entire sleeve</strong>, so that he attains <em>certainty (yaqīn)</em> that the impurity has been washed away.</li></ul></div>
<div class="compare-card"><div class="compare-card-head gold"><span class="ch-ar">ب</span><br>Case B</div><ul class="compare-card-body"><li><em style="font-family:'Cormorant Garamond',serif;direction:rtl;font-size:.95rem;display:block;margin-bottom:6px;line-height:1.8">إِذَا وَقَعَتِ النَّجَاسَةُ عَلَى مَفْرَشٍ صَغِيرٍ أَوْ سَجَّادَةٍ وَلَا يَعْرِفُ مَوْضِعَهَا تَمَامًا، فَإِنْ عَلِمَ الْجِهَةَ الَّتِي هِيَ فِيهَا كَأَسْفَلِ السَّجَّادَةِ أَوْ أَعْلَاهَا غَسَلَ ذَلِكَ، وَإِلَّا غَسَلَهَا كُلَّهَا.</em><br><strong>Scenario:</strong> Impurity fell on a small mat or prayer rug, and he doesn\u2019t know exactly where.<br><strong>Solution:</strong> If he knows the <em>side</em> it fell on (e.g., top or bottom), wash <strong>that side</strong>. If not — wash the <strong>whole rug</strong>.</li></ul></div>
</div>

<div class="study-note beginner"><span class="study-note-label">💡 The principle at work here</span><div class="study-note-body">This is a beautiful example of an Islamic legal principle: <strong>"What is needed to complete a duty becomes a duty itself."</strong><br><br>
Your duty is to remove the impurity. If you can\u2019t locate it exactly, then <em>cleaning the whole possibly-affected area</em> is the only way to be sure you completed your duty. So that becomes your duty.<br><br>
Islam doesn\u2019t make you obsessive — but it does ask for <em>certainty</em> when it matters. <em>Yaqīn</em> (certainty) is an important word in fiqh!</div></div>

<div class="sec"><div class="sec-ar">بَوْلُ الْحَيَوَانِ الْمَأْكُولِ وَرَوْثُهُ</div><div class="sec-translit">Bawlu l-ḥayawāni l-maʾkūli wa rawthuhu</div><div class="sec-en">Urine and Droppings of Edible Animals</div></div>

<div class="body-text"><div class="bt-ar">بَوْلُ الْحَيَوَانِ الْمَأْكُولِ وَرَوْثُهُ طَاهِرَانِ، وَالدَّلِيلُ عَلَى ذَلِكَ: أَنَّ النَّبِيَّ ﷺ سُئِلَ: أُصَلِّي فِي مَرَابِضِ الْغَنَمِ؟ قَالَ: «نَعَمْ».</div><div class="bt-translit">Bawlu l-ḥayawāni l-maʾkūli wa rawthuhu ṭāhirān. Wa d-dalīlu ʿalā dhālika: anna n-nabiyya ﷺ suʾila: "Uṣallī fī marābiḍi l-ghanam?" Qāla: "Naʿam."</div><div class="bt-en">The <strong>urine and droppings of animals permissible to eat are pure</strong>. The evidence for this is: the Prophet ﷺ was asked, "Can I pray in the resting-places of sheep?" He said: <strong>"Yes."</strong></div></div>

<div class="hadith"><div class="hadith-label">Source of the evidence</div><div class="h-ar">أَنَّ النَّبِيَّ ﷺ سُئِلَ: أُصَلِّي فِي مَرَابِضِ الْغَنَمِ؟ قَالَ: «نَعَمْ»</div><div class="h-translit">Anna n-nabiyya ﷺ suʾila: "Uṣallī fī marābiḍi l-ghanam?" Qāla: "Naʿam."</div><div class="h-en">The Prophet ﷺ was asked: "Can I pray in the <strong>sheep pens</strong>?" He said: <strong>"Yes."</strong></div><div class="h-source">Narrated by Muslim no. 360</div></div>

<div class="study-note remember"><span class="study-note-label">⭐ Practical implication</span><div class="study-note-body">This is a huge relief for people who live on farms, shepherds, or anyone near livestock! If a sheep or goat\u2019s droppings fall on your clothes, you don\u2019t need to change clothes before praying. If a cow\u2019s urine splashes on your shoe while milking, it\u2019s not impure.<br><br>
The same applies to: sheep (غنم), goats (ماعز), cows (بقر), camels (إبل), chickens (دجاج), and all animals halāl to eat.<br><br>
But for animals <strong>not halāl to eat</strong> (dogs, pigs, predators), their urine and droppings <em>are</em> impure.</div></div>

<div class="study-note root-tip"><span class="study-note-label">🌱 Word tip</span><div class="study-note-title">مَرَابِض · marābiḍ</div><div class="study-note-body">Plural of <em>marbaḍ</em> — the resting place of livestock, where sheep lie down (from root ر-ب-ض / r-b-ḍ = "to lie down"). Think of a sheep pen or barn floor. Full of droppings — yet the Prophet ﷺ allowed prayer there. Subḥān Allāh — how practical Islam is!</div></div>
`;}
